  function openMethodMoreSheet(id){
    const m=methodById(id); if(!m) return;
    const sheet=document.getElementById('dynamicSheet');
    sheet.innerHTML=`
      <div class="sheet-handle"></div>
      <h3>更多操作</h3>
      <div class="sheet-sub">${esc(m.title)}</div>
      <div class="more-action-list">
        <button class="secondary-btn" data-more-edit="${m.id}">编辑方法</button>
        <button class="danger-btn" data-more-delete="${m.id}">删除方法</button>
        <button class="secondary-btn" id="cancelSheet">取消</button>
      </div>`;
    document.getElementById('sheetBackdrop').classList.add('show');
  }

  function openDeleteMethodSheet(id){
    const m=methodById(id); if(!m) return;
    const count=notesForMethod(id).length;
    const sheet=document.getElementById('dynamicSheet');
    sheet.innerHTML=`
      <div class="sheet-handle"></div>
      <h3>删除“${esc(m.title)}”</h3>
      <div class="sheet-sub">${count?`这条方法下有 ${count} 条使用备注。请选择删除方式。`:'删除后可在几秒内撤销。'}</div>
      <div style="display:grid;gap:10px">
        ${count?`<button class="secondary-btn" data-delete-method-mode="keep">仅删除方法，保留试用记录</button>`:''}
        <button class="danger-btn" data-delete-method-mode="all">方法和相关记录一起删除</button>
        <button class="secondary-btn" id="cancelSheet">取消</button>
      </div>`;
    sheet.dataset.methodId=id;
    document.getElementById('sheetBackdrop').classList.add('show');
  }

  async function deleteMethodNow(id,mode){
    const m=methodById(id); if(!m) return;
    const related=notesForMethod(id);
    const snapshot={method:{...m},notes:related.map(n=>({...n})),mode};

    if(m.communityId && state.authUser){
      try{
        const {firestoreApi}=await loadFirebase();
        await firestoreApi.setDoc(
          firestoreApi.doc(cloudDb,'communityMethods',m.communityId),
          {status:'hidden',updatedAt:nowISO()},
          {merge:true}
        );
      }catch(error){
        console.warn('删除个人方法前隐藏社区版本失败',error);
      }
    }

    await del(STORE_METHODS,id);
    state.methods=state.methods.filter(x=>x.id!==id);
    if(mode==='all'){
      for(const n of related) await del(STORE_NOTES,n.id);
      state.notes=state.notes.filter(n=>n.methodId!==id);
    }
    closeSheet();
    closeSubById('sub-detail');
    state.undo=async()=>{
      await put(STORE_METHODS,snapshot.method);
      if(mode==='all') for(const n of snapshot.notes) await put(STORE_NOTES,n);
      await reloadData();
    };
    renderAll();
    showToast('已删除');
  }

  async function deleteNoteNow(id){
    const n=state.notes.find(x=>x.id===id); if(!n) return;
    await del(STORE_NOTES,id);
    state.notes=state.notes.filter(x=>x.id!==id);
    state.undo=null;
    renderAll(); if(state.detailMethodId)renderDetail(state.detailMethodId);
    showToast('已删除备注',null);
  }

  let categoryDragState=null;
  let categoryGestureSuppressClickUntil=0;

  function closeCategorySwipe(exceptItem=null){
    document.querySelectorAll('#categoryContent .category-swipe-item.swipe-open').forEach(item=>{
      if(item!==exceptItem) item.classList.remove('swipe-open');
      const row=item.querySelector('.category-row');
      if(row) row.style.transform='';
    });
  }

  function bindCategoryDragEvents(){
    const box=document.getElementById('categoryContent');
    if(!box || box.dataset.dragBound==='1') return;
    box.dataset.dragBound='1';

    const DELETE_WIDTH=82;
    const LONG_PRESS_DELAY=260;

    box.addEventListener('pointerdown',e=>{
      if(e.target.closest('[data-delete-cat]')) return;
      const row=e.target.closest('.category-row');
      const item=row?.closest('.category-swipe-item');
      if(!row || !item || (e.button!==undefined && e.button!==0)) return;

      closeCategorySwipe(item);

      const gesture={
        box,item,row,
        pointerId:e.pointerId,
        startX:e.clientX,
        startY:e.clientY,
        lastX:e.clientX,
        lastY:e.clientY,
        startOffset:item.classList.contains('swipe-open')?-DELETE_WIDTH:0,
        mode:'pending',
        moved:false,
        longPressTimer:null
      };
      categoryDragState=gesture;

      gesture.longPressTimer=setTimeout(()=>{
        if(categoryDragState!==gesture || gesture.mode!=='pending') return;
        gesture.mode='drag';
        gesture.item.classList.remove('swipe-open');
        gesture.item.classList.add('dragging');
        gesture.row.classList.add('dragging');
        document.body.classList.add('category-drag-active');
      },LONG_PRESS_DELAY);

      try{row.setPointerCapture(e.pointerId);}catch(_){}
    });

    box.addEventListener('pointermove',e=>{
      const d=categoryDragState;
      if(!d || e.pointerId!==d.pointerId) return;

      d.lastX=e.clientX;
      d.lastY=e.clientY;
      const dx=e.clientX-d.startX;
      const dy=e.clientY-d.startY;
      const absX=Math.abs(dx);
      const absY=Math.abs(dy);

      if(d.mode==='pending'){
        if(absX>8 && absX>absY*1.15){
          clearTimeout(d.longPressTimer);
          d.mode='swipe';
          closeCategorySwipe(d.item);
        }else if(absY>9){
          clearTimeout(d.longPressTimer);
          try{d.row.releasePointerCapture(e.pointerId);}catch(_){}
          categoryDragState=null;
          return;
        }
      }

      if(d.mode==='swipe'){
        e.preventDefault();
        d.moved=true;
        const offset=Math.max(-DELETE_WIDTH,Math.min(0,d.startOffset+dx));
        d.row.style.transform=`translateX(${offset}px)`;
        return;
      }

      if(d.mode==='drag'){
        e.preventDefault();
        if(absY>4) d.moved=true;
        if(!d.moved) return;

        const items=[...d.box.querySelectorAll('.category-swipe-item:not(.dragging)')];
        let placed=false;
        for(const target of items){
          const rect=target.getBoundingClientRect();
          if(e.clientY<rect.top+rect.height/2){
            d.box.insertBefore(d.item,target);
            placed=true;
            break;
          }
        }
        if(!placed) d.box.appendChild(d.item);
      }
    },{passive:false});

    const finishGesture=async e=>{
      const d=categoryDragState;
      if(!d || e.pointerId!==d.pointerId) return;
      clearTimeout(d.longPressTimer);
      try{d.row.releasePointerCapture(e.pointerId);}catch(_){}

      if(d.mode==='swipe'){
        const dx=d.lastX-d.startX;
        const finalOffset=Math.max(-DELETE_WIDTH,Math.min(0,d.startOffset+dx));
        const shouldOpen=finalOffset<-DELETE_WIDTH/2;
        d.item.classList.toggle('swipe-open',shouldOpen);
        d.row.style.transform='';
        categoryGestureSuppressClickUntil=Date.now()+350;
      }else if(d.mode==='drag'){
        d.item.classList.remove('dragging');
        d.row.classList.remove('dragging');
        document.body.classList.remove('category-drag-active');
        categoryGestureSuppressClickUntil=Date.now()+350;
        if(d.moved){
          const ids=[...d.box.querySelectorAll('.category-swipe-item')].map(item=>item.dataset.categoryId);
          categoryDragState=null;
          await persistCategoryOrder(ids);
          showToast('分类顺序已保存',null);
          return;
        }
      }
      categoryDragState=null;
    };

    box.addEventListener('pointerup',finishGesture);
    box.addEventListener('pointercancel',e=>{
      const d=categoryDragState;
      if(!d || e.pointerId!==d.pointerId) return;
      clearTimeout(d.longPressTimer);
      d.item.classList.remove('dragging');
      d.row.classList.remove('dragging');
      d.row.style.transform='';
      document.body.classList.remove('category-drag-active');
      categoryDragState=null;
    });

    box.addEventListener('keydown',e=>{
      const row=e.target.closest('[data-edit-category]');
      if(row && (e.key==='Enter' || e.key===' ')){
        e.preventDefault();
        openCategoryModal('edit',state.categories.find(c=>c.id===row.dataset.editCategory));
      }
    });
  }

  function showToast(text){
    clearTimeout(state.toastTimer);
    const toast=document.getElementById('toast');
    const textEl=document.getElementById('toastText');
    const action=document.getElementById('toastAction');

    textEl.textContent=text;
    action.classList.add('hidden');
    toast.classList.remove('has-action');
    state.undo=null;
    toast.classList.add('show');

    state.toastTimer=setTimeout(()=>{
      toast.classList.remove('show','has-action');
      action.classList.add('hidden');
    },4000);
  }

  function openCategoryModal(mode='add',cat=null){
    const modal=document.getElementById('dynamicModal');
    modal.innerHTML=`
      <h3 style="margin-bottom:14px">${mode==='add'?'新增分类':'修改分类'}</h3>
      <div class="field"><input id="categoryNameInput" maxlength="16" placeholder="输入分类名称" value="${esc(cat?.name||'')}"></div>
      <div class="sheet-actions">
        <button class="secondary-btn" id="cancelModal">取消</button>
        <button class="primary-btn" id="saveCategoryModal">保存</button>
      </div>`;
    modal.dataset.mode=mode; modal.dataset.catId=cat?.id||'';
    document.getElementById('modalBackdrop').classList.add('show');
    setTimeout(()=>document.getElementById('categoryNameInput').focus(),50);
  }

  async function saveCategoryModal(){
    const modal=document.getElementById('dynamicModal');
    const name=document.getElementById('categoryNameInput').value.trim();
    if(!name){showToast('请输入分类名称',null);return;}
    if(state.categories.some(c=>c.name===name && c.id!==modal.dataset.catId)){showToast('分类已存在',null);return;}
    const old=state.categories.find(c=>c.id===modal.dataset.catId);
    const item=old?{...old,name}:{id:uid('cat'),name,pinned:false,isDefault:false,order:sortedCategories().length,createdAt:nowISO()};
    await put(STORE_CATEGORIES,item);
    const idx=state.categories.findIndex(c=>c.id===item.id);
    if(idx>=0)state.categories[idx]=item;else state.categories.push(item);
    closeModal();renderAll();
    if(document.getElementById('sub-method-form').classList.contains('open')){
      renderCategorySelect();document.getElementById('methodCategory').value=item.id;
    }
    showToast(old?'已修改分类':'已新增分类',null);
  }

  async function togglePinCategory(id){
    const c=state.categories.find(x=>x.id===id);if(!c)return;
    c.pinned=!c.pinned;await put(STORE_CATEGORIES,c);renderAll();
  }

  function openDeleteCategoryModal(id){
    const c=state.categories.find(x=>x.id===id);if(!c)return;
    closeCategorySwipe();
    const count=state.methods.filter(m=>m.categoryId===id).length;
    const modal=document.getElementById('dynamicModal');
    modal.innerHTML=`
      <h3 style="margin-bottom:8px">删除“${esc(c.name)}”</h3>
      <p class="muted" style="font-size:13px;line-height:1.7;margin-bottom:16px">${count?`该分类下有 ${count} 个方法，删除后会自动移入“其他”。`:'删除后可在几秒内撤销。'}</p>
      <div class="sheet-actions"><button class="secondary-btn" id="cancelModal">取消</button><button class="danger-btn" id="confirmDeleteCategory">删除</button></div>`;
    modal.dataset.catId=id;
    document.getElementById('modalBackdrop').classList.add('show');
  }

  async function deleteCategoryNow(id){
    const c=state.categories.find(x=>x.id===id);if(!c)return;
    let other=state.categories.find(x=>x.id!==id && x.id==='cat-other')||sortedCategories().find(x=>x.id!==id);
    let createdFallback=null;
    if(!other){
      createdFallback={
        id:uid('cat'),
        name:'其他',
        pinned:false,
        isDefault:true,
        order:0,
        createdAt:nowISO()
      };
      await put(STORE_CATEGORIES,createdFallback);
      state.categories.push(createdFallback);
      other=createdFallback;
    }
    const affected=state.methods.filter(m=>m.categoryId===id).map(m=>({...m}));
    await del(STORE_CATEGORIES,id);
    state.categories=state.categories.filter(x=>x.id!==id);
    for(const m of state.methods.filter(m=>m.categoryId===id)){
      m.categoryId=other.id;m.updatedAt=nowISO();await put(STORE_METHODS,m);
    }
    const remainingIds=sortedCategories().map(x=>x.id);
    for(let i=0;i<remainingIds.length;i++){
      const item=state.categories.find(x=>x.id===remainingIds[i]);
      if(item){item.order=i;await put(STORE_CATEGORIES,item);}
    }

    if(state.home.category===id) state.home.category='all';
    if(state.favorites.category===id) state.favorites.category='all';

    state.undo=async()=>{
      if(createdFallback) await del(STORE_CATEGORIES,createdFallback.id);
      await put(STORE_CATEGORIES,c);
      for(const m of affected) await put(STORE_METHODS,m);
      await reloadData();
    };
    closeModal();renderAll();showToast('已删除分类');
  }

  function closeModal(){document.getElementById('modalBackdrop').classList.remove('show');}

  function openMoreCategories(scope){
    const current=scope==='home'?state.home.category:state.favorites.category;
    const modal=document.getElementById('dynamicModal');
    modal.innerHTML=`<h3 style="margin-bottom:8px">选择分类</h3>`+
      `<div class="category-option" data-pick-cat="all" data-scope="${scope}"><span>全部</span><span>${current==='all'?'✓':''}</span></div>`+
      sortedCategories().map(c=>`<div class="category-option" data-pick-cat="${c.id}" data-scope="${scope}"><span>${esc(c.name)}</span><span>${current===c.id?'✓':''}</span></div>`).join('');
    document.getElementById('modalBackdrop').classList.add('show');
  }

  async function exportBackup(){
    const payload={
      app:'养生笺',version:1,exportedAt:nowISO(),
      categories:state.categories,methods:state.methods,notes:state.notes
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`养生笺备份-${todayISO()}.json`;a.click();
    URL.revokeObjectURL(url);
    const stamp = new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    safeSetItem('ysj-last-backup',stamp);
    updateBackupStatus();
    showToast('备份已导出',null);
  }

  async function handleImportFile(file){
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      if(!Array.isArray(data.methods)||!Array.isArray(data.categories)||!Array.isArray(data.notes)) throw new Error('格式不正确');
      state.pendingImport=data;
      const modal=document.getElementById('dynamicModal');
      modal.innerHTML=`
        <h3 style="margin-bottom:8px">导入备份</h3>
        <p class="muted" style="font-size:13px;line-height:1.7;margin-bottom:16px">备份中包含 ${data.methods.length} 个方法、${data.notes.length} 条备注。</p>
        <div style="display:grid;gap:10px">
          <button class="primary-btn" data-import-mode="merge">合并到当前数据</button>
          <button class="danger-btn" data-import-mode="replace">覆盖当前数据</button>
          <button class="secondary-btn" id="cancelModal">取消</button>
        </div>`;
      document.getElementById('modalBackdrop').classList.add('show');
    }catch(e){
      showToast('备份文件无法识别',null);
    }
  }

  async function importBackup(mode){
    const data=state.pendingImport;if(!data)return;
    if(mode==='replace'){
      await clearStore(STORE_METHODS);await clearStore(STORE_NOTES);await clearStore(STORE_CATEGORIES);
    }
    for(const c of data.categories) await put(STORE_CATEGORIES,c);
    for(const m of data.methods) await put(STORE_METHODS,m);
    for(const n of data.notes) await put(STORE_NOTES,n);
    closeModal();state.pendingImport=null;await reloadData();showToast('备份已导入',null);
  }

  async function reloadData(){
    state.methods=await getAll(STORE_METHODS);
    state.notes=await getAll(STORE_NOTES);
    state.categories=await getAll(STORE_CATEGORIES);
    await ensureCategoryOrder();
    renderAll();
  }

  function bindEvents(){
    document.addEventListener('click',async e=>{
      const tab=e.target.closest('[data-tab]'); if(tab){switchTab(tab.dataset.tab);return;}

      const homeScope=e.target.closest('[data-home-scope]'); if(homeScope){switchHomeScope(homeScope.dataset.homeScope);return;}
      const communityCat=e.target.closest('[data-community-cat]'); if(communityCat){state.community.category=communityCat.dataset.communityCat;renderCommunityHome();return;}
      const communityOpen=e.target.closest('[data-open-community]'); if(communityOpen){await openCommunityDetail(communityOpen.dataset.openCommunity);return;}
      const communityVote=e.target.closest('[data-community-vote]'); if(communityVote){await voteCommunity(communityVote.dataset.communityVote);return;}
      const deleteCommunityCommentButton=e.target.closest('[data-delete-community-comment]'); if(deleteCommunityCommentButton){await deleteCommunityComment(deleteCommunityCommentButton.dataset.deleteCommunityComment);return;}
      const replyCommunityCommentButton=e.target.closest('[data-reply-community-comment]'); if(replyCommunityCommentButton){openCommunityReplySheet(replyCommunityCommentButton.dataset.replyCommunityComment);return;}
      const manageHideButton=e.target.closest('[data-manage-hide-community]'); if(manageHideButton){await manageHideCommunity(manageHideButton.dataset.manageHideCommunity);return;}
      if(e.target.closest('#communityCommentFab')){openCommunityCommentSheet();return;}
      if(e.target.closest('#removeCommunityCommentImage')){removeCommunityCommentImage();return;}
      const communityTopAction=e.target.closest('#communityDetailAction');
      if(communityTopAction && communityTopAction.dataset.methodId){
        await manageHideCommunity(communityTopAction.dataset.methodId);
        return;
      }

      if(e.target.closest('#openNotifications')){await openNotifications();return;}
      if(e.target.closest('#markAllNotificationsRead')){await markAllNotificationsRead();return;}
      const openNotificationButton=e.target.closest('[data-open-notification]'); if(openNotificationButton){await openNotificationItem(openNotificationButton.dataset.openNotification);return;}
      if(e.target.closest('#openAccount')){openAccountSheet();return;}
      if(e.target.closest('#loginAccount')){await loginAccount('login');return;}
      if(e.target.closest('#registerAccount')){await loginAccount('register');return;}
      if(e.target.closest('#resetAccountPassword')){await resetAccountPassword();return;}
      if(e.target.closest('#resyncAccount')){await resyncCurrentAccount();return;}
      if(e.target.closest('#logoutAccount')){await logoutAccount();return;}

      const publishCommunityButton=e.target.closest('[data-publish-community],[data-update-community]');
      if(publishCommunityButton){
        openPublishCommunitySheet(
          publishCommunityButton.dataset.publishCommunity||
          publishCommunityButton.dataset.updateCommunity
        );
        return;
      }
      const hideCommunityButton=e.target.closest('[data-hide-community]');
      if(hideCommunityButton){await setCommunityVisibility(hideCommunityButton.dataset.hideCommunity,'hidden');return;}
      const republishCommunityButton=e.target.closest('[data-republish-community]');
      if(republishCommunityButton){await setCommunityVisibility(republishCommunityButton.dataset.republishCommunity,'published');return;}
      if(e.target.closest('#confirmPublishCommunity')){
        await publishCommunityMethod(document.getElementById('dynamicSheet').dataset.methodId,'published');
        return;
      }
      if(e.target.closest('#submitCommunityComment')){await submitCommunityComment();return;}
      if(e.target.closest('#submitCommunityReply')){await submitCommunityReply();return;}

      if(e.target.closest('#addFab')||e.target.closest('[data-empty-add]')){openMethodForm();return;}
      const close=e.target.closest('[data-close-sub]'); if(close){closeSub(close);return;}

      const hm=e.target.closest('[data-home-mode]'); if(hm){state.home.mode=hm.dataset.homeMode;safeSetItem('ysj-home-mode',state.home.mode);renderHome();return;}
      const tm=e.target.closest('[data-trial-mode]'); if(tm){state.trials.mode=tm.dataset.trialMode;renderTrials();return;}
      const tf=e.target.closest('#trialFilters [data-filter]'); if(tf){state.trials.filter=tf.dataset.filter;renderTrials();return;}

      const fav=e.target.closest('[data-fav]'); if(fav){e.stopPropagation();await toggleFavorite(fav.dataset.fav);return;}
      const statusOpen=e.target.closest('[data-open-card-status]'); if(statusOpen){e.stopPropagation();openCardStatusSheet(statusOpen.dataset.openCardStatus);return;}
      const statusPick=e.target.closest('[data-pick-card-status]'); if(statusPick){
        await setCardStatus(document.getElementById('dynamicSheet').dataset.methodId,statusPick.dataset.pickCardStatus);
        return;
      }
      const statusClear=e.target.closest('[data-clear-card-status]'); if(statusClear){
        await clearCardStatus(document.getElementById('dynamicSheet').dataset.methodId);
        return;
      }
      const detail=e.target.closest('[data-open-detail]'); if(detail){openDetail(detail.dataset.openDetail);return;}
      const notesLink=e.target.closest('[data-open-notes]'); if(notesLink){e.stopPropagation();openDetail(notesLink.dataset.openNotes);return;}
      const quick=e.target.closest('[data-quick-status]'); if(quick){e.stopPropagation();openQuickTrial(quick.dataset.mid,quick.dataset.quickStatus);return;}
      const catView=e.target.closest('[data-view-category]'); if(catView){state.home.category=catView.dataset.viewCategory;state.home.mode='all';safeSetItem('ysj-home-mode','all');renderHome();return;}

      if(e.target.closest('#openFavorites')){renderFavorites();openSub('sub-favorites');return;}
      if(e.target.closest('#openCategories')){renderCategories();openSub('sub-categories');return;}
      if(e.target.closest('#openBackup')){openSub('sub-backup');return;}
      if(e.target.closest('#openAbout')){openAboutSheet();return;}
      if(e.target.closest('#quickAddCategory')||e.target.closest('#addCategoryBtn')){openCategoryModal();return;}
      if(e.target.closest('#saveMethodTop')){await saveMethod();return;}
      if(e.target.closest('#editFromDetail') && state.detailMethodId){openMethodForm(methodById(state.detailMethodId));return;}

      const pin=e.target.closest('[data-pin-cat]');if(pin){await togglePinCategory(pin.dataset.pinCat);return;}
      const ren=e.target.closest('[data-rename-cat]');if(ren){openCategoryModal('edit',state.categories.find(c=>c.id===ren.dataset.renameCat));return;}
      const delcat=e.target.closest('[data-delete-cat]');if(delcat){openDeleteCategoryModal(delcat.dataset.deleteCat);return;}
      const editCategoryCard=e.target.closest('[data-edit-category]');if(editCategoryCard){
        if(Date.now()<categoryGestureSuppressClickUntil) return;
        const item=editCategoryCard.closest('.category-swipe-item');
        if(item?.classList.contains('swipe-open')){
          item.classList.remove('swipe-open');
          return;
        }
        openCategoryModal('edit',state.categories.find(c=>c.id===editCategoryCard.dataset.editCategory));
        return;
      }
      const imgCover=e.target.closest('[data-img-cover]');if(imgCover){
        const i=+imgCover.dataset.imgCover;
        const [picked]=state.formImages.splice(i,1);
        state.formImages.unshift(picked);
        renderFormImages();
        return;
      }
      const imgX=e.target.closest('[data-img-remove]');if(imgX){state.formImages.splice(+imgX.dataset.imgRemove,1);renderFormImages();return;}

      const ds=e.target.closest('[data-detail-status]');if(ds){openQuickTrial(state.detailMethodId,ds.dataset.detailStatus);return;}
      const addn=e.target.closest('[data-add-note]');if(addn){openNoteSheet(addn.dataset.addNote);return;}
      const morem=e.target.closest('[data-more-method]');if(morem){openMethodMoreSheet(morem.dataset.moreMethod);return;}
      const moreEdit=e.target.closest('[data-more-edit]');if(moreEdit){closeSheet();openMethodForm(methodById(moreEdit.dataset.moreEdit));return;}
      const moreDelete=e.target.closest('[data-more-delete]');if(moreDelete){closeSheet();openDeleteMethodSheet(moreDelete.dataset.moreDelete);return;}
      const editm=e.target.closest('[data-edit-method]');if(editm){
        const id = editm.dataset.editMethod || state.detailMethodId;
        closeSubById('sub-detail');
        setTimeout(() => openMethodForm(methodById(id)), 50);
        return;
      }
      const delm=e.target.closest('[data-delete-method]');if(delm){openDeleteMethodSheet(delm.dataset.deleteMethod);return;}
      const editn=e.target.closest('[data-edit-note]');if(editn){const n=state.notes.find(x=>x.id===editn.dataset.editNote);if(n)openNoteSheet(n.methodId,n);return;}
      const deln=e.target.closest('[data-delete-note]');if(deln){await deleteNoteNow(deln.dataset.deleteNote);return;}

      const thumb=e.target.closest('[data-detail-img]');if(thumb){
        document.getElementById('detailMainImage').src=methodById(state.detailMethodId).images[+thumb.dataset.detailImg];
        document.querySelectorAll('.detail-thumb').forEach(x=>x.classList.toggle('active',x===thumb));return;
      }

      const sheetStatus=e.target.closest('[data-sheet-status]');if(sheetStatus){
        document.querySelectorAll('[data-sheet-status]').forEach(x=>{
          x.classList.remove('selected');
          x.setAttribute('aria-pressed','false');
        });
        sheetStatus.classList.add('selected');
        sheetStatus.setAttribute('aria-pressed','true');
        document.getElementById('dynamicSheet').dataset.status=sheetStatus.dataset.sheetStatus;
        return;
      }
      if(e.target.closest('#cancelSheet')){closeSheet();return;}
      if(e.target.closest('#saveQuickTrial')){await saveQuickTrial();return;}
      if(e.target.closest('#saveNote')){await saveNote();return;}
      const dm=e.target.closest('[data-delete-method-mode]');if(dm){await deleteMethodNow(document.getElementById('dynamicSheet').dataset.methodId,dm.dataset.deleteMethodMode);return;}

      if(e.target.closest('#cancelModal')){closeModal();return;}
      if(e.target.closest('#saveCategoryModal')){await saveCategoryModal();return;}
      if(e.target.closest('#confirmDeleteCategory')){await deleteCategoryNow(document.getElementById('dynamicModal').dataset.catId);return;}
      const pick=e.target.closest('[data-pick-cat]');if(pick){
        const scope=pick.dataset.scope;
        if(scope==='home'){state.home.category=pick.dataset.pickCat;renderHome();}
        else{state.favorites.category=pick.dataset.pickCat;renderFavorites();}
        closeModal();return;
      }
      const importMode=e.target.closest('[data-import-mode]');if(importMode){await importBackup(importMode.dataset.importMode);return;}

      if(e.target.closest('#exportBackup')){await exportBackup();return;}
    });

    document.getElementById('methodForm').addEventListener('submit',saveMethod);
    document.getElementById('methodImages').addEventListener('change',async e=>{
      const files=[...e.target.files];
      if(files.length > 0){
        try{
          // 只保留最后一张（单图模式）
          state.formImages = [await compressImage(files[files.length-1])];
          renderFormImages();
        }catch(err){
          showToast('图片处理失败',null);
        }
      }
      e.target.value='';
    });

    document.getElementById('homeSearch').addEventListener('input',e=>{state.home.search=e.target.value;renderHome();});

    document.getElementById('favoriteSearch').addEventListener('input',e=>{state.favorites.search=e.target.value;renderFavorites();});

    document.getElementById('homeChips').addEventListener('click',e=>{
      const c=e.target.closest('[data-cat]');if(c){state.home.category=c.dataset.cat;renderHome();}

    });
    document.getElementById('favoriteChips').addEventListener('click',e=>{
      const c=e.target.closest('[data-cat]');if(c){state.favorites.category=c.dataset.cat;renderFavorites();}

    });

    document.getElementById('sheetBackdrop').addEventListener('click',e=>{if(e.target.id==='sheetBackdrop')closeSheet();});
    document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal();});
    document.getElementById('toastAction').addEventListener('click',async()=>{
      if(state.undo){const fn=state.undo;state.undo=null;document.getElementById('toast').classList.remove('show');await fn();showToast('已撤销',null);}
    });
    document.getElementById('importBackup').addEventListener('change',async e=>{if(e.target.files[0])await handleImportFile(e.target.files[0]);e.target.value='';});
    
  }


    window.addEventListener('pageshow',event=>{
      if(!event.persisted) return;
      calibrateInitialTabLayout().catch(console.error);
    });

  bootstrap().catch(err=>{
    console.error(err);
    document.body.classList.remove('ysj-boot-calibrating');
    document.getElementById('homeContent').innerHTML=`<div class="empty"><div><h3>初始化失败</h3><p>请尝试使用最新版浏览器重新打开。</p></div></div>`;
  });
})();
</script>


<script id="yangsheng-popup-keyboard-and-viewport-v59">
(function(){
  var sheetBackdrop;
  var modalBackdrop;
  var sheet;
  var modal;
  var savedScrollY=0;
  var locked=false;
  var root=document.documentElement;

  function isVisible(el){
    return Boolean(el && el.classList.contains('show'));
  }

  function visualMetrics(){
    var vv=window.visualViewport;
    var layoutHeight=Math.max(1,window.innerHeight||document.documentElement.clientHeight||1);
    var top=vv ? Math.max(0,vv.offsetTop||0) : 0;
    var height=vv ? Math.max(1,vv.height||layoutHeight) : layoutHeight;
    var bottomInset=Math.max(0,layoutHeight-(top+height));

    return {
      layoutHeight:layoutHeight,
      top:top,
      height:height,
      bottomInset:bottomInset
    };
  }

  function fullOverlayHeight(){
    var values=[
      window.innerHeight||0,
      document.documentElement.clientHeight||0
    ];

    if(window.visualViewport){
      values.push((window.visualViewport.offsetTop||0)+(window.visualViewport.height||0));
    }

    var standalone=
      (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
      window.navigator.standalone===true;

    if(standalone && window.screen){
      values.push(window.screen.height||0,window.screen.availHeight||0);
    }

    return Math.max(1,Math.ceil(Math.max.apply(Math,values)));
  }

  function syncAppViewport(){
    var metrics = visualMetrics();
    var anyOverlay = isVisible(sheetBackdrop) || isVisible(modalBackdrop);
    var keyboardVisible = metrics.height < metrics.layoutHeight - 100;

    document.body.classList.toggle('ysj-keyboard-visible', keyboardVisible && anyOverlay);

    // 简化：只设置必要的变量，不强制整个 App 高度
    root.style.setProperty('--ysj-sheet-bottom', (keyboardVisible ? metrics.bottomInset : 0) + 'px');

    // 让底部导航和 FAB 自然使用 safe-area-inset-bottom
    if (isVisible(sheetBackdrop) && sheet && document.activeElement && sheet.contains(document.activeElement)) {
      setTimeout(function () {
        var active = document.activeElement;
        if (!active || !sheet.contains(active)) return;
        var rect = active.getBoundingClientRect();
        var bottomLimit = window.innerHeight - 20;
        if (rect.bottom > bottomLimit) {
          sheet.scrollTop += rect.bottom - bottomLimit + 24;
        }
      }, 60);
    }
  }

  function lockPage(){
    // 简化处理：不再强制把 body 锁成 fixed（避免 PWA 独立模式下高度异常）
    if(locked) return;
    locked = true;
    document.body.classList.add('ysj-overlay-open');
    syncAppViewport();
  }

  function unlockPage(){
    if(!locked) return;
    locked = false;

    var active = document.activeElement;
    if (active && active.matches && active.matches('input,textarea,select,[contenteditable="true"]')) {
      active.blur();
    }

    document.body.classList.remove('ysj-overlay-open', 'ysj-keyboard-visible');
    root.style.setProperty('--ysj-sheet-bottom', '0px');
    syncAppViewport();
  }

  function syncOverlayState(){
    var anyOverlay=isVisible(sheetBackdrop)||isVisible(modalBackdrop);
    if(anyOverlay) lockPage();
    else unlockPage();
    syncAppViewport();
  }

  function stopBackgroundTouch(event){
    if(!locked) return;

    var target=event.target;
    var insideScrollable=
      (sheet && sheet.contains(target)) ||
      (modal && modal.contains(target));

    if(!insideScrollable){
      event.preventDefault();
    }
  }

  function init(){
    sheetBackdrop=document.getElementById('sheetBackdrop');
    modalBackdrop=document.getElementById('modalBackdrop');
    sheet=document.getElementById('dynamicSheet');
    modal=document.getElementById('dynamicModal');

    /* 将固定导航移出 .app 滚动上下文。iOS 主屏幕模式下，固定元素放在
       可滚动容器内部可能会随页面一起移动。 */
    var bottomNav=document.querySelector('.bottom-nav');
    var addFab=document.getElementById('addFab');
    if(bottomNav && bottomNav.parentElement!==document.body){
      document.body.appendChild(bottomNav);
    }
    if(addFab && addFab.parentElement!==document.body){
      document.body.appendChild(addFab);
    }

    if(!sheetBackdrop || !modalBackdrop || !sheet || !modal) return;

    new MutationObserver(syncOverlayState).observe(sheetBackdrop,{
      attributes:true,
      attributeFilter:['class']
    });
    new MutationObserver(syncOverlayState).observe(modalBackdrop,{
      attributes:true,
      attributeFilter:['class']
    });

    document.addEventListener('touchmove',stopBackgroundTouch,{passive:false,capture:true});
    document.addEventListener('wheel',stopBackgroundTouch,{passive:false,capture:true});

    document.addEventListener('focusin',function(event){
      if(locked && ((sheet && sheet.contains(event.target)) || (modal && modal.contains(event.target)))){
        setTimeout(syncAppViewport,20);
        setTimeout(syncAppViewport,180);
      }
    });

    document.addEventListener('focusout',function(){
      if(locked){
        setTimeout(syncAppViewport,80);
        setTimeout(syncAppViewport,260);
      }
    });

    if(window.visualViewport){
      window.visualViewport.addEventListener('resize',syncAppViewport);
      window.visualViewport.addEventListener('scroll',syncAppViewport);
    }

    window.addEventListener('resize',syncAppViewport);
    window.addEventListener('orientationchange',function(){
      setTimeout(syncAppViewport,80);
      setTimeout(syncAppViewport,300);
    });

    window.addEventListener('pageshow',function(){
      if(!isVisible(sheetBackdrop) && !isVisible(modalBackdrop)){
        unlockPage();
      }
      syncAppViewport();
      setTimeout(syncAppViewport,120);
      setTimeout(syncAppViewport,500);
    });

    document.addEventListener('visibilitychange',function(){
      if(!document.hidden){
        syncAppViewport();
        setTimeout(syncAppViewport,180);
      }
    });

    window.__ysjRefreshViewport=syncAppViewport;
    window.__ysjSyncAppViewport=syncAppViewport;

    syncOverlayState();
    syncAppViewport();
    setTimeout(syncAppViewport,80);
    setTimeout(syncAppViewport,260);
    setTimeout(syncAppViewport,700);
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',init);
  }else{
    init();
  }
})();
</script>

<script id="yangsheng-boot-visibility-fallback-v60">
(function(){
  setTimeout(function(){
    if(document.body){
      document.body.classList.remove('ysj-boot-calibrating');
    }
  },1800);
})();
</script>

</body>
</html>
