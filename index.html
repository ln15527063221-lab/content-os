<style>
:root{
  --bg:#F8F7F2;
  --surface:#FFFFFF;
  --surface-soft:#F4F3EE;
  --ink:#283328;
  --text:#50584F;
  --muted:#92978E;
  --line:#E8E6DE;
  --green:#668B48;
  --green-dark:#425E38;
  --green-soft:#EDF3E6;
  --orange:#C98C3D;
  --orange-soft:#FCF2E5;
  --red:#C96660;
  --red-soft:#FBECEA;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --shadow:0 8px 26px rgba(46,57,42,.055);
}
*{box-sizing:border-box}
html{
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
  background:#F0EFEA;
}
body{
  margin:0;
  min-height:100vh;
  background:#F0EFEA;
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;
  font-size:16px;
}
button,input,textarea,select{font:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
h1,h2,h3,p{margin:0}
svg{display:block}

.app{
  position:relative;
  width:min(100%,480px);
  margin:0 auto;
  overflow-x:hidden;
  background:var(--bg);
  box-shadow:0 0 42px rgba(38,48,34,.08);
}

.page{
  display:none;
  padding-bottom:calc(92px + var(--safe-bottom));
}
.page.active{display:block}
.content{
  padding:0 18px 28px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* Header */
.topbar{
  height:82px;
  padding:12px 20px 12px;
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  background:var(--bg);
}
.brand{display:flex;align-items:center}
.seal{display:none}
.brand h1{
  font-family:"Songti SC","STSong","Noto Serif CJK SC",serif;
  font-size:30px!important;
  line-height:38px;
  font-weight:700;
  letter-spacing:.02em;
  color:var(--green-dark);
  white-space:nowrap;
}

/* Search */
.search-wrap{
  position:relative;
  height:52px;
  margin-bottom:14px;
}
.search-wrap input{
  width:100%;
  height:52px;
  padding:0 18px 0 48px;
  border:1px solid #E7E4DB;
  border-radius:19px;
  outline:none;
  background:#F3F1EB;
  color:var(--ink);
  font-size:16px;
}
.search-wrap input::placeholder{color:#A6AAA2}
.search-wrap input:focus{
  border-color:#BFCDB4;
  box-shadow:0 0 0 3px rgba(102,139,72,.08);
}
.search-ico{
  position:absolute;
  left:15px;
  top:0;
  width:24px;
  height:52px;
  display:grid;
  place-items:center;
  color:#7E847B;
  pointer-events:none;
}
.search-ico svg{
  width:24px;height:24px;
  fill:none;stroke:currentColor;stroke-width:1.9;
  stroke-linecap:round;stroke-linejoin:round;
}
.clear-search{display:none!important}

/* Home toolbar */
.view-controls{
  min-height:48px;
  margin-bottom:12px;
  padding-bottom:10px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--line);
}
.home-mode-tabs{
  height:44px;
  display:flex;
  align-items:stretch;
  gap:24px;
}
.home-mode-tabs button{
  position:relative;
  min-width:0;
  height:44px;
  padding:0 2px;
  border:0;
  background:transparent;
  color:#777D75;
  font-size:16px;
  font-weight:600;
  white-space:nowrap;
  display:flex;
  align-items:center;
  justify-content:center;
}
.home-mode-tabs button.active{color:var(--ink)}
.home-mode-tabs button.active::after{
  content:"";
  position:absolute;
  left:0;right:0;bottom:-11px;
  height:3px;border-radius:999px;
  background:var(--green);
}
.view-actions{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
}
.sort-select{
  width:108px;
  height:42px;
  padding:0 4px;
  border:0;
  outline:none;
  background:transparent;
  color:#666C65;
  font-size:15px;
}
.view-toggle{
  width:44px;
  height:44px;
  padding:0;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:14px;
  background:#FFF;
  color:#777D75;
}
.view-toggle svg{
  width:24px;height:24px;
  fill:none;stroke:currentColor;stroke-width:1.8;
}
.view-toggle.active{
  color:var(--green);
  border-color:#CBDABC;
  background:var(--green-soft);
}

/* Category chips */
.chip-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 0 15px;
  overflow:auto;
  scrollbar-width:none;
}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;
  min-height:42px;
  padding:0 16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--line);
  border-radius:15px;
  background:#FFF;
  color:#626961;
  font-size:15px;
  white-space:nowrap;
}
.chip.active{
  color:var(--green);
  border-color:#DCE7D3;
  background:var(--green-soft);
  font-weight:650;
}

/* Cards */
.list-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}
.masonry{
  column-count:2;
  column-gap:12px;
}
.masonry .method-card{
  break-inside:avoid;
  margin-bottom:12px;
}
.method-card{
  position:relative;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:22px;
  background:#FFF;
  box-shadow:var(--shadow);
}
.method-card.note-card{
  background:
    radial-gradient(circle at 90% 10%,rgba(108,144,79,.055),transparent 22%),
    #FFF;
}
.method-card.note-card::before{
  content:"";
  position:absolute;
  left:-14px;
  bottom:-10px;
  width:92px;
  height:120px;
  opacity:.11;
  pointer-events:none;
  background:
    linear-gradient(72deg,transparent 47%,#6A8F4B 48% 51%,transparent 52%) 39px 9px/28px 92px no-repeat,
    radial-gradient(ellipse at 66% 45%,#6A8F4B 0 34%,transparent 36%) 15px 23px/44px 27px no-repeat,
    radial-gradient(ellipse at 34% 52%,#6A8F4B 0 34%,transparent 36%) 42px 47px/42px 25px no-repeat,
    radial-gradient(ellipse at 66% 50%,#6A8F4B 0 34%,transparent 36%) 18px 72px/42px 25px no-repeat;
  transform:rotate(-11deg);
}
.card-cover{
  width:100%;
  aspect-ratio:1.5/1;
  object-fit:cover;
  background:#EEEDE8;
}
.card-main{
  position:relative;
  z-index:1;
  padding:16px;
}
.card-topline{
  min-height:38px;
  margin-bottom:9px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.category-tag{
  max-width:calc(100% - 48px);
  min-height:28px;
  padding:4px 10px;
  display:inline-flex;
  align-items:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  border-radius:10px;
  background:#F5F2EB;
  color:#888379;
  font-size:14px;
}
.fav-btn{
  flex:0 0 auto;
  width:38px;height:38px;
  padding:0;
  display:grid;
  place-items:center;
  border:1px solid #ECE8DF;
  border-radius:50%;
  background:#FCFAF6;
  color:#AAA69C;
  font-size:21px;
}
.fav-btn.on{
  color:#7B9A55;
  border-color:#DFE9D5;
  background:#F2F6ED;
}
.card-title{
  margin-bottom:8px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:var(--ink);
  font-size:18px;
  line-height:26px;
  font-weight:700;
}
.card-summary{
  margin-bottom:14px;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
  color:#747A72;
  font-size:15px;
  line-height:23px;
}
.card-footer{
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.effective-action{
  min-height:40px;
  padding:0 14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  border:1px solid #E5E8DE;
  border-radius:13px;
  background:#F7F8F4;
  color:#6E766B;
  font-size:14px;
  white-space:nowrap;
}
.effective-action.selected{
  color:var(--green);
  border-color:#D8E6CE;
  background:var(--green-soft);
}
.card-enter{
  color:#B0B3AC;
  font-size:28px;
  line-height:1;
}
.masonry .card-main{padding:13px}
.masonry .card-title{font-size:16px;line-height:23px}
.masonry .card-summary{
  -webkit-line-clamp:3;
  font-size:14px;
  line-height:21px;
}
.masonry .card-topline{min-height:34px}
.masonry .effective-action{
  width:100%;

<script>
(() => {
  const DB_NAME = 'yangsheng_jian_db';
  const DB_VERSION = 1;
  const STORE_METHODS = 'methods';
  const STORE_NOTES = 'notes';
  const STORE_CATEGORIES = 'categories';

  const defaultCategories = [
    { id:'cat-food', name:'饮食', pinned:true, isDefault:true },
    { id:'cat-exercise', name:'运动', pinned:false, isDefault:true },
    { id:'cat-sleep', name:'睡眠', pinned:false, isDefault:true },
    { id:'cat-care', name:'调理', pinned:false, isDefault:true },
    { id:'cat-other', name:'其他', pinned:false, isDefault:true }
  ];

  const statusMeta = {
    effective:{ label:'有效', emoji:'👍', className:'effective' },
    neutral:{ label:'没感觉', emoji:'😐', className:'neutral' },
    unsuitable:{ label:'不适合', emoji:'👎', className:'unsuitable' },
    none:{ label:'尚未试用', emoji:'', className:'' }
  };

  // 安全访问 localStorage（兼容沙箱环境 / PWA 受限模式）
  function safeGetItem(key, fallback = null) {
    try {
      return localStorage.getItem(key) ?? fallback;
    } catch (e) {
      return fallback;
    }
  }
  function safeSetItem(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch (e) {
      // 沙箱环境或存储被禁用时静默失败
    }
  }

  const state = {
    methods:[], notes:[], categories:[],
    home:{
      search:'', category:'all',
      mode:safeGetItem('ysj-home-mode') || 'all',
      view:'list',
      sort:safeGetItem('ysj-home-sort') || 'created'
    },
    trials:{ mode:'method', filter:'all' },
    favorites:{
      search:'', category:'all',
      view:'list'
    },
    formImages:[],
    detailMethodId:null,
    undo:null,
    toastTimer:null,
    pendingImport:null,
    authUser:null,
    syncStatus:'local',
    cloudHydrating:false,
    homeScope:'mine',
    community:{
      methods:[],
      stats:{},
      search:'',
      category:'all',
      detailId:null,
      detailVotes:[],
      detailComments:[],
      commentImage:null,
      loading:true
    },
    notifications:{
      items:[],
      seenAt:'',
      loading:false,
      refreshedAt:0
    }
  };

  let db;

  const FIREBASE_ADMIN_UID = '0NRRtCunLwbGJAUGDrbOrEn5fjS2';
  const FIREBASE_ADMIN_EMAIL = 'sandmyo@163.com';
  const firebaseConfig = {
    apiKey:'AIzaSyDaAy_j4_i3y5FI7cnNR8rK7hd0dn8bS2Q',
    authDomain:'health-preservation-notes.firebaseapp.com',
    projectId:'health-preservation-notes',
    storageBucket:'health-preservation-notes.firebasestorage.app',
    messagingSenderId:'158863632828',
    appId:'1:158863632828:web:1eed2b2e2d2f8c1a34e3b9',
    measurementId:'G-5WS9Z5H5TW'
  };

  let firebaseModules=null;
  let cloudAuth=null;
  let cloudDb=null;
  let cloudSyncActive=false;
  let applyingRemote=false;
  let cloudUnsubs=[];
  let communityUnsub=null;
  let cloudReloadTimer=null;

  async function loadFirebase(){
    if(firebaseModules) return firebaseModules;

    const version='12.16.0';
    const [appApi,authApi,firestoreApi]=await Promise.all([
      import(`https://www.gstatic.com/firebasejs/${version}/firebase-app.js`),
      import(`https://www.gstatic.com/firebasejs/${version}/firebase-auth.js`),
      import(`https://www.gstatic.com/firebasejs/${version}/firebase-firestore.js`)
    ]);

    const app=appApi.initializeApp(firebaseConfig);
    cloudAuth=authApi.getAuth(app);
    cloudDb=firestoreApi.getFirestore(app);
    firebaseModules={appApi,authApi,firestoreApi};
    return firebaseModules;
  }

  function isAdmin(user=state.authUser){
    if(!user) return false;
    const email=String(user.email||'').trim().toLowerCase();
    return user.uid===FIREBASE_ADMIN_UID || email===FIREBASE_ADMIN_EMAIL;
  }

  function cloudStoreName(store){
    return ({
      [STORE_METHODS]:'methods',
      [STORE_NOTES]:'notes',
      [STORE_CATEGORIES]:'categories'
    })[store]||null;
  }

  function cleanCloudValue(store,value){
    const copy=JSON.parse(JSON.stringify(value));
    if(store===STORE_METHODS){
      delete copy.images;
    }
    return copy;
  }

  function localPut(store,value){
    return new Promise((resolve,reject)=>{
      const req=txStore(store,'readwrite').put(value);
      req.onsuccess=()=>resolve(value);
      req.onerror=()=>reject(req.error);
    });
  }

  function localDelete(store,key){
    return new Promise((resolve,reject)=>{
      const req=txStore(store,'readwrite').delete(key);
      req.onsuccess=()=>resolve();
      req.onerror=()=>reject(req.error);
    });
  }

  function localClear(store){
    return new Promise((resolve,reject)=>{
      const req=txStore(store,'readwrite').clear();
      req.onsuccess=()=>resolve();
      req.onerror=()=>reject(req.error);
    });
  }

  async function queueCloudPut(store,value){
    if(!cloudSyncActive || applyingRemote || !state.authUser) return;
    const collectionName=cloudStoreName(store);
    if(!collectionName) return;

    try{
      const {firestoreApi}=await loadFirebase();
      await firestoreApi.setDoc(
        firestoreApi.doc(cloudDb,'users',state.authUser.uid,collectionName,value.id),
        cleanCloudValue(store,value)
      );
      setSyncStatus('synced');
    }catch(error){
      console.error('云端保存失败',error);
      setSyncStatus('error');
    }
  }

  async function queueCloudDelete(store,key){
    if(!cloudSyncActive || applyingRemote || !state.authUser) return;
    const collectionName=cloudStoreName(store);
    if(!collectionName) return;

    try{
      const {firestoreApi}=await loadFirebase();
      await firestoreApi.deleteDoc(
        firestoreApi.doc(cloudDb,'users',state.authUser.uid,collectionName,key)
      );
      setSyncStatus('synced');
    }catch(error){
      console.error('云端删除失败',error);
      setSyncStatus('error');
    }
  }

  function setSyncStatus(status){
    state.syncStatus=status;
    renderAccountStatus();
  }

  function renderAccountStatus(){
    const el=document.getElementById('accountStatusText');
    if(!el) return;

    if(!state.authUser){
      el.textContent='未登录';
      return;
    }

    const labels={
      connecting:'连接中',
      syncing:'同步中',
      synced:'已同步',
      error:'同步异常'
    };
    el.textContent=labels[state.syncStatus]||'已登录';
  }

  function cloudDateValue(item){
    return String(item?.updatedAt||item?.createdAt||'');
  }

  async function mergeLocalCollectionToCloud(store,items,user,options={}){
    const {firestoreApi}=await loadFirebase();
    const collectionName=cloudStoreName(store);
    const ref=firestoreApi.collection(cloudDb,'users',user.uid,collectionName);
    const getRemote=firestoreApi.getDocsFromServer||firestoreApi.getDocs;
    const remoteSnap=await getRemote(ref);
    const remoteItems=remoteSnap.docs.map(d=>({id:d.id,...d.data()}));
    const remoteMap=new Map(remoteItems.map(item=>[item.id,item]));
    const localItems=Array.isArray(items)?items:[];
    const localMap=new Map(localItems.map(item=>[item.id,item]));

    applyingRemote=true;
    try{
      for(const remote of remoteItems){
        const local=localMap.get(remote.id);

        if(!local){
          const downloaded={...remote};
          if(store===STORE_METHODS) downloaded.images=[];
          await localPut(store,downloaded);
          continue;
        }

        if(store===STORE_CATEGORIES){
          const mergedCategory={...local,...remote};
          await localPut(store,mergedCategory);
          continue;
        }

        const localTime=cloudDateValue(local);
        const remoteTime=cloudDateValue(remote);

        if(localTime && (!remoteTime || localTime>remoteTime)){
          await firestoreApi.setDoc(
            firestoreApi.doc(cloudDb,'users',user.uid,collectionName,local.id),
            cleanCloudValue(store,local)
          );
        }else{
          const downloaded={...remote};
          if(store===STORE_METHODS){
            downloaded.images=Array.isArray(local.images)?local.images:[];
          }
          await localPut(store,downloaded);
        }
      }

      /*
       * 本机独有的数据始终上传，不再因“云端暂时为空”而删除。
       * 这能保护电脑里已有、但以前没有成功写入 Firebase 的历史记录。
       */
      for(const local of localItems){
        if(remoteMap.has(local.id)) continue;
        await firestoreApi.setDoc(
          firestoreApi.doc(cloudDb,'users',user.uid,collectionName,local.id),
          cleanCloudValue(store,local)
        );
      }
    }finally{
      applyingRemote=false;
    }

    return {
      remoteCount:remoteItems.length,
      localCount:localItems.length
    };
  }

  async function seedDefaultCategoriesLocal(){
    for(let i=0;i<defaultCategories.length;i++){
      await localPut(STORE_CATEGORIES,{
        ...defaultCategories[i],
        order:i,
        createdAt:nowISO()
      });
    }
  }

  async function prepareLocalAccount(user){
    const ownerKey='ysj-local-owner-v1';
    const currentOwner=safeGetItem(ownerKey)||'guest';

    if(currentOwner!=='guest' && currentOwner!==user.uid){
      applyingRemote=true;
      try{
        await localClear(STORE_METHODS);
        await localClear(STORE_NOTES);
        await localClear(STORE_CATEGORIES);
        await seedDefaultCategoriesLocal();
      }finally{
        applyingRemote=false;
      }
      await reloadData();
    }

    return {
      previousOwner:currentOwner,
      importLocal:currentOwner==='guest'
    };
  }

  async function migrateLocalToCloud(user,options={}){
    setSyncStatus('syncing');
    const importLocal=Boolean(options.importLocal);

    await mergeLocalCollectionToCloud(STORE_CATEGORIES,await getAll(STORE_CATEGORIES),user,{importLocal});
    await mergeLocalCollectionToCloud(STORE_METHODS,await getAll(STORE_METHODS),user,{importLocal});
    await mergeLocalCollectionToCloud(STORE_NOTES,await getAll(STORE_NOTES),user,{importLocal});

    safeSetItem('ysj-local-owner-v1',user.uid);
    await reloadData();

    const {firestoreApi}=await loadFirebase();
    await firestoreApi.setDoc(
      firestoreApi.doc(cloudDb,'users',user.uid),
      {
        email:user.email||'',
        lastLoginAt:nowISO(),
        migrationVersion:2
      },
      {merge:true}
    );
  }

  async function recoverAdminMethodsFromCommunity(user){
    if(!user || !isAdmin(user)) return 0;

    const {firestoreApi}=await loadFirebase();
    const queryRef=firestoreApi.query(
      firestoreApi.collection(cloudDb,'communityMethods'),
      firestoreApi.where('ownerUid','==',user.uid),
      firestoreApi.limit(300)
    );
    const getRemote=firestoreApi.getDocsFromServer||firestoreApi.getDocs;
    const snap=await getRemote(queryRef);
    if(snap.empty) return 0;

    const existing=await getAll(STORE_METHODS);
    const knownIds=new Set(existing.map(item=>item.id));
    const knownCommunityIds=new Set(existing.map(item=>item.communityId).filter(Boolean));
    let recovered=0;

    applyingRemote=true;
    try{
      for(const docSnap of snap.docs){
        const data=docSnap.data();
        const methodId=data.sourceMethodId||`method-${docSnap.id}`;
        if(knownIds.has(methodId)||knownCommunityIds.has(docSnap.id)) continue;

        const category=state.categories.find(c=>c.name===data.category);
        const item={
          id:methodId,
          title:data.title||'未命名方法',
          content:data.content||'',
          categoryId:category?.id||sortedCategories()[0]?.id||'cat-other',
          images:[],
          favorite:false,
          trialStatus:null,
          createdAt:data.createdAt||nowISO(),
          updatedAt:data.updatedAt||data.createdAt||nowISO(),
          lastTriedAt:null,
          communityId:docSnap.id,
          communityStatus:data.status||'published',
          communityAnonymous:data.anonymous!==false
        };

        await localPut(STORE_METHODS,item);
        await firestoreApi.setDoc(
          firestoreApi.doc(cloudDb,'users',user.uid,'methods',item.id),
          cleanCloudValue(STORE_METHODS,item)
        );
        knownIds.add(item.id);
        knownCommunityIds.add(docSnap.id);
        recovered++;
      }
    }finally{
      applyingRemote=false;
    }

    if(recovered) await reloadData();
    return recovered;
  }

  async function ensureAdminMethodsPublished(user=state.authUser,options={}){
    if(!user || !isAdmin(user)){
      return {published:0,failed:0};
    }

    const methods=await getAll(STORE_METHODS);
    let published=0;
    let failed=0;

    for(const method of methods){
      /*
       * 明确手动隐藏的社区内容保持隐藏；
       * 没有社区版本或原本为公开状态的内容，统一保证发布。
       */
      if(method.communityStatus==='hidden') continue;

      try{
        await autoPublishAdminMethod(method,{user});
        published++;
      }catch(error){
        failed++;
        console.error('管理员历史内容补发失败',method?.id,error);
      }
    }

    if(published){
      await reloadData();
    }

    if(failed && !options.silent){
      showToast(`有 ${failed} 条内容未能发布到社区`,null);
    }

    return {published,failed};
  }

  async function resyncCurrentAccount(options={}){
    if(!state.authUser) return;
    const silent=Boolean(options.silent);
    try{
      stopUserCloudListeners();
      cloudSyncActive=false;
      setSyncStatus('syncing');
      await migrateLocalToCloud(state.authUser,{importLocal:true});
      await recoverAdminMethodsFromCommunity(state.authUser);
      const adminPublishResult=await ensureAdminMethodsPublished(state.authUser,{silent:true});
      cloudSyncActive=true;
      await startUserCloudListeners(state.authUser);
      setSyncStatus('synced');
      if(!silent){
        const failed=adminPublishResult?.failed||0;
        showToast(failed?'云同步完成，部分社区内容发布失败':'云端与社区内容已重新同步',null);
      }
    }catch(error){
      console.error('重新同步失败',error);
      setSyncStatus('error');
      if(!silent) showToast('重新同步失败，请检查网络',null);
    }

  async function applyRemoteCollection(store,snapshot){
    applyingRemote=true;
    try{
      const remoteDocs=snapshot.docs.map(d=>({id:d.id,...d.data()}));
      const localItems=await getAll(store);
      const localById=new Map(localItems.map(item=>[item.id,item]));

      /*
       * 实时快照只负责新增和更新，不再根据“缺失”清空本机数据。
       * 删除仍会在当前设备立即生效并写入云端；优先避免历史记录被误删。
       */
      for(const remote of remoteDocs){
        const local=localById.get(remote.id);
        const merged={...remote};

        if(store===STORE_METHODS){
          merged.images=Array.isArray(local?.images)?local.images:[];
        }

        if(!local || cloudDateValue(remote)>=cloudDateValue(local)){
          await localPut(store,merged);
        }
      }
    }finally{
      applyingRemote=false;
    }
    scheduleCloudReload();
  }

  function stopUserCloudListeners(){
    for(const unsub of cloudUnsubs){
      try{unsub();}catch(_){}
    }
    cloudUnsubs=[];
  }

  async function startUserCloudListeners(user){
    const {firestoreApi}=await loadFirebase();
    stopUserCloudListeners();

    for(const [store,collectionName] of [
      [STORE_METHODS,'methods'],
      [STORE_NOTES,'notes'],
      [STORE_CATEGORIES,'categories']
    ]){
      const ref=firestoreApi.collection(cloudDb,'users',user.uid,collectionName);
      const unsub=firestoreApi.onSnapshot(
        ref,
        snap=>applyRemoteCollection(store,snap).catch(console.error),
        error=>{
          console.error('云同步监听失败',error);
          setSyncStatus('error');
        }
      );
      cloudUnsubs.push(unsub);
    }
  }

    if(code.includes('weak-password')) return '密码至少需要 6 位';
    if(code.includes('invalid-email')) return '邮箱格式不正确';
    if(code.includes('too-many-requests')) return '操作过于频繁，请稍后再试';
    if(code.includes('network-request-failed')) return '网络连接失败';
    return '操作失败，请稍后重试';
  }

  async function loginAccount(mode){
    const emailEl = document.getElementById('accountEmail');
    const passEl = document.getElementById('accountPassword');
    const email = emailEl?.value.trim();
    const password = passEl?.value || '';

    if(!email || !password){
      showToast('请填写邮箱和密码',null);
      return;
    }

    // 移动端强力收起键盘 + 延迟处理
    if(document.activeElement && document.activeElement.blur){
      document.activeElement.blur();
    }
    // 强制刷新 viewport（防止键盘遮挡）
    if(window.__ysjRefreshViewport) {
      window.__ysjRefreshViewport(true);
    }

    const buttons = [
      document.getElementById('loginAccount'),
      document.getElementById('registerAccount')
    ].filter(Boolean);
    buttons.forEach(b => { if(b) b.disabled = true; });

    // 额外延迟，确保键盘完全收起
    await new Promise(r => setTimeout(r, 120));

    try{
      const {authApi} = await loadFirebase();
      if(mode === 'register'){
        await authApi.createUserWithEmailAndPassword(cloudAuth, email, password);
        closeSheet();
        showToast('注册成功，正在同步', null);
      }else{
        await authApi.signInWithEmailAndPassword(cloudAuth, email, password);
        closeSheet();
        showToast('登录成功，正在同步', null);
      }
    }catch(error){
      console.error('登录/注册失败', error);
      buttons.forEach(b => { if(b) b.disabled = false; });
      showToast(authErrorText(error), null);
      if(window.__ysjRefreshViewport) window.__ysjRefreshViewport(true);
    }
  }

  function uid(prefix='id'){
    return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;

  function nowISO(){ return new Date().toISOString(); }
  function todayISO(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function esc(str=''){
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  }
  function fmtDate(dateStr){
    if(!dateStr) return '';
    const d = new Date(dateStr.includes('T') ? dateStr : `${dateStr}T00:00:00`);
    const t = new Date();
    const y = new Date(t); y.setDate(t.getDate()-1);
    const same = (a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
    if(same(d,t)) return '今天';
    if(same(d,y)) return '昨天';
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }

  function openDB(){
    return new Promise((resolve,reject)=>{
      const req = indexedDB.open(DB_NAME,DB_VERSION);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if(!d.objectStoreNames.contains(STORE_METHODS)) d.createObjectStore(STORE_METHODS,{keyPath:'id'});
        if(!d.objectStoreNames.contains(STORE_NOTES)) d.createObjectStore(STORE_NOTES,{keyPath:'id'});
        if(!d.objectStoreNames.contains(STORE_CATEGORIES)) d.createObjectStore(STORE_CATEGORIES,{keyPath:'id'});
      };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error);
    });
  }
  function txStore(store,mode='readonly'){ return db.transaction(store,mode).objectStore(store); }
  function getAll(store){
    return new Promise((resolve,reject)=>{
      const req = txStore(store).getAll();
      req.onsuccess=()=>resolve(req.result||[]);
      req.onerror=()=>reject(req.error);
    });
  }
  function put(store,value){
    return localPut(store,value).then(result=>{
      queueCloudPut(store,value);
      return result;
    });
  }

  function del(store,key){
    return localDelete(store,key).then(result=>{
      queueCloudDelete(store,key);
      return result;
    });
  }

  function clearStore(store){
    return localClear(store);
  }

  function sortedCategories(){
    return [...state.categories].sort((a,b)=>{
      const ao=Number.isFinite(a.order)?a.order:Number.MAX_SAFE_INTEGER;
      const bo=Number.isFinite(b.order)?b.order:Number.MAX_SAFE_INTEGER;
      return ao-bo || String(a.createdAt||'').localeCompare(String(b.createdAt||'')) || a.name.localeCompare(b.name,'zh-CN');
    });
  }

  async function ensureCategoryOrder(){
    if(!state.categories.length) return;

    const allOrdered=state.categories.every(c=>Number.isFinite(c.order));
    if(allOrdered) return;

    const usage={};
    state.methods.forEach(m=>usage[m.categoryId]=(usage[m.categoryId]||0)+1);

    const legacyOrder=[...state.categories].sort((a,b)=>{
      if(!!a.pinned!==!!b.pinned) return a.pinned?-1:1;
      return (usage[b.id]||0)-(usage[a.id]||0) || a.name.localeCompare(b.name,'zh-CN');
    });

    for(let i=0;i<legacyOrder.length;i++){
      legacyOrder[i].order=i;
      await put(STORE_CATEGORIES,legacyOrder[i]);
    }
    state.categories=legacyOrder;
  }

  async function persistCategoryOrder(ids){
    const orderedIds=Array.isArray(ids)?ids:[];
    const byId=new Map(state.categories.map(c=>[c.id,c]));

    for(let i=0;i<orderedIds.length;i++){
      const item=byId.get(orderedIds[i]);
      if(!item) continue;
      item.order=i;
      await put(STORE_CATEGORIES,item);
    }

    state.categories=orderedIds.map(id=>byId.get(id)).filter(Boolean);
    renderAll();
  }

  function getFilteredMethods(scope='home'){
    const s = scope==='home' ? state.home : state.favorites;
    const search = s.search.trim().toLowerCase();
    let list = state.methods.filter(m => scope==='home' || m.favorite);
    if(s.category!=='all') list = list.filter(m=>m.categoryId===s.category);
    if(search){
      list = list.filter(m=>{
        const hay = `${m.title} ${m.content} ${categoryName(m.categoryId)}`.toLowerCase();
        return hay.includes(search);
      });
    }
    const sort = scope==='home' ? state.home.sort : 'created';
    list.sort((a,b)=>{
      if(sort==='trial') return (b.lastTriedAt||'').localeCompare(a.lastTriedAt||'') || b.createdAt.localeCompare(a.createdAt);
      if(sort==='updated') return b.updatedAt.localeCompare(a.updatedAt);
      return b.createdAt.localeCompare(a.createdAt);
    });
    return list;
  }

  async function loadCommunityStats(methodId){
    try{
      const {firestoreApi}=await loadFirebase();
      const snap=await firestoreApi.getDocs(
        firestoreApi.collection(cloudDb,'communityMethods',methodId,'votes')
      );
      const counts={total:0,effective:0,neutral:0,unsuitable:0,rate:0};
      snap.forEach(docSnap=>{
        const result=docSnap.data()?.result;
        if(result in counts && result!=='total' && result!=='rate'){
          counts[result]++;
          counts.total++;
        }
      });
      counts.rate=counts.total?Math.round(counts.effective/counts.total*100):0;
      state.community.stats[methodId]=counts;
      if(state.homeScope==='community') renderCommunityHome();
      return counts;
    }catch(error){
      console.error('读取社区统计失败',error);
      return communityStatsFor(methodId);
    }
  }

  async function startCommunityListener(){
    const {firestoreApi}=await loadFirebase();
    if(communityUnsub) communityUnsub();

    const q=firestoreApi.query(
      firestoreApi.collection(cloudDb,'communityMethods'),
      firestoreApi.where('status','==','published'),
      firestoreApi.limit(100)
    );

    communityUnsub=firestoreApi.onSnapshot(
      q,
      snapshot=>{
        state.community.methods=snapshot.docs
          .map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>String(b.updatedAt||b.createdAt||'').localeCompare(String(a.updatedAt||a.createdAt||'')));
        state.community.loading=false;
        if(state.homeScope==='community') renderCommunityHome();
        refreshVisibleCommunityStats();
      },
      error=>{
        console.error('读取社区失败',error);
        state.community.loading=false;
        if(state.homeScope==='community'){
          document.getElementById('homeContent').innerHTML=
            `<div class="community-empty">社区暂时无法连接，请稍后再试。</div>`;
        }
      }
    );
  }

  async function publishCommunityMethod(methodId,status='published'){
    if(!requireLogin()) return;
    const method=methodById(methodId);
    if(!method) return;

    const consent=document.getElementById('communityConsent');
    if(consent && !consent.checked){
      showToast('请先确认社区发布说明',null);
      return;
    }

    try{
      const {firestoreApi}=await loadFirebase();
      const communityId=method.communityId||uid('community');
      let createdAt=nowISO();

      if(method.communityId){
        const oldSnap=await firestoreApi.getDoc(
          firestoreApi.doc(cloudDb,'communityMethods',communityId)
        );
        if(oldSnap.exists()) createdAt=oldSnap.data().createdAt||createdAt;
      }

      const anonymous=document.getElementById('communityAnonymous')?.checked ?? true;
      await firestoreApi.setDoc(
        firestoreApi.doc(cloudDb,'communityMethods',communityId),
        {
          ownerUid:state.authUser.uid,
          sourceMethodId:method.id,
          title:method.title,
          category:categoryName(method.categoryId),
          content:method.content||'',
          anonymous,
          authorName:anonymous?'':String(state.authUser.email||'社区用户').split('@')[0],
          status,
          createdAt,

  function notificationSeenStorageKey(){
    return state.authUser ? `ysj-notification-seen-${state.authUser.uid}` : 'ysj-notification-seen-guest';
  }

  async function loadNotificationSeenAt(){
    if(!state.authUser){
      state.notifications.seenAt='';
      return;
    }

    const localSeen=safeGetItem(notificationSeenStorageKey())||'';
    state.notifications.seenAt=localSeen;

    try{
      const {firestoreApi}=await loadFirebase();
      const snap=await firestoreApi.getDoc(
        firestoreApi.doc(cloudDb,'users',state.authUser.uid,'settings','notifications')
      );
      const cloudSeen=snap.exists()?String(snap.data()?.seenAt||''):'';
      if(cloudSeen>state.notifications.seenAt){
        state.notifications.seenAt=cloudSeen;
        safeSetItem(notificationSeenStorageKey(),cloudSeen);
      }
    }catch(error){
      console.warn('读取消息已读状态失败',error);
    }
  }

  async function saveNotificationSeenAt(value){
    if(!state.authUser) return;
    state.notifications.seenAt=value;
    safeSetItem(notificationSeenStorageKey(),value);

    try{
      const {firestoreApi}=await loadFirebase();
      await firestoreApi.setDoc(
        firestoreApi.doc(cloudDb,'users',state.authUser.uid,'settings','notifications'),
        {seenAt:value,updatedAt:nowISO()},
        {merge:true}
      );
    }catch(error){
      console.warn('保存消息已读状态失败',error);
    }
  }

  function notificationUnreadItems(){
    const seen=state.notifications.seenAt||'';
    return state.notifications.items.filter(item=>String(item.createdAt||'')>seen);

  function renderNotificationStatus(){
    const count=notificationUnreadItems().length;
    const text=document.getElementById('notificationStatusText');
    const dot=document.getElementById('notificationUnreadDot');
    const navDot=document.getElementById('meNavUnreadDot');

    if(text){
      if(!state.authUser) text.textContent='登录后查看';
      else if(state.notifications.loading) text.textContent='正在刷新';
      else text.textContent=count?`${count} 条未读`:'暂无新消息';
    }
    if(dot) dot.classList.toggle('show',count>0);
    if(navDot) navDot.classList.toggle('show',count>0);
  }

  async function refreshNotifications(options={}){
    if(!state.authUser){
      state.notifications.items=[];
      state.notifications.loading=false;
      renderNotificationStatus();
      renderNotifications();
      return;
    }

    const silent=Boolean(options.silent);
    state.notifications.loading=true;
    renderNotificationStatus();
    if(!silent) renderNotifications();

    try{
      const {firestoreApi}=await loadFirebase();
      let methods=[...state.community.methods];

      if(!methods.length){
        const methodSnap=await firestoreApi.getDocs(
          firestoreApi.query(
            firestoreApi.collection(cloudDb,'communityMethods'),
            firestoreApi.where('status','==','published'),
            firestoreApi.limit(100)
          )
        );
        methods=methodSnap.docs.map(docSnap=>({id:docSnap.id,...docSnap.data()}));
      }

      const messageGroups=await Promise.all(methods.map(async method=>{
        try{
          const snap=await firestoreApi.getDocs(
            firestoreApi.collection(cloudDb,'communityMethods',method.id,'comments')
          );
          return snap.docs.map(docSnap=>({
            id:docSnap.id,
            methodId:method.id,
            methodTitle:method.title||'社区方法',
            methodOwnerUid:method.ownerUid||'',
            ...docSnap.data()
          }));
        }catch(error){
          console.warn('读取社区消息失败',method.id,error);
          return [];
        }
      }));

      const uid=state.authUser.uid;
      const items=[];

      for(const comment of messageGroups.flat()){
        if(!comment.authorUid || comment.authorUid===uid) continue;
        const isReply=Boolean(comment.parentCommentId);
        const replyToMe=isReply && comment.parentAuthorUid===uid;
        const activityOnMyMethod=comment.methodOwnerUid===uid;

        if(!replyToMe && !activityOnMyMethod) continue;

        items.push({
          id:`${comment.methodId}:${comment.id}`,
          methodId:comment.methodId,
          commentId:comment.id,
          type:replyToMe?'reply':(isReply?'methodReply':'comment'),
          title:replyToMe
            ? `${comment.authorName||'社区用户'} 回复了你的评论`
            : `${comment.authorName||'社区用户'} ${isReply?'回复了社区评论':'评论了你的方法'}`,
          preview:comment.content||'',
          methodTitle:comment.methodTitle||'社区方法',
          createdAt:comment.createdAt||comment.updatedAt||''
        });
      }

      state.notifications.items=items
        .filter(item=>item.createdAt)
        .sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)));
      state.notifications.refreshedAt=Date.now();
    }catch(error){
      console.error('刷新消息失败',error);
      if(!silent) showToast('消息刷新失败，请稍后重试',null);
    }finally{
      state.notifications.loading=false;
      renderNotificationStatus();
      renderNotifications();
    }
  }

  function communityDetailStats(){
    const counts={total:0,effective:0,neutral:0,unsuitable:0,rate:0};
    for(const vote of state.community.detailVotes){
      if(['effective','neutral','unsuitable'].includes(vote.result)){
        counts[vote.result]++;
        counts.total++;
      }
    }
    counts.rate=counts.total?Math.round(counts.effective/counts.total*100):0;
    return counts;
  }

  function estimateDataUrlBytes(dataUrl){
    if(!dataUrl) return 0;
    const base64=String(dataUrl).split(',')[1]||'';
    return Math.ceil(base64.length*0.75);
  }

  async function compressCommentImage(file){
    if(!file || !String(file.type||'').startsWith('image/')){
      throw new Error('invalid-image');
    }

    let maxSide=900;
    let quality=.78;
    let dataUrl='';

    for(let attempt=0;attempt<6;attempt++){
      dataUrl=await compressImage(file,maxSide,quality);
      if(estimateDataUrlBytes(dataUrl)<=320*1024) return dataUrl;
      maxSide=Math.max(520,Math.round(maxSide*.82));
      quality=Math.max(.5,quality-.08);
    }

    if(estimateDataUrlBytes(dataUrl)>420*1024){
      throw new Error('image-too-large');
    }
    return dataUrl;
  }

    if(!notes.length && !methodsWithoutNotes.length){

    const groups = {};

          const st=statusMeta[m.trialStatus||'none'];
          return `<article class="trial-card compact" data-open-detail="${m.id}">
            <div><h3>${esc(m.title)}</h3></div>
            <span class="status-tag ${st.className}">${st.emoji} ${st.label}</span>

        }).join('')}

    }

  async function calibrateInitialTabLayout(){
    const root=document.documentElement;

    const syncViewportHeight=()=>{
      const vv=window.visualViewport;
      const candidate=Math.round(vv?.height||window.innerHeight||document.documentElement.clientHeight||0);
      if(candidate>320 && !document.body.classList.contains('ysj-keyboard-visible')){
        root.style.setProperty('--ysj-app-height',`${candidate}px`);
      }

      const nav=document.querySelector('.bottom-nav');
      const activePage=document.querySelector('.page.active');
      if(nav) void nav.offsetHeight;
      if(activePage) void activePage.offsetHeight;
    };

    syncViewportHeight();
    await nextLayoutFrame();
    syncViewportHeight();
    await nextLayoutFrame();
    syncViewportHeight();

    window.scrollTo(0,0);

    [80,260,700].forEach(delay=>{
      setTimeout(()=>{
        syncViewportHeight();
        if((window.scrollY||0)<2) window.scrollTo(0,0);
      },delay);
    });
  }

  function topOpenSubpage(){

      const sub=document.getElementById(subpageHistory[i]);
      if(sub?.classList.contains('open')) return sub;
    }

    const openSubs=[...document.querySelectorAll('.subpage.open')];

  function bindScrollBoundaryGuards(){
    /*
     * 页面本身由 body 滚动，二级页面由 .subpage 滚动。
     * 旧逻辑把 touchmove 绑定在不可滚动的 .page/.content 上并 preventDefault，
     * 会导致 iPhone 整页无法上下滑动。这里只在真正可滚动的二级页面边界
     * 做 1px 轻量校准，不再阻止默认滚动。
     */
    const regions=[
      ...document.querySelectorAll('.subpage'),
      document.getElementById('dynamicSheet'),
      document.getElementById('dynamicModal')
    ].filter(Boolean);

    regions.forEach(region=>{
      if(region.dataset.scrollGuard==='1') return;
      region.dataset.scrollGuard='1';

      region.addEventListener('touchstart',()=>{
        const maxScroll=Math.max(0,region.scrollHeight-region.clientHeight);
        if(maxScroll<=1) return;
        if(region.scrollTop<=0) region.scrollTop=1;
        else if(region.scrollTop>=maxScroll) region.scrollTop=maxScroll-1;
      },{passive:true});
    });
  }

  function bindSwipeBack(){
    let swipe=null;

    document.addEventListener('touchstart',e=>{
      if(e.touches.length!==1) return;
      if(document.getElementById('sheetBackdrop').classList.contains('show')) return;
      if(document.getElementById('modalBackdrop').classList.contains('show')) return;
      if(categoryDragState) return;

      const touch=e.touches[0];
      if(touch.clientX>28) return;
      if(e.target.closest('input,textarea,select,[contenteditable="true"]')) return;

      const sub=topOpenSubpage();
      if(!sub) return;
      swipe={sub,startX:touch.clientX,startY:touch.clientY,dx:0,dy:0};
    },{passive:true});

    document.addEventListener('touchmove',e=>{
      if(!swipe||e.touches.length!==1) return;
      const touch=e.touches[0];
      swipe.dx=Math.max(0,touch.clientX-swipe.startX);
      swipe.dy=touch.clientY-swipe.startY;
      if(swipe.dx>16&&swipe.dx>Math.abs(swipe.dy)*1.15) e.preventDefault();
    },{passive:false});

    document.addEventListener('touchend',()=>{
      if(!swipe) return;
      const current=swipe;
      swipe=null;
      if(current.dx>72&&current.dx>Math.abs(current.dy)*1.2){
        closeSubById(current.sub.id);
      }
    },{passive:true});

    document.addEventListener('touchcancel',()=>{swipe=null;},{passive:true});
  }

  async function compressImage(file,max=1400,quality=.82){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>{
        const img=new Image();
        img.onload=()=>{
          let {width,height}=img;
          const scale=Math.min(1,max/Math.max(width,height));
          width=Math.round(width*scale); height=Math.round(height*scale);
          const canvas=document.createElement('canvas');
          canvas.width=width; canvas.height=height;
          canvas.getContext('2d').drawImage(img,0,0,width,height);
          resolve(canvas.toDataURL('image/jpeg',quality));
        };
        img.onerror=reject;
        img.src=reader.result;
      };
      reader.onerror=reject;
      reader.readAsDataURL(file);
    });
  }

  async function autoPublishAdminMethod(method,options={}){
    const user=options.user||state.authUser;
    if(!method || !user || !isAdmin(user)){
      return {ok:false,skipped:true,method};
    }

    const {firestoreApi}=await loadFirebase();
    const communityId=method.communityId||`admin_${method.id}`;
    let createdAt=method.createdAt||nowISO();

    if(method.communityId){
      const oldSnap=await firestoreApi.getDoc(
        firestoreApi.doc(cloudDb,'communityMethods',communityId)
      );
      if(oldSnap.exists()){
        createdAt=oldSnap.data().createdAt||createdAt;
      }
    }

    const updatedAt=nowISO();
    const communityData={
      ownerUid:user.uid,
      sourceMethodId:method.id,
      title:String(method.title||'').trim(),
      category:categoryName(method.categoryId)||'其他',
      content:String(method.content||''),
      anonymous:true,
      authorName:'',
      status:'published',
      createdAt,
      updatedAt
    };

    if(!communityData.title){
      throw new Error('community-title-empty');
    }

    await firestoreApi.setDoc(
      firestoreApi.doc(cloudDb,'communityMethods',communityId),
      communityData
    );

    method.communityId=communityId;
    method.communityStatus='published';
    method.communityAnonymous=true;
    method.updatedAt=updatedAt;

    applyingRemote=true;
    try{
      await localPut(STORE_METHODS,method);
      await firestoreApi.setDoc(
        firestoreApi.doc(cloudDb,'users',user.uid,'methods',method.id),
        cleanCloudValue(STORE_METHODS,method)
      );
    }finally{
      applyingRemote=false;
    }

    const idx=state.methods.findIndex(item=>item.id===method.id);
    if(idx>=0) state.methods[idx]={...method};
    else state.methods.push({...method});

    const communityItem={
      id:communityId,
      ...communityData
    };
    const communityIndex=state.community.methods.findIndex(item=>item.id===communityId);
    if(communityIndex>=0){
      state.community.methods[communityIndex]=communityItem;
    }else{
      state.community.methods.unshift(communityItem);
    }

    if(state.homeScope==='community'){
      renderCommunityHome();
    }

    return {ok:true,method,communityId};
  }

  async function saveMethod(e){
    if(e) e.preventDefault();

    const id=document.getElementById('methodId').value;
    const title=document.getElementById('methodTitle').value.trim();
    const content=document.getElementById('methodContent').value.trim();
    const categoryId=document.getElementById('methodCategory').value;

    if(!title){
      showToast('请填写标题',null);
      return;
    }

    const old=id?methodById(id):null;
    const item={
      id:id||uid('method'),
      title,
      content,
      categoryId,
      images:[...state.formImages],
      favorite:old?.favorite||false,
      trialStatus:old?.trialStatus||null,
      createdAt:old?.createdAt||nowISO(),
      updatedAt:nowISO(),
      lastTriedAt:old?.lastTriedAt||null,
      communityId:old?.communityId||null,
      communityStatus:old?.communityStatus||null,
      communityAnonymous:old?.communityAnonymous??true
    };

    await put(STORE_METHODS,item);

    const idx=state.methods.findIndex(method=>method.id===item.id);
    if(idx>=0) state.methods[idx]=item;
    else state.methods.push(item);

    let adminPublished=false;
    let adminPublishFailed=false;

    if(state.authUser && isAdmin()){
      try{
        const result=await autoPublishAdminMethod(item);
        adminPublished=Boolean(result?.ok);
      }catch(error){
        adminPublishFailed=true;
        console.error('管理员内容自动发布失败',error);
      }
    }

    closeSubById('sub-method-form');
    renderAll();

    if(adminPublishFailed){
      showToast('已保存个人记录，但社区发布失败',null);
    }else if(adminPublished){
      showToast(old?'已保存并更新到社区':'已添加并发布到社区',null);
    }else{
      showToast(old?'已保存修改':'已添加方法',null);
    }
  }

    if(state.detailMethodId===methodId) renderDetail(methodId);
  }

  async function clearCardStatus(methodId){
    const m=methodById(methodId);
    if(!m || !m.trialStatus) return;

    m.trialStatus=null;
    m.lastTriedAt=null;
    m.updatedAt=nowISO();
    await put(STORE_METHODS,m);

    closeSheet();
    renderAll();
    if(state.detailMethodId===methodId) renderDetail(methodId);
  }

  async function quickMarkEffective(methodId){
    const m=methodById(methodId);
    if(!m) return;

    if(m.trialStatus){
      m.trialStatus=null;
      m.lastTriedAt=null;
    }else{
      m.trialStatus='effective';
      m.lastTriedAt=nowISO();
    }

    m.updatedAt=nowISO();
    await put(STORE_METHODS,m);

    renderAll();
    if(state.detailMethodId===methodId) renderDetail(methodId);
  }

  function openQuickTrial(methodId,status=null){
    const m=methodById(methodId); if(!m) return;
    const old=m.trialStatus;
    const selected=status||old||'effective';
    const sheet=document.getElementById('dynamicSheet');
    sheet.innerHTML=`
      <div class="sheet-handle"></div>
      <h3>记录本次试用</h3>
      <div class="sheet-sub">评价会替换当前结果，备注可跳过。</div>
      <div class="field">
        <label>当前评价</label>
        <div class="status-options" id="quickStatusOptions">
          ${['effective','neutral','unsuitable'].map(k=>`<button type="button" data-sheet-status="${k}" class="${selected===k?'selected ':''}${k}" aria-pressed="${selected===k?'true':'false'}">${statusMeta[k].emoji}<br><span>${statusMeta[k].label}</span></button>`).join('')}
        </div>
      </div>
      <div class="field"><label>日期</label><input id="quickDate" type="date" value="${todayISO()}"></div>
      <div class="field"><label>备注（可选）</label><textarea id="quickNote" placeholder="例如：睡得更沉，第二天精神不错…"></textarea></div>
      <div class="sheet-actions">
        <button class="secondary-btn" id="cancelSheet">取消</button>
        <button class="primary-btn" id="saveQuickTrial">保存</button>
      </div>`;
    sheet.dataset.methodId=methodId;
    sheet.dataset.status=selected;
    document.getElementById('sheetBackdrop').classList.add('show');
  }

  async function saveQuickTrial(){
    const sheet=document.getElementById('dynamicSheet');
    const methodId=sheet.dataset.methodId;
    const status=sheet.dataset.status;
    const date=document.getElementById('quickDate').value||todayISO();
    const text=document.getElementById('quickNote').value.trim();
    const m=methodById(methodId);
    if(!m) return;

    m.trialStatus=status;
    m.lastTriedAt=nowISO();
    m.updatedAt=nowISO();
    await put(STORE_METHODS,m);

    if(text){
      const note={
        id:uid('note'),
        methodId,
        date,
        text,
        createdAt:nowISO(),
        methodTitleSnapshot:m.title
      };
      await put(STORE_NOTES,note);
      state.notes.push(note);
    }

    closeSheet();
    renderAll();
    if(state.detailMethodId===methodId) renderDetail(methodId);

    if(text) showToast('已保存试用记录',null);
  }

  function closeSheet(){
    if(document.activeElement?.matches?.('input,textarea,select,[contenteditable="true"]')){
      document.activeElement.blur();
    }
    document.getElementById('sheetBackdrop').classList.remove('show');
    state.community.commentImage=null;
    window.__ysjRefreshViewport?.(true);
  }

  function renderDetail(id){
    const m=methodById(id); if(!m) return;
    state.detailMethodId=id;
    const notes=notesForMethod(id);
    const st=statusMeta[m.trialStatus||'none'];
    const box=document.getElementById('detailContent');
    const imgs=m.images||[];

    box.innerHTML=`
      ${imgs.length?`
        <div class="detail-hero">
          <img id="detailMainImage" class="detail-main-image" src="${imgs[0]}" alt="${esc(m.title)}">
        </div>
        ${imgs.length>1?`
          <div class="detail-thumb-row">
            ${imgs.map((src,i)=>`
              <img class="detail-thumb ${i===0?'active':''}"
                   src="${src}"
                   data-detail-img="${i}"
                   alt="图片 ${i+1}">
            `).join('')}
          </div>`:''}
      `:''}

      <div class="detail-body">
        <div class="detail-head">
          <div class="detail-meta-row">
            <div class="category-tag detail-category">${esc(categoryName(m.categoryId))}</div>
            <button class="fav-btn ${m.favorite?'on':''}"
                    data-fav="${m.id}"
                    aria-label="${m.favorite?'取消收藏':'收藏'}">
              ${m.favorite?'★':'☆'}
            </button>
          </div>
          <h2>${esc(m.title)}</h2>
        </div>

        ${m.content?`<div class="detail-content">${esc(m.content)}</div>`:''}

        ${communityPanelHTML(m)}

        <div class="status-panel refined-status-panel">
          <div class="status-panel-head">
            <strong>使用结果</strong>
            <span class="status-tag ${st.className}">
              ${st.emoji?st.emoji+' ':''}${m.trialStatus?st.label:'未标记'}
            </span>
          </div>
          <div class="status-options">
            ${['effective','neutral','unsuitable'].map(k=>`
              <button data-detail-status="${k}"
                      class="${m.trialStatus===k?'selected':''} ${k}">
                <span>${statusMeta[k].emoji}</span>
                <small>${statusMeta[k].label}</small>
              </button>
            `).join('')}
          </div>
        </div>

        <div class="detail-actions compact-detail-actions">
          <button class="note-outline-action" data-add-note="${m.id}">＋ 添加使用备注</button>
        </div>

        ${notes.length?`
          <section class="detail-notes-section">
            <div class="section-title">
              <h2>使用备注</h2>
              <button data-add-note="${m.id}">新增</button>
            </div>
            <div class="note-list">
              ${notes.map(n=>`
                <article class="note-item">
                  <div class="note-head">
                    <span class="note-date">${fmtDate(n.date)}</span>
                    <div class="note-tools">
                      <button data-edit-note="${n.id}">修改</button>
                      <button data-delete-note="${n.id}">删除</button>
                    </div>
                  </div>
                  <p>${esc(n.text)}</p>
                </article>
              `).join('')}
            </div>
          </section>
        `:''}
      </div>`;
  }

  function openDetail(id){
    if(!methodById(id)) return;
    renderDetail(id); openSub('sub-detail');
  }

  function openNoteSheet(methodId,note=null){
    const m=methodById(methodId); if(!m) return;
    const sheet=document.getElementById('dynamicSheet');
    sheet.innerHTML=`
      <div class="sheet-handle"></div>
      <h3>${note?'修改备注':'添加使用备注'}</h3>
      <div class="sheet-sub">${esc(m.title)}</div>
      <div class="field"><label>日期</label><input id="noteDate" type="date" value="${note?.date||todayISO()}"></div>
      <div class="field"><label>使用感受</label><textarea id="noteText" placeholder="写下一点身体感受或使用情况…">${esc(note?.text||'')}</textarea></div>
      <div class="sheet-actions">
        <button class="secondary-btn" id="cancelSheet">取消</button>
        <button class="primary-btn" id="saveNote">保存</button>
      </div>`;
    sheet.dataset.methodId=methodId;
    sheet.dataset.noteId=note?.id||'';
    document.getElementById('sheetBackdrop').classList.add('show');
  }

  async function saveNote(){
    const sheet=document.getElementById('dynamicSheet');
    const methodId=sheet.dataset.methodId;
    const noteId=sheet.dataset.noteId;
    const text=document.getElementById('noteText').value.trim();
    const date=document.getElementById('noteDate').value||todayISO();
    if(!text){ showToast('请填写备注内容',null); return; }
    const m=methodById(methodId);
    const old=state.notes.find(n=>n.id===noteId);
    const item={id:noteId||uid('note'),methodId,date,text,createdAt:old?.createdAt||nowISO(),methodTitleSnapshot:m?.title||old?.methodTitleSnapshot||''};
    await put(STORE_NOTES,item);
    const idx=state.notes.findIndex(n=>n.id===item.id);
    if(idx>=0) state.notes[idx]=item; else state.notes.push(item);
    if(m){m.lastTriedAt=nowISO();m.updatedAt=nowISO();await put(STORE_METHODS,m);}
    closeSheet(); renderAll(); renderDetail(methodId);
    showToast(old?'已修改备注':'已添加备注',null);
  }
