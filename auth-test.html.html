  /* === 全局 === */
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

  /* === Sidebar === */
  #sidebar, #sidebar-nav {
    scrollbar-width: none;        /* Firefox */
    -ms-overflow-style: none;     /* IE/Edge legacy */
  }
  #sidebar::-webkit-scrollbar,
  #sidebar-nav::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;                /* Chrome/Safari */
  }
  .sidebar-nav-item { transition: all 0.15s ease; }

  /* === Toast === */

<!-- ======================================================================
     Script 2: helpers.js — 工具函数、图片压缩
     ====================================================================== -->
<script>
;(function() {
const H = window.H = {};

// --- ID 生成器 ---
H.uid = (prefix='') => prefix + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);

// --- 日期工具 ---
// 注意：不要用 toISOString().slice(0,10) 做页面日期。
// toISOString 是 UTC 时间，会导致内容日历出现“4号内容显示到5号/3号”的偏移。
H._pad2 = (n) => String(n).padStart(2,'0');
H._fmtLocalDate = (dt) => {
  if(!(dt instanceof Date) || isNaN(dt.getTime())) return '';
  return dt.getFullYear() + '-' + H._pad2(dt.getMonth()+1) + '-' + H._pad2(dt.getDate());
};
H._fmtUTCDate = (dt) => {
  if(!(dt instanceof Date) || isNaN(dt.getTime())) return '';
  return dt.getUTCFullYear() + '-' + H._pad2(dt.getUTCMonth()+1) + '-' + H._pad2(dt.getUTCDate());
};
H.today = () => H._fmtLocalDate(new Date());
H.nowISO = () => new Date().toISOString();
H.fmtDate = (d) => {
  if(!d) return '';
  if(typeof d === 'string') {
    const m = d.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
    if(m) return m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
  }
  const dt = d instanceof Date ? d : new Date(d);
  return H._fmtLocalDate(dt);
};
H.fmtDateTime = (d) => { if(!d)return''; const dt=new Date(d); return dt.toLocaleString('zh-CN'); };
H.heatToTrend = (hl) => hl>=5?'rising':hl>=3?'stable':'falling';
H.fmtNum = (n) => { if(n>=100000000) return (n/100000000).toFixed(1)+'亿'; if(n>=10000) return (n/10000).toFixed(1)+'万'; return String(n); };

// --- 安全标准化日期（Excel 序列号 / ISO / 空 → YYYY-MM-DD）---
H.parseDate = (v) => {
  if(!v) return '';
  if(v instanceof Date && !isNaN(v.getTime())) return H._fmtLocalDate(v);

  if(typeof v === 'string') {
    const s = v.trim();

    // 已是合法 YYYY-MM-DD 字符串
    let m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m && s>='2000-01-01' && s<='2099-12-31') return s;

    // 字符串 YYYY/MM/DD 或 ISO/日期时间 → 直接取日期部分，不走 UTC 转换
    m = s.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
    if(m) return m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');

    // 小红书中文日期: "2026年07月05日19时45分02秒" → 2026-07-05
    const cnMatch = s.match(/^(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/);
    if(cnMatch) return cnMatch[1] + '-' + cnMatch[2].padStart(2,'0') + '-' + cnMatch[3].padStart(2,'0');
  }

  // 数字 → Excel 序列号。这里用 UTC 日期，不受浏览器时区影响。
  const num = Number(v);
  if(!isNaN(num) && num > 10000 && num < 80000) {
    const ms = (num - 25569) * 86400000;
    const d = new Date(ms);
    return H._fmtUTCDate(d);
  }

  // 兜底：仅给非标准输入使用本地日期
  if(typeof v === 'string') {
    const d = new Date(v);
    if(!isNaN(d.getTime())) return H._fmtLocalDate(d);
  }
  return '';
};

// --- 标准化列表显示日期（安全输出 YYYY-MM-DD 或 '-'）---
H.showDate = (v) => { const r=H.parseDate(v); return r||(v&&typeof v==='string'?v:'-'); };

// --- 获取本周起止 ---
H.thisWeek = () => {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day===0?6:day-1));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  return { start: H.fmtDate(monday), end: H.fmtDate(sunday) };
};

// --- 获取指定日期的周一 ---
H.mondayOf = (d) => {
  const s = H.parseDate(d);
  let dd;
  if(s) {
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    dd = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  } else {
    dd = new Date(d || Date.now());
  }
  const day = dd.getDay();
  dd.setDate(dd.getDate() - (day===0?6:day-1));
  return H.fmtDate(dd);
};

// --- 合成 publishAt（日期 + 时间） ---
H.publishAt = (c) => {
  if(!c.publishDate) return null;
  const t = c.publishTime || '00:00';
  return c.publishDate + ' ' + t;
};

// --- 防转义 HTML ---
H.esc = (s) => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };

// --- 模板渲染（简易） ---
H.tpl = (html, data) => html.replace(/\{\{(\w+)\}\}/g, (_,k) => data[k]!=null?String(data[k]):'');

// --- 按字段排序 ---
H.sortBy = (arr, key, desc=false) => {
  return [...arr].sort((a,b)=>{
    let va=a[key], vb=b[key];
    if(typeof va==='string') va=va.toLowerCase(), vb=(vb||'').toLowerCase();
    if(va==null)va=''; if(vb==null)vb='';
    if(va<vb)return desc?1:-1; if(va>vb)return desc?-1:1; return 0;
  });
};

// --- 筛选 ---
H.filter = (arr, filters) => {
  return arr.filter(item => {
    for(const [key,val] of Object.entries(filters)) {
      if(!val || val==='all') continue;
      if(key==='tags') { if(!item.tags||!item.tags.includes(val)) return false; }
      else if(key==='search') { const s=val.toLowerCase(); if(!JSON.stringify(item).toLowerCase().includes(s)) return false; }
      else { if(item[key]!==val) return false; }
    }
    return true;
  });
};

// --- 图片压缩 + 上传到 Supabase Storage ---
H.compressImage = (file) => new Promise((resolve, reject) => {
  if(!file||!file.type.startsWith('image/')) return reject(new Error('不是图片文件'));
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      const maxSide = C.IMG_MAX_SIDE;
      if(w>maxSide||h>maxSide) {
        const ratio = Math.min(maxSide/w, maxSide/h);
        w = Math.round(w*ratio); h = Math.round(h*ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(async (blob) => {
        try {
          // 生成唯一文件名
          const ext = 'jpg';
          const fileName = Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8) + '.' + ext;
          // 上传到 Supabase Storage
          const { data, error } = await SUPABASE.storage
            .from('images')
            .upload(fileName, blob, { contentType: 'image/jpeg', upsert: false });
          if(error) {
            console.error('❌ [Storage] 上传失败:', error.message);
            // 降级：返回 base64
            const fr = new FileReader();
            fr.onloadend = () => resolve(fr.result);
            fr.readAsDataURL(blob);
            return;
          }
          // 获取公开 URL
          const { data: urlData } = SUPABASE.storage.from('images').getPublicUrl(fileName);
          window.CONTENT_OS_DEBUG && console.log('✅ [Storage] 上传成功:', urlData.publicUrl);
          resolve(urlData.publicUrl);
        } catch(e) {
          console.error('❌ [Storage] 异常:', e.message);
          // 降级：返回 base64
          const fr = new FileReader();
          fr.onloadend = () => resolve(fr.result);
          fr.readAsDataURL(blob);
        }
      }, C.IMG_FORMAT, C.IMG_QUALITY);
    };
    img.onerror=()=>reject(new Error('图片加载失败'));
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
});

// --- 文件大小格式化 ---
H.fmtSize = (bytes) => {
  if(bytes<1024)return bytes+'B';
  if(bytes<1048576)return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
};

// --- 文本截断 ---
H.truncate = (text, maxChars=20) => {
  if(!text) return '';
  if(text.length <= maxChars) return text;
  return text.slice(0, maxChars) + '...';
};

// --- 封面图兼容读取（优先级：coverImage → cover → image → thumbnail） ---
H.getCoverImage = (item) => {
  if(!item) return null;
  const val = item.coverImage || item.cover || item.image || item.thumbnail || null;
  // 只有合法的 data: URI 才返回
  if(val && typeof val === 'string' && (val.startsWith('data:') || val.startsWith('http'))) return val;
  return null;
};

// --- 数字格式化 ---
H.fmtNum = (n) => { if(n==null)return'-'; if(n>=10000)return (n/10000).toFixed(1)+'万'; return String(n); };

})();
</script>
<!-- ======================================================================
     Script 3: store.js — 数据仓库、CRUD、localStorage、导入导出
     ====================================================================== -->
<script>
;(function() {
const S = window.S = {};

// --- 默认空数据库 ---
S.emptyDB = () => ({
  version: C.VERSION,
  lastModified: H.nowISO(),
  inspirations: [],
  topics: [],
  contents: [],
  config: {
    themes: [...C.DEFAULT_THEMES],
    formats: [...C.DEFAULT_FORMATS],
    hooks: [...C.DEFAULT_HOOKS],
    goals: [...C.DEFAULT_GOALS],
    platforms: [...C.DEFAULT_PLATFORMS],
    channels: [...C.DEFAULT_CHANNELS],
  }
});

// ==================== IndexedDB 封装 ====================
S._idb = (()=>{
  let _db = null;
  const DB_NAME = 'ContentOS';
  const DB_VERSION = 3;
  const STORES = ['inspirations','topics','contents','users','knowledge','competitors','images','backups'];
  // ⚠️ 数据库名称保持不变 (ContentOS)，避免丢失已有关键数据

  const open = () => new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      const oldVer = e.oldVersion;
      window.CONTENT_OS_DEBUG && console.log('🔄 [IDB] onupgradeneeded: v' + oldVer + ' → v' + DB_VERSION + ', 已有stores: ' + [...db.objectStoreNames].join(','));
      // v1→v2: 旧 experiments store 保留（S.load 合并到 users）
      // v2→v3: 新增 backups store
      // 创建所有当前需要的 stores（不删除任何已有 store）
      STORES.forEach(name => {
        if(!db.objectStoreNames.contains(name)) {
          window.CONTENT_OS_DEBUG && console.log('🔄 [IDB] 创建新 store: ' + name);
          db.createObjectStore(name, { keyPath: 'id' });
        }
      });
      if(!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => reject(e.target.error);
  });

  const getAll = (storeName) => new Promise((resolve, reject) => {
    if(!_db) return resolve([]);
    const tx = _db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result||[]);
    req.onerror = () => reject(req.error);
  });

  const putAll = (storeName, items) => new Promise((resolve, reject) => {
    if(!_db) return resolve();
    const tx = _db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    store.clear();
    items.forEach(item => store.put(item));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });

  const put = (storeName, item) => new Promise((resolve, reject) => {
    if(!_db) return resolve();
    const tx = _db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(item);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });

  const remove = (storeName, id) => new Promise((resolve, reject) => {
    if(!_db) return resolve();
    const tx = _db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });

  const clearAll = async (storeNames) => {
    for(const name of storeNames) {
      await new Promise((resolve, reject) => {
        if(!_db) return resolve();
        const tx = _db.transaction(name, 'readwrite');
        tx.objectStore(name).clear();
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }
  };

  const getSize = async () => {
    let total = 0;
    for(const name of STORES) {
      const items = await getAll(name);
      total += JSON.stringify(items).length;
    }
    return total;
  };

  return { open, getAll, putAll, put, remove, clearAll, getSize, STORES };
})();

// ==================== 自动备份系统 ====================
S._backupKeep = 50;
S._backupCooldown = false;
S._lastDailySnapshot = null;
S._lastModifiedCount = 0;
S._modifyBurstCount = 0;
S._modifyBurstTimer = null;

S._doBackup = async (trigger) => {
  if(S._backupCooldown) return;
  S._backupCooldown = true;
  setTimeout(()=>{ S._backupCooldown = false; }, 3000);

  try {
    // 扫描已有备份
    const existing = await S._idb.getAll('backups');
    // 按时间排序
    existing.sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||''));
    // 删除超出数量的旧备份
    while(existing.length >= S._backupKeep) {
      await S._idb.remove('backups', existing[0].id);
      existing.shift();
    }
    // 创建新备份（快照当前 S.db，不包含 images）
    const snapshot = {
      id: H.uid('bak_'),
      createdAt: H.nowISO(),
      trigger: trigger||'manual',
      version: C.VERSION,
      data: {
        inspirations: S.db.inspirations||[],
        topics: S.db.topics||[],
        contents: S.db.contents||[],
        users: S.db.users||[],
        knowledge: S.db.knowledge||[],
        competitors: S.db.competitors||[],
        templates: S.db.templates||[],
        config: S.db.config||{}
      }
    };
    await S._idb.put('backups', snapshot);
    const total = await S._idb.getAll('backups');
    window.CONTENT_OS_DEBUG && console.log('📦 [BACKUP] ' + trigger + ' → 共 ' + total.length + ' 个备份 (最近保留 ' + S._backupKeep + ' 个)');
  } catch(e) {
    console.warn('📦 [BACKUP] 备份失败:', e);
  }
};

// 手动备份 → 并下载 JSON 文件
S.downloadBackup = async () => {
  const db = S.db;
  const backups = await S._idb.getAll('backups');
  const snapshot = {
    exportedAt: H.nowISO(),
    version: C.VERSION,
    inspirations: db.inspirations||[],
    topics: db.topics||[],
    contents: db.contents||[],
    users: db.users||[],
    knowledge: db.knowledge||[],
    competitors: db.competitors||[],
    templates: db.templates||[],
    config: db.config||{},
    _backups: backups
  };
  const json = JSON.stringify(snapshot, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const now = new Date();
  const ts = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+'-'+String(now.getMinutes()).padStart(2,'0');
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='ContentOS_Backup_'+ts+'.json';
  a.click(); URL.revokeObjectURL(url);
  await S._doBackup('手动');
};

// 从 JSON 文件恢复
S.restoreFromFile = (jsonStr) => {
  try {
    const snap = JSON.parse(jsonStr);
    if(!snap.contents && !snap.topics && !snap.data) throw new Error('无效的备份文件');
    const data = snap.data || snap; // 兼容新旧格式
    // 覆盖写入 S.db
    S.db.inspirations = data.inspirations || [];
    S.db.topics = data.topics || [];
    S.db.contents = data.contents || [];
    S.db.users = data.users || [];
    S.db.knowledge = data.knowledge || [];
    S.db.competitors = data.competitors || [];
    S.db.templates = data.templates || [];
    if(data.config) {
      for(const ck of Object.keys(data.config)) S.db.config[ck] = data.config[ck];
    }
    S.db.version = C.VERSION;
    S.db.lastModified = H.nowISO();
    S.save();
    return true;
  } catch(e) {
    console.error('恢复失败:', e);
    return false;
  }
};

S.load = async () => {
  window.CONTENT_OS_DEBUG && console.log('☁️  [LOAD] ===== 开始从 Supabase 加载 =====');
  window.CONTENT_OS_DEBUG && console.log('🔍 [S.DB BEFORE] 加载前 S.db 状态:', (S.db ? Object.keys(S.db) : 'null'));

  const results = {};
  let total = 0;

  for(const tbl of ['topics','contents','inspirations','users']) {
    try {
      const { data, error } = await SUPABASE.from(tbl).select('*');
      window.CONTENT_OS_DEBUG && console.log('🔍 [SUPABASE RAW] ' + tbl + ' → error=' + (error ? error.message : 'null') + ', data=' + (data ? data.length + '条' : 'null'), data||[]);
      if(error) { console.error('❌ [LOAD] ' + tbl + ': ' + error.message); results[tbl]=[]; continue; }
      results[tbl] = data || [];
      total += results[tbl].length;
    } catch(e) { console.error('❌ [LOAD] ' + tbl + ': ' + e.message); results[tbl]=[]; }
  }

  // 反向映射 snake_case → camelCase
  const mapped_topics = (results.topics||[]).map(_toCamel2);
  const mapped_contents = (results.contents||[]).map(_toCamel2);
  const mapped_inspirations = (results.inspirations||[]).map(_toCamel2);
  const mapped_users = (results.users||[]).map(_toCamel2);
  window.CONTENT_OS_DEBUG && console.log('🔍 [MAPPED DATA] topics:', mapped_topics.length + '条', mapped_topics[0]||null);
  window.CONTENT_OS_DEBUG && console.log('🔍 [MAPPED DATA] contents:', mapped_contents.length + '条', mapped_contents[0]||null);
  window.CONTENT_OS_DEBUG && console.log('🔍 [MAPPED DATA] users:', mapped_users.length + '条');

  S.db = {
    version: C.VERSION, lastModified: H.nowISO(),
    topics: mapped_topics,
    contents: mapped_contents,
    inspirations: mapped_inspirations,
    users: mapped_users, knowledge: [], competitors: [], templates: [],
    config: {}
  };
  window.CONTENT_OS_DEBUG && console.log('🔍 [S.DB AFTER] S.db.topics:', S.db.topics.length + '条', S.db.topics);
  window.CONTENT_OS_DEBUG && console.log('🔍 [S.DB AFTER] S.db.contents:', S.db.contents.length + '条', S.db.contents);
  window.CONTENT_OS_DEBUG && console.log('☁️  [LOAD] ===== 完成: ' + total + ' 条 =====');

  // 加载 config
  try {
    const { data: cfgRows } = await SUPABASE.from('config').select('*');
    if(cfgRows) cfgRows.forEach(c => { S.db.config[c.key] = c.value; });
  } catch(_) {}
  const defCfg = S.emptyDB().config;
  for(const ck of Object.keys(defCfg)) { if(!(ck in S.db.config)) S.db.config[ck] = defCfg[ck]; }

  // 统一内容日期字段，避免内容库和内容日历使用不同格式导致错位。
  if(Array.isArray(S.db.contents)) {
    S.db.contents = S.db.contents.map(c => ({
      ...c,
      publishDate: H.parseDate(c.publishDate) || c.publishDate || '',
      publishTime: String(c.publishTime || '').match(/(\d{1,2})[:：](\d{2})/)
        ? String(String(c.publishTime || '').match(/(\d{1,2})[:：](\d{2})/)[1]).padStart(2,'0') + ':' + String(c.publishTime || '').match(/(\d{1,2})[:：](\d{2})/)[2]
        : (c.publishTime || '')
    }));
  }
  return true;
};

// --- 数据迁移 ---
S._migrate = () => {
  const def = S.emptyDB();
  // 确保所有顶级字段存在
  for(const key of Object.keys(def)) {
    if(!(key in S.db)) S.db[key] = def[key];
  }
  // 确保 config 子字段存在
  for(const ck of Object.keys(def.config)) {
    if(!(ck in S.db.config)) S.db.config[ck] = def.config[ck];
  }
  // 确保每个 content 有 productionCostMinutes
  if(S.db.contents) S.db.contents.forEach(c=>{ if(c.productionCostMinutes==null) c.productionCostMinutes=0; });
  // 确保每个 content 的 metrics 有完整字段
  if(S.db.contents) S.db.contents.forEach(c=>{
    if(!c.metrics) c.metrics={};
    const numFields=['exposure','views','likes','comments','favorites','shares','downloads','followerGrowth','adCost'];
    numFields.forEach(f=>{ c.metrics[f]=parseInt(c.metrics[f])||0; });
    if(!('recordDays' in c.metrics)) c.metrics.recordDays=[];
    if(!('dataUpdatedAt' in c.metrics)) c.metrics.dataUpdatedAt=null;
  });
  // 确保 review 字段
  if(S.db.contents) S.db.contents.forEach(c=>{
    if(!c.review) c.review={why:'',result:'',successReasons:'',failureReasons:'',optimization:''};
  });
  // 确保每个 content 有 publishDate（从 createdAt 推导，若为 ISO 则取日期部分）
  if(S.db.contents) S.db.contents.forEach(c=>{
    if(!c.publishDate && c.createdAt) c.publishDate = c.createdAt.slice(0,10);
    if(!c.publishDate) c.publishDate = H.today();
    // 标准化：Excel 序列号 → YYYY-MM-DD
    const norm = H.parseDate(c.publishDate);
    if(norm && norm !== c.publishDate) c.publishDate = norm;
    const norm2 = H.parseDate(c.createdAt);
    if(norm2 && norm2 !== c.createdAt) c.createdAt = norm2;
    // 封面字段统一：cover/image/thumbnail → coverImage
    if(c.cover || c.image || c.thumbnail) {
      if(!c.coverImage || (!c.coverImage.startsWith('data:') && !c.coverImage.startsWith('http'))) {
        c.coverImage = c.cover || c.image || c.thumbnail || null;
      }
      delete c.cover; delete c.image; delete c.thumbnail;
    }
  });
  // 确保每个 topic 有 sourceInspirationId（元数据兼容旧数据）
  if(S.db.topics) S.db.topics.forEach(t=>{
    if(t.sourceInspirationId===undefined) t.sourceInspirationId = null;
    // ⚠️ 确保 topic.status 永不被覆盖：如果已有合法状态则保持，否则设为 todo
    if(!C.TOPIC_STATUSES.includes(t.status)) t.status = 'todo';
  });
  S.db.version = C.VERSION;
  // 仅在数据真正来自用户时保存（由 S.load 的调用方决定是否持久化）
};

// ========== 数据安全层（Data Sanitizer） ==========
// 所有 Supabase 写入必须经过 sanitize
// 步骤：1) camelCase→snake_case 映射  2) 白名单过滤  3) 非法字段丢弃

// --- camelCase → snake_case 映射表 ---
const _CAMEL_TO_SNAKE = {
  createdAt: 'created_at', updatedAt: 'updated_at',
  topicId: 'topic_id', userId: 'user_id',
  heatLevel: 'heat_level', heatValue: 'heat_value',
  mentionCount: 'mention_count',
  contentDirection: 'content_direction', hookStructure: 'hook_structure',
  sourceUrl: 'source_url', sourceLink: 'source_link',
  platformPostIds: 'platform_post_ids', dataSourceType: 'data_source_type',
  publishedAt: 'published_at', fetchedAt: 'fetched_at',
  leaveDate: 'leave_date', joinDate: 'join_date',
  acquisitionCost: 'acquisition_cost',
  estimatedDate: 'estimated_date', plannedDate: 'planned_date',
  estimatedWorkload: 'estimated_workload',
  publishedDate: 'published_date', publishDate: 'publish_date',
  sourcePlatform: 'source_platform',
  sourceInspirationId: 'source_inspiration_id',
  convertedTopicId: 'converted_topic_id',
  parsedMetrics: 'parsed_metrics',
  coverImage: 'cover_image',
  productionCostMinutes: 'production_cost_minutes',
  bodyText: 'body_text', contentLink: 'content_link',
  publishTime: 'publish_time', publishScreenshot: 'publish_screenshot',
  coreContent: 'core_content', recordDays: 'record_days',
  followerGrowth: 'follower_growth', adCost: 'ad_cost',
  dataUpdatedAt: 'data_updated_at',
  rawTitle: 'raw_title',
};

const _toSnake = (key) => _CAMEL_TO_SNAKE[key] || key;

// --- snake_case → camelCase 反向映射（供 S.load 和 S._crud 使用） ---
const _SNAKE_TO_CAMEL2 = {};
for(const [k,v] of Object.entries(_CAMEL_TO_SNAKE)) _SNAKE_TO_CAMEL2[v] = k;
const _toCamel2 = (row) => {
  const out = {};
  for(const k of Object.keys(row)) { out[_SNAKE_TO_CAMEL2[k]||k] = row[k]; }
  return out;
};

const _clean = (table, allowed, obj) => {
  const safe = {};
  const dirty = [];
  const mapped = [];
  for(const k of Object.keys(obj)) {
    const snk = _toSnake(k);
    if(allowed.includes(snk)) {
      if(snk !== k) mapped.push(k + '→' + snk);
      safe[snk] = obj[k];
    } else {
      dirty.push(k);
    }
  }
  if(!safe.id && obj.id) safe.id = obj.id;
  if(!safe.id) console.error('❌ [SANITIZE] ' + table + ' write 缺少 id，已阻止');
  if(dirty.length) console.warn('🧹 [SANITIZE] ' + table + ' 过滤: ' + dirty.join(', '));
  if(mapped.length) window.CONTENT_OS_DEBUG && console.log('🔀 [SANITIZE] ' + table + ' 映射: ' + mapped.join(', '));
  window.CONTENT_OS_DEBUG && console.log('🧹 [SANITIZE OUTPUT] ' + table, safe);
  return safe;
};

const SANITIZE = {
  topics:       (obj) => _clean('topics',      ['id','title','status','created_at','updated_at','platform','theme','format','hook','goal','priority','tags','planned_date','estimated_workload','notes','core_content','source_inspiration_id','source_platform','source_url','cover_image'], obj),
  contents:     (obj) => _clean('contents',    ['id','title','body','created_at','updated_at','platform','theme','format','hook','goal','tags','rating','publish_date','publish_time','content_link','body_text','cover_image','production_cost_minutes','topic_id','source_platform','source_url','metrics','review'], obj),
  inspirations: (obj) => _clean('inspirations',['id','title','content','created_at','updated_at','status','tags','source','description','converted_topic_id'], obj),
  users:        (obj) => _clean('users',       ['id','nickname','name','status','remark','tags','join_date','leave_date','acquisition_cost','platform','source','notes','date','device','created_at','updated_at'], obj),
  knowledge:    (obj) => _clean('knowledge',   ['id','title','content','tags'], obj),
  competitors:  (obj) => _clean('competitors', ['id','title','name','platform','url','notes','tags'], obj),
  templates:    (obj) => _clean('templates',   ['id','title','content','tags'], obj),
};


S._collectionLabel = (collection) => ({

S._crud = (collection) => {
  const tbl = collection;
  const sanitize = SANITIZE[tbl] || ((o) => o);
  return {
    all:   () => S.db[collection],
    get:   (id) => S.db[collection].find(x=>x.id===id)||null,
    add:   async (item) => {
      const before = S.db[collection].length;
      const clean = sanitize(item);
      window.CONTENT_OS_DEBUG && console.log('🔍 [INSERT INPUT] ' + tbl, item);
      window.CONTENT_OS_DEBUG && console.log('🔍 [INSERT CLEAN] ' + tbl, clean);
      try {
        const res = await SUPABASE.from(tbl).upsert(clean, { onConflict: 'id' }).select();
        window.CONTENT_OS_DEBUG && console.log('🔍 [INSERT RESULT] ' + tbl, res);
        const { data: returned, error } = res;
        if(error) {
          console.error('❌ [INSERT ERROR] ' + tbl + ': ' + error.message + ' | ' + JSON.stringify(error));
          alert('保存失败：' + error.message);
          return null;
        }
        if(!returned || returned.length === 0) {
          console.error('❌ [INSERT EMPTY] ' + tbl + ': 返回 data=[] 但无 error');
          alert('保存失败：服务端未返回数据');
          return null;
        }
        window.CONTENT_OS_DEBUG && console.log('🔍 [INSERT DATA] ' + tbl + ': ' + returned.length + ' 条', returned);
        const final = _toCamel2(returned[0]);
        try { localStorage.setItem('content_os_last_cloud_write', H.nowISO()); localStorage.setItem('content_os_last_cloud_write_status', 'ok'); } catch(_) {}
        S.db[collection].push(final);
        window.CONTENT_OS_DEBUG && console.log('✅ [CRUD] '+collection+'.add("'+(item.title||item.content||item.id)+'"): '+before+'→'+S.db[collection].length);
        S._logOperation(collection, '新增', final, '新增了「' + S._operationTargetText(final) + '」');
        return final;
      } catch(e) {
        console.error('❌ [INSERT EXCEPTION] ' + tbl + ':', e.message);
        alert('网络异常：' + e.message);
        return null;
      }
    },
    update: async (id, patch) => {
      const idx=S.db[collection].findIndex(x=>x.id===id);
      if(idx===-1) { console.warn('🔍 [CRUD] '+collection+'.update('+id+') 未找到'); return null; }
      const clean = sanitize(patch);
      window.CONTENT_OS_DEBUG && console.log('🔍 [UPDATE CLEAN] ' + tbl, clean);
      let res = null;
      try {
        res = await SUPABASE.from(tbl).update(clean).eq('id', id).select();
        window.CONTENT_OS_DEBUG && console.log('🔍 [UPDATE RESULT] ' + tbl, res);
        if(res.error) { console.error('❌ [UPDATE ERROR] ' + tbl + ': ' + res.error.message); return null; }
      } catch(e) { console.error('❌ [UPDATE EXCEPTION] ' + tbl + ':', e.message); return null; }

      try { localStorage.setItem('content_os_last_cloud_write', H.nowISO()); localStorage.setItem('content_os_last_cloud_write_status', 'ok'); } catch(_) {}

      // 关键：Supabase 保存成功后，立刻刷新本地内存。
      // 这样内容库和内容日历不用刷新页面，也能马上看到新日期/新时间。
      const returnedRow = res && Array.isArray(res.data) && res.data[0] ? _toCamel2(res.data[0]) : null;
      if(returnedRow) Object.assign(S.db[collection][idx], returnedRow);
      else Object.assign(S.db[collection][idx], patch, {updatedAt:H.nowISO()});

      // 内容日期/时间字段再规范化一次，避免日历分组读到旧格式。
      if(collection === 'contents') {
        S.db[collection][idx].publishDate = H.parseDate(S.db[collection][idx].publishDate) || S.db[collection][idx].publishDate || '';
        if(typeof P !== 'undefined' && P._normalizePublishTime) {
          S.db[collection][idx].publishTime = P._normalizePublishTime(S.db[collection][idx].publishTime);
        }
      }

      S._logOperation(collection, '编辑', S.db[collection][idx], '编辑了「' + S._operationTargetText(S.db[collection][idx]) + '」');
      return S.db[collection][idx];
    },
    remove: async (id) => {
      const before = S.db[collection].length;
      const removedItem = (S.db[collection] || []).find(x => x.id === id) || {id};
      try {
        const { error } = await SUPABASE.from(tbl).delete().eq('id', id);
        if(error) {
          console.error('❌ [SUPABASE] delete ' + tbl + ': ' + error.message);
          alert('删除失败：' + error.message);
          return;
        }
      } catch(e) {
        console.error('❌ [SUPABASE] delete ' + tbl + ':', e.message);
        alert('删除失败：' + e.message);
        return;
      }
      // 只有 Supabase 删除成功后才更新本地内存
      try { localStorage.setItem('content_os_last_cloud_write', H.nowISO()); localStorage.setItem('content_os_last_cloud_write_status', 'ok'); } catch(_) {}
      S.db[collection] = S.db[collection].filter(x => x.id !== id);
      window.CONTENT_OS_DEBUG && console.log('✅ [CRUD] '+collection+'.remove('+id+'): '+before+'→'+S.db[collection].length);
      S._logOperation(collection, '删除', removedItem, '删除了「' + S._operationTargetText(removedItem) + '」');
    },
  };
};

// --- 各实体 CRUD ---
S.inspirations = S._crud('inspirations');
S.topics      = S._crud('topics');
S.contents    = S._crud('contents');

S.users       = S._crud('users');
S.knowledge   = S._crud('knowledge');
S.competitors = S._crud('competitors');
S.templates   = S._crud('templates');

// --- 配置 CRUD ---
S.config = {
  getThemes:    () => S.db.config.themes,
  getFormats:   () => S.db.config.formats,
  getHooks:     () => S.db.config.hooks,
  getGoals:     () => S.db.config.goals,
  getPlatforms: () => S.db.config.platforms,
  getChannels:  () => S.db.config.channels,
  setThemes:    async (arr) => { S.db.config.themes=arr; await SUPABASE.from('config').upsert({key:'themes',value:arr}); },
  setFormats:   async (arr) => { S.db.config.formats=arr; await SUPABASE.from('config').upsert({key:'formats',value:arr}); },
  setHooks:     async (arr) => { S.db.config.hooks=arr; await SUPABASE.from('config').upsert({key:'hooks',value:arr}); },
  setGoals:     async (arr) => { S.db.config.goals=arr; await SUPABASE.from('config').upsert({key:'goals',value:arr}); },
  setPlatforms: async (arr) => { S.db.config.platforms=arr; await SUPABASE.from('config').upsert({key:'platforms',value:arr}); },
  setChannels:  async (arr) => { S.db.config.channels=arr; await SUPABASE.from('config').upsert({key:'channels',value:arr}); },
};

// --- 发布选题 → 内容 ---
S.publishTopic = async (topicId, publishData) => {
  const topic = S.topics.get(topicId);
  if(!topic) { console.warn(`🔍 [DIAG] publishTopic 未找到 topic=${topicId}`); return null; }
  window.CONTENT_OS_DEBUG && console.log(`🔍 [DIAG] publishTopic: topic="${topic.title}" → content, platform=${publishData.platform} date=${publishData.publishDate}`);
  const content = {
    id: H.uid('ct_'),
    topicId: topic.id,
    title: topic.title,
    coverImage: publishData.coverImage||null,
    platform: publishData.platform,
    publishDate: publishData.publishDate||H.today(),
    publishTime: publishData.publishTime||'',
    contentLink: publishData.contentLink||null,
    bodyText: publishData.bodyText||'',
    publishScreenshot: publishData.publishScreenshot||null,
    theme: topic.theme,
    format: topic.format,
    hook: topic.hook,
    goal: topic.goal,
    tags: [...(topic.tags||[])],
    productionCostMinutes: publishData.productionCostMinutes||0,
    metrics: topic.parsedMetrics && Object.values(topic.parsedMetrics).some(v=>v>0) ? {
      exposure:0, likes:topic.parsedMetrics.likes||0, comments:topic.parsedMetrics.comments||0,
      favorites:topic.parsedMetrics.favorites||0, shares:topic.parsedMetrics.shares||0,
      downloads:0, followerGrowth:0, adCost:0, dataUpdatedAt:null, recordDays:[], publishAccount: publishData.publishAccount||'', accountType: publishData.accountType||''
    } : { exposure:0, likes:0, comments:0, favorites:0, shares:0, downloads:0, followerGrowth:0, adCost:0, dataUpdatedAt:null, recordDays:[], publishAccount: publishData.publishAccount||'', accountType: publishData.accountType||'' },
    rating: null,
    review: { why:'', result:'', successReasons:'', failureReasons:'', optimization:'' },
    sourcePlatform: topic.sourcePlatform||'manual',
    sourceUrl: topic.sourceUrl||'',
    createdAt: H.nowISO(),
    updatedAt: H.nowISO()
  };
  await S.contents.add(content);
  await S.topics.update(topicId, { status:'published' });
  // 如果是从灵感转来的，更新灵感状态
  const insp = S.inspirations.all().find(i=>i.convertedTopicId===topicId);
  if(insp) await S.inspirations.update(insp.id, { status:'converted' });
  return content;
};

// --- 灵感转为选题 ---
S.inspirationToTopic = async (inspId) => {
  const insp = S.inspirations.get(inspId);
  if(!insp) return null;
  if(insp.status==='converted') return null; // 已转，防重复
  const topicId = H.uid('top_');
  const topic = {
    id: topicId,
    title: insp.title,
    coreContent: insp.description||'',
    goal: 'exposure',
    priority: 'P2',
    theme: '',
    format: '',
    hook: '',
    tags: [...(insp.tags||[])],
    plannedDate: null,
    estimatedWorkload: '1h',
    status: 'todo',
    notes: insp.source ? '来源：'+insp.source : '',
    sourceInspirationId: inspId,
    createdAt: H.nowISO(),
    updatedAt: H.nowISO()
  };
  await S.topics.add(topic);
  S.inspirations.update(inspId, { status:'converted', convertedTopicId:topicId });
  return topic;
};

// ========== 导入导出 ==========

// --- JSON 导出 ---
S.exportJSON = async () => {
  const backups = await S._idb.getAll('backups');
  const data = { ...S.db, _backups: backups };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const now = new Date();
  const ts = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+'-'+String(now.getMinutes()).padStart(2,'0');
  const a = document.createElement('a');
  a.href=url; a.download='ContentOS_FullBackup_'+ts+'.json';
  a.click(); URL.revokeObjectURL(url);
};

// --- JSON 导入 ---
S.importJSON = async (jsonStr) => {
  try {
    const data = JSON.parse(jsonStr);
    if(!data.topics && !data.contents && !data.config) {
      throw new Error('数据格式不正确，缺少必要字段');
    }
    const existingIds = new Set();
    ['inspirations','topics','contents','users','knowledge','competitors','templates'].forEach(k=>{
      if(S.db[k]) S.db[k].forEach(x => existingIds.add(x.id));
    });
    for(const key of ['inspirations','topics','contents','users','knowledge','competitors','templates']) {
      if(!data[key]) continue;
      const newItems = data[key].filter(x => !existingIds.has(x.id));
      for(const item of newItems) {
        await S[key].add(item);
      }
    }
    if(data.config) {
      for(const ck of ['themes','formats','hooks','goals','platforms','channels']) {
        if(data.config[ck]) {
          const merged = [...new Set([...(S.db.config[ck]||[]), ...data.config[ck]])];
          const setter = 'set' + ck.charAt(0).toUpperCase() + ck.slice(1);
          await S.config[setter](merged);
        }
      }
    }
    return { success: true, message: '导入成功' };
  } catch(e) {
    return { success: false, message: '导入失败：' + e.message };
  }
};

// --- 覆盖导入 ---
S.importJSONOverwrite = (jsonStr) => {
  try {
    const data = JSON.parse(jsonStr);
    if(!data.topics && !data.contents && !data.config) {
      throw new Error('数据格式不正确');
    }
    // 保留 version
    const ver = data.version||C.VERSION;
    S.db = data;
    S.db.version = ver;
    S._migrate();
    S.save();
    return { success:true, message:'数据已覆盖导入（原数据已保留在备份中）' };
  } catch(e) {
    return { success:false, message:'导入失败：'+e.message };
  }
};

// --- CSV 导出（仅内容库） ---
S.exportCSV = () => {
  const contents = S.contents.all();
  if(contents.length===0) return;
  const headers = ['标题','平台','发布时间','链接','主题','形式','钩子','目标','标签','评分','曝光','点赞','评论','收藏','分享','下载','涨粉','投流金额','实际耗时(分)'];
  const rows = contents.map(c=>[
    c.title, c.platform, c.publishDate, c.contentLink||'',
    c.theme, c.format, c.hook, c.goal,
    (c.tags||[]).join('/'), c.rating||'',
    c.metrics?.exposure||0, c.metrics?.likes||0, c.metrics?.comments||0,
    c.metrics?.favorites||0, c.metrics?.shares||0, c.metrics?.downloads||0,
    c.metrics?.followerGrowth||0, c.metrics?.adCost||0,
    c.productionCostMinutes||0
  ]);
  const csvCell = (v) => {
    let value = v == null ? '' : String(v);
    // 防止 Excel / WPS 将外部文本识别为公式；数字类型保持原样。
    if(typeof v === 'string' && /^[=+\-@]/.test(value.trimStart())) value = "'" + value;
    return '"' + value.replace(/"/g,'""') + '"';
  };
  const csv = [headers.join(','), ...rows.map(r=>r.map(csvCell).join(','))].join('\n');
  const BOM = '\uFEFF';
  const blob = new Blob([BOM+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='content-os-contents-'+H.today()+'.csv';
  a.click(); URL.revokeObjectURL(url);
};

})();
</script>
<!-- ======================================================================
     Script 3.5: ai.js — AI 调用层（重试/超时/排队/降级）
     ====================================================================== -->
<script>
;(function() {
window.AI = {};

// --- 配置（可按需替换模型/endpoint） ---
AI._config = {
  baseURL: 'https://api.deepseek.com/v1/chat/completions',
  apiKey: '',          // 运行时从本地配置读取或用户设置
  model: 'deepseek-chat',
  timeout: 25000,       // 单次请求超时 ms
  maxRetries: 2,        // 失败后额外重试次数
  retryDelays: [1000, 4000], // 重试间隔 ms
  dailyRequestLimit: 100, // 当前浏览器每天最多请求次数（仍需在服务商后台设置真实额度）
};
AI._KEY_SESSION = 'content_os_ai_key_session';
AI._KEY_LEGACY = 'content_os_ai_key';
AI._USAGE_KEY = 'content_os_ai_daily_usage_v1';

// --- 初始化：Key 仅保留在当前浏览器会话；自动迁移并删除旧的长期存储值 ---
AI.init = () => {
  try {
    let saved = sessionStorage.getItem(AI._KEY_SESSION) || '';
    if(!saved) {
      const legacy = localStorage.getItem(AI._KEY_LEGACY) || '';
      if(legacy) {
        saved = legacy;
        sessionStorage.setItem(AI._KEY_SESSION, legacy);
        localStorage.removeItem(AI._KEY_LEGACY);
      }
    }
    AI._config.apiKey = saved;
  } catch(_) {
    AI._config.apiKey = '';
  }
};

// --- 设置 API Key：仅当前浏览器会话有效，关闭浏览器后自动清除 ---
AI.setKey = (key) => {
  AI._config.apiKey = String(key || '').trim();
  try {
    if(AI._config.apiKey) sessionStorage.setItem(AI._KEY_SESSION, AI._config.apiKey);
    else sessionStorage.removeItem(AI._KEY_SESSION);
    localStorage.removeItem(AI._KEY_LEGACY);
  } catch(_) {}
};

AI._consumeDailyQuota = () => {
  const today = new Date().toISOString().slice(0,10);
  let usage = { date:today, count:0 };
  try {
    const parsed = JSON.parse(localStorage.getItem(AI._USAGE_KEY) || 'null');
    if(parsed && parsed.date === today) usage = parsed;
  } catch(_) {}
  const limit = Math.max(1, Number(AI._config.dailyRequestLimit) || 100);
  if(Number(usage.count || 0) >= limit) throw new Error('AI_DAILY_LIMIT');
  usage.count = Number(usage.count || 0) + 1;
  try { localStorage.setItem(AI._USAGE_KEY, JSON.stringify(usage)); } catch(_) {}
  return { used:usage.count, limit };
};

// --- 请求队列 ---
AI._queue = [];
AI._busy = false;

AI._processQueue = () => {
  if(AI._busy || AI._queue.length===0) return;
  const next = AI._queue.shift();
  next();
};

// ==================== 核心：AI.request() ====================

AI.request = async (userMessage, opts = {}) => {
  const {
    systemPrompt = '你是一个专业的内容运营助手。',
    model = AI._config.model,
    timeout = AI._config.timeout,
    maxRetries = AI._config.maxRetries,
    temperature = 0.7,
    maxTokens = 2000,
  } = opts;

  if(!AI._config.apiKey) {
    try { AI._config.apiKey = sessionStorage.getItem(AI._KEY_SESSION) || ''; } catch(_) {}
    if(!AI._config.apiKey) throw new Error('AI_API_KEY_MISSING');
  }

  AI._consumeDailyQuota();

  // 入队（保证串行）
  return new Promise((resolve, reject) => {
    const task = async () => {
      AI._busy = true;
      let lastError = null;

      for(let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), timeout);

          const resp = await fetch(AI._config.baseURL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + AI._config.apiKey,
            },
            body: JSON.stringify({
              model,
              messages: [
                { role:'system', content: systemPrompt },
                { role:'user', content: userMessage },
              ],
              temperature,
              max_tokens: maxTokens,
            }),
            signal: controller.signal,
          });

          clearTimeout(timer);

          if(!resp.ok) {
            const errText = await resp.text().catch(()=>'');
            // 5xx / 429 可重试，4xx 不重试
            if(resp.status >= 500 || resp.status === 429) {
              throw new Error('AI_RETRYABLE:'+resp.status+':'+errText);
            }
            throw new Error('AI_HTTP_'+resp.status+':'+errText.slice(0,200));
          }

          const json = await resp.json();
          const content = json.choices?.[0]?.message?.content;
          if(!content) throw new Error('AI_EMPTY_RESPONSE');

          AI._busy = false;
          AI._processQueue();
          resolve(content);
          return;

        } catch(e) {
          lastError = e;
          const msg = e.message || String(e);

          // 不可重试的错误
          if(msg.includes('AI_HTTP_4') && !msg.includes('429')) break;

          // 超时
          if(e.name === 'AbortError') {
            lastError = new Error('AI_TIMEOUT');
          }

          if(attempt < maxRetries) {
            const delay = AI._config.retryDelays[attempt] || 2000;
            console.warn('⚠ AI retry '+(attempt+1)+'/'+maxRetries+' in '+delay+'ms: '+msg.slice(0,60));
            await new Promise(r => setTimeout(r, delay));
          }
        }
      }

      AI._busy = false;
      AI._processQueue();
      reject(lastError || new Error('AI_FAILED'));
    };

    AI._queue.push(task);
    if(!AI._busy) AI._processQueue();
  });
};

// --- 便捷方法 ---
AI.isAvailable = () => !!AI._config.apiKey;

AI.healthCheck = async () => {
  try {
    await AI.request('ping', { maxTokens:10, maxRetries:0, timeout:8000 });
    return true;
  } catch(e) {
    return false;
  }
};

// --- 错误信息友好化 ---
AI.friendlyError = (err) => {
  const msg = (err.message||String(err));
  if(msg.includes('AI_TIMEOUT')) return 'AI 服务响应超时，请稍后重试';
  if(msg.includes('AI_API_KEY_MISSING')) return '未配置 AI API Key，请在设置中配置';
  if(msg.includes('AI_HTTP_401')||msg.includes('AI_HTTP_403')) return 'AI API Key 无效或已过期';
  if(msg.includes('AI_DAILY_LIMIT')) return '已达到当前浏览器今日 AI 请求上限，请明天再试或在服务商后台调整额度';
  if(msg.includes('AI_HTTP_429')) return 'AI 请求过于频繁，请稍后重试';
  if(msg.includes('AI_HTTP_5')) return 'AI 服务暂时不可用，请稍后重试';
  if(msg.includes('AI_RETRYABLE')) return 'AI 服务暂时不稳定，已尝试重试但失败';
  if(msg.includes('AI_EMPTY_RESPONSE')) return 'AI 返回了空内容，请重试';
  return 'AI 服务暂时不可用，请稍后重试';
};

// 初始化
AI.init();

})();
</script>

<script>
;(function() {
const UI = window.UI = {};

// ==================== Toast ====================

UI.toast = (message, type='success') => {
  const colors = { success:'bg-green-50 text-green-800 border-green-200', error:'bg-red-50 text-red-800 border-red-200', info:'bg-blue-50 text-blue-800 border-blue-200', warn:'bg-amber-50 text-amber-800 border-amber-200' };
  const el = document.createElement('div');
  el.className = 'pointer-events-auto flex items-center gap-2 px-4 py-3 rounded-lg border shadow-sm text-sm font-medium toast-enter ' + (colors[type]||colors.info);
  el.textContent = message;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }, 2500);
};

// ==================== Modal ====================

let _modalResolve = null;

UI.openModal = (html, opts={}) => new Promise((resolve) => {
  _modalResolve = resolve;
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  const w = opts.width||'max-w-lg';
  box.className = 'bg-white rounded-modal shadow-modal w-full '+w+' max-h-[85vh] overflow-y-auto mx-4 modal-enter';
  // === 注入标准 Header：提取标题并与 X 组成统一行 ===
  let titleHtml = ''; let bodyHtml = html;
  const hMatch = html.match(/<h([23])\b[^>]*>(.*?)<\/h\1>/s);
  if(hMatch) {
    titleHtml = hMatch[0];
    bodyHtml = html.replace(hMatch[0], '');
  }
  // 从 titleHtml 中提取纯文本（移除外层标签）
  const titleText = titleHtml.replace(/<[^>]+>/g, '').trim();
  const headerBar = `<div class="flex items-center justify-between px-6 py-3 border-b border-gray-100 shrink-0">
    <div class="text-[17px] font-semibold text-gray-900 truncate pr-4">${H.esc(titleText)}</div>
    <button class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors shrink-0" id="modal-close-x" title="关闭" style="font-size:18px;line-height:1">&times;</button>
  </div>`;
  box.innerHTML = headerBar + bodyHtml;
  // 绑定 X 按钮关闭
  const xBtn = box.querySelector('#modal-close-x');
  if(xBtn) xBtn.onclick = () => UI.closeModal(null);
  overlay.classList.remove('hidden');
  // ESC 关闭
  const escHandler = (e) => { if(e.key==='Escape') { UI.closeModal(null); document.removeEventListener('keydown', escHandler); } };
  document.addEventListener('keydown', escHandler);
  // 绑定按钮事件
  box.querySelectorAll('[data-modal-action]').forEach(btn=>{
    btn.addEventListener('click',()=>UI.closeModal(btn.dataset.modalAction));
  });
  // 点击蒙版层关闭弹窗和蒙版
  box.onclick = (e) => e.stopPropagation();
  overlay.onclick = (e) => {
    if(e.target === overlay || !box.contains(e.target)) {
      UI.closeModal(null);
    }
  };
});

UI.closeModal = (result) => {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-box').innerHTML = '';
  if(_modalResolve) { _modalResolve(result); _modalResolve=null; }
};

// ==================== Confirm Modal ====================

UI.confirm = (title, message, opts={}) => {
  const confirmText = opts.confirmText||'确认';
  const cancelText = opts.cancelText||'取消';
  const danger = opts.danger||false;
  const btnClass = danger ? 'cos-btn cos-btn-danger' : 'cos-btn cos-btn-primary';
  const html = `
    <div class="p-6">
      <h3 class="text-base font-semibold text-gray-900 mb-2">${H.esc(title)}</h3>
      <p class="text-sm text-gray-600 mb-6">${H.esc(message)}</p>
      <div class="flex justify-end gap-3">
        <button class="cos-btn cos-btn-secondary" data-modal-action="cancel">${cancelText}</button>
        <button class="${btnClass}" data-modal-action="confirm">${confirmText}</button>
      </div>
    </div>`;
  return UI.openModal(html, {width:'max-w-sm'}).then(r=>r==='confirm');
};

// ==================== Drawer ====================

let _drawerCleanup = null;

UI.openDrawer = (html, opts={}) => {
  const overlay = document.getElementById('drawer-overlay');
  const box = document.getElementById('drawer-box');
  box.innerHTML = html;
  overlay.classList.remove('hidden');
  box.classList.remove('hidden');
  // 重新触发动画
  box.classList.remove('drawer-enter');
  void box.offsetWidth;
  box.classList.add('drawer-enter');
  // 点击详情抽屉背后的蒙版层关闭详情和蒙版
  box.onclick = (e) => e.stopPropagation();
  overlay.onclick = (e) => {
    if(e.target === overlay) UI.closeDrawer();
  };
  // ESC 关闭
  const escHandler = (e) => { if(e.key==='Escape') UI.closeDrawer(); };
  document.addEventListener('keydown', escHandler);
  _drawerCleanup = () => {
    document.removeEventListener('keydown', escHandler);
    overlay.onclick = null;
    box.onclick = null;
  };
  // 绑定关闭按钮
  box.querySelectorAll('[data-drawer-close]').forEach(btn=>{
    btn.addEventListener('click', ()=>UI.closeDrawer());
  });
};

UI.closeDrawer = () => {
  document.getElementById('drawer-overlay').classList.add('hidden');
  document.getElementById('drawer-box').classList.add('hidden');
  document.getElementById('drawer-box').innerHTML = '';
  if(_drawerCleanup) { _drawerCleanup(); _drawerCleanup=null; }
};

// ==================== 图片上传助手 ====================

let _imgResolve = null;

UI.pickImage = () => new Promise((resolve) => {
  const input = document.getElementById('hidden-file-input');
  input.value = '';
  // 移除旧 handler，绑定新 handler
  input.onchange = null;
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) { resolve(null); return; }
    try {
      const b64 = await H.compressImage(file);
      resolve(b64);
    } catch(err) {
      UI.toast('图片处理失败：'+err.message, 'error');
      resolve(null);
    }
  };
  input.click();
});

// ==================== 表单字段渲染器 ====================

UI.renderField = (label, name, type, value, options, placeholder) => {
  let html = `<label class="cos-label">${label}</label>`;
  if(type==='select') {
    html += `<select class="cos-select" name="${name}">`;
    if(placeholder) html += `<option value="">${placeholder}</option>`;
    (options||[]).forEach(o=>{ html += `<option value="${H.esc(o)}" ${value===o?'selected':''}>${H.esc(o)}</option>`; });
    html += '</select>';
  } else if(type==='textarea') {
    html += `<textarea class="cos-textarea" name="${name}" placeholder="${placeholder||''}">${H.esc(value||'')}</textarea>`;
  } else if(type==='image') {
    html += `<div class="flex items-start gap-3" data-image-field="${name}">
      ${value ? `<div class="relative"><img src="${value}" class="img-preview" style="max-width:200px;"><button type="button" class="absolute top-1 right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center" data-remove-image="${name}">×</button></div>` : ''}
      <input type="hidden" name="${name}" value="${H.esc(value||'')}">
      <button type="button" class="cos-btn cos-btn-secondary cos-btn-sm" data-pick-image="${name}">${value?'更换图片':'选择图片'}</button>
    </div>`;
  } else {
    html += `<input class="cos-input" type="${type}" name="${name}" value="${H.esc(value||'')}" placeholder="${placeholder||''}">`;
  }
  return html;
};

// --- 从 FormData 提取值 ---
UI.readForm = (formEl) => {
  const fd = new FormData(formEl);
  const data = {};
  for(const [k,v] of fd.entries()) { data[k]=v; }
  return data;
};

// --- 状态 Badge HTML ---
UI.statusBadge = (status) => {
  const rawStatus = String(status || '');
  const safeStatus = rawStatus.replace(/[^a-zA-Z0-9_-]/g, '');
  const label = C.TOPIC_STATUS_LABEL[rawStatus] || rawStatus;
  return `<span class="inline-flex items-center px-2 py-0.5 whitespace-nowrap rounded-full text-xs font-medium badge-${safeStatus}">${H.esc(label)}</span>`;
};

// --- 评分 Badge ---
UI.ratingBadge = (rating) => {
  if(!rating) return '<span class="text-gray-400 text-xs">-</span>';
  const colors = {S:'bg-yellow-50 text-yellow-700 border-yellow-200',A:'bg-green-50 text-green-700 border-green-200',B:'bg-blue-50 text-blue-700 border-blue-200',C:'bg-gray-50 text-gray-600 border-gray-200'};
  return `<span class="inline-flex items-center px-2 py-0.5 whitespace-nowrap rounded-full text-xs font-medium border ${colors[rating]||colors.C}">${rating}</span>`;
};

// --- 空状态 ---
UI.emptyState = (message, actionHtml) => `
  <div class="flex flex-col items-center justify-center py-16 text-center">
    <div class="text-4xl mb-3 opacity-30">📭</div>
    <p class="text-sm text-gray-500 mb-4">${message}</p>
    ${actionHtml||''}
  </div>`;

})();
</script>

// ==================== 今日工作台 / 内容诊断 / 同步状态 ====================

P._metricRate = (num, den) => {
  num = P._metricNumber(num);
  den = P._metricNumber(den);
  return den > 0 ? num / den : 0;
};

P._contentCompletenessIssues = (c) => {
  const issues = [];
  if(!H.getCoverImage(c)) issues.push('缺封面');
  if(!String(c.bodyText || '').trim()) issues.push('缺正文');
  if(!String(c.contentLink || '').trim()) issues.push('缺链接');
  if(!c.publishDate) issues.push('缺发布时间');
  const m = c.metrics || {};
  const hasCoreData = ['views','exposure','likes','comments','favorites','shares'].some(k => P._metricNumber(m[k]) > 0);
  if(!hasCoreData) issues.push('缺数据');
  return issues;
};

P._contentDiagnosis = (c) => {
  const m = c.metrics || {};
  const views = P._metricNumber(m.views);
  const exposure = P._metricNumber(m.exposure);
  const likes = P._metricNumber(m.likes);
  const comments = P._metricNumber(m.comments);
  const favorites = P._metricNumber(m.favorites);
  const shares = P._metricNumber(m.shares);
  const history = P._trendHistory ? P._trendHistory(c) : P._metricHistory(c);
  const deltaViews = P._trendDeltaFromHistory ? P._trendDeltaFromHistory(history, 'views') : null;
  const issues = P._contentCompletenessIssues(c);

  if(issues.length) return {
    level:'warn',
    label:'资料不完整',
    reason:'这篇内容还缺：' + issues.slice(0,3).join('、') + (issues.length>3?'等':''),
    action:'先补齐链接、正文、封面或导入数据，方便后续复盘。',
    tags: issues.slice(0,3)
  };

  if(deltaViews != null && deltaViews >= Math.max(20, views * 0.15)) return {
    level:'ok',
    label:'还在增长',
    reason:`较上次观看量增长 ${H.fmtNum(deltaViews)}，说明内容还有继续被推荐的迹象。`,
    action:'可以观察 24 小时，适合二创、补充路线或继续跟进同类选题。',
    tags:['值得跟进','可二创']
  };

  const viewRate = P._metricRate(views, exposure);
  const likeRate = P._metricRate(likes, views);
  const favRate = P._metricRate(favorites, views);
  const shareRate = P._metricRate(shares, views);

  if(exposure >= 300 && viewRate > 0 && viewRate < 0.12) return {
    level:'danger',
    label:'封面/标题弱',
    reason:`曝光 ${H.fmtNum(exposure)}，但观看率约 ${(viewRate*100).toFixed(1)}%，点击转化偏低。`,
    action:'优先优化封面标题、首图冲突感和第一句话钩子。',
    tags:['封面弱','标题弱']
  };

  if(views >= 100 && favRate < 0.008 && shareRate < 0.004) return {
    level:'warn',
    label:'收藏价值低',
    reason:`观看量 ${H.fmtNum(views)}，但收藏/分享偏低，说明内容可用信息还不够强。`,
    action:'增加路线、费用、避坑、停车、时间安排等可收藏信息。',
    tags:['收藏低','干货不足']
  };

  if(views >= 100 && likeRate < 0.02 && comments < 2) return {
    level:'warn',
    label:'互动弱',
    reason:`观看量 ${H.fmtNum(views)}，但点赞评论偏低，情绪共鸣或互动引导不足。`,
    action:'补充更具体的情绪场景，结尾加一个低门槛互动问题。',
    tags:['互动弱','情绪不足']
  };

  return {
    level:'info',
    label:'数据正常',
    reason:'当前数据没有明显异常，可以继续观察下一次导入后的增长情况。',
    action:'建议结合增长趋势判断是否复投、二创或归档。',
    tags:['正常观察']
  };
};

P._renderContentDiagBadges = (c) => {
  const d = P._contentDiagnosis(c);
  const cls = d.level === 'ok' ? 'diag-ok' : d.level === 'danger' ? 'diag-danger' : d.level === 'warn' ? 'diag-warn' : 'diag-info';
  return `<div class="mt-1 flex flex-wrap gap-1"><span class="diag-badge ${cls}">${H.esc(d.label)}</span>${(d.tags||[]).slice(0,2).map(t=>`<span class="diag-badge diag-info">${H.esc(t)}</span>`).join('')}</div>`;
};

P._hotspotCleanKeyword = (h) => {

    .trim();
};

P._hotspotGuessCity = (text) => {

  return cities.find(c => String(text || '').includes(c)) || '';
};

P._hotspotFitExamples = (keyword, text) => {

  if(/美食|吃货|夜市|咖啡|小吃|饭店|餐厅/.test(text)) {
    return [
      `为了吃也值得跑一趟的城市自驾路线`,
      `一天吃几家，把城市美食串成路线`,
      `吃货周末自驾，不赶景点只赶饭点`

  if(/电影|电视剧|综艺|音乐|演唱会|取景|同款|一首歌/.test(text)) {

  }

  return [
    `${k} 可以转成“城市打卡 + 自驾路线”的内容`,
    `从 ${k} 的情绪切入，落到具体路线/地点清单`,
    `适合做一篇可收藏的周末自驾攻略`
  ];
};

P._hotspotFitReason = (h) => {
  const score = Number(h.fitScore) || 0;
  const keyword = P._hotspotCleanKeyword(h);
  const text = `${h?.keyword||''} ${h?.title||''} ${h?.category||''} ${h?.angle||''}`;
  const examples = P._hotspotFitExamples(keyword, text).map(x => `【${x}】`).join('、');

  if(/周末|双休|休息日|短途|逃离|附近|2h|2小时|两小时/.test(text)) {
    return `适合从“周末短途逃离/2小时自驾圈/城市周边打卡”切入。比如：${examples}。`;
  }
  if(/三伏|清凉|避暑|高温|夏天|玩水|漂流|海边|看海|湿气|祛湿/.test(text)) {
    return `适合从“夏天避暑/玩水/清凉自驾路线”切入，把热点变成可直接出发的路线清单。比如：${examples}。`;
  }
  if(/毕业|学生|暑假|青春|年轻|自由/.test(text)) {
    return `适合从“毕业旅行/预算有限/第一次认真旅行”切入，做成路线、费用和避坑型内容。比如：${examples}。`;
  }
  if(/快乐|开心|时光|分享|生活|松弛|治愈|浪漫|自由|风/.test(text)) {
    return `适合从“旅行情绪/路上的快乐瞬间/松弛感自驾”切入，不只写景点，更写出发理由。比如：${examples}。`;
  }
  if(/亲子|孩子|家庭|爸妈|父亲|妈妈|老人|长辈/.test(text)) {
    return `适合从“家庭轻松出行/不累人的自驾路线/带爸妈孩子去哪”切入，强调少折腾和好安排。比如：${examples}。`;
  }
  if(/情侣|约会|喜欢|暗恋|恋爱|对象|男友|女友/.test(text)) {
    return `适合从“情侣周末约会/氛围感目的地/短途自驾”切入，做成更有情绪的打卡路线。比如：${examples}。`;
  }
  if(/美食|吃货|夜市|咖啡|小吃|饭店|餐厅/.test(text)) {
    return `适合从“美食自驾/城市吃货路线/夜市咖啡打卡”切入，把吃喝地点串成一条路线。比如：${examples}。`;
  }
  if(/电影|电视剧|综艺|音乐|演唱会|取景|同款|一首歌/.test(text)) {
    return `适合从“跟着影视/音乐去旅行/同款取景地打卡”切入，和你的剧综旅行内容很匹配。比如：${examples}。`;
  }
  if(/AI|智能|助手|攻略|规划|路线|导航|痛点|功能/.test(text)) {
    return `适合从“自驾痛点 + AI 路线规划/攻略生成”切入，能自然带到产品功能。比如：${examples}。`;
  }
  if(/[美食|夜宵|咖啡|夜市]/.test(text)) {
    return `可转城市漫游：适合结合夜市、小吃街、咖啡店和城市一日路线。比如：${examples}。`;
  }
  if(/[电影|电视剧|综艺|音乐|演唱会]/.test(text)) {
    return `可转取景地/同款路线：适合做“跟着热点去旅行”。比如：${examples}。`;
  }
  if(score >= 75) return `高适配：这个热点和旅行/城市/自驾的关联强，可以优先做成具体路线或目的地清单。比如：${examples}。`;
  if(score >= 60) return `值得跟进：可以从“${keyword} + 自驾路线/城市打卡/旅行情绪”切入。比如：${examples}。`;
  return `适配一般：建议先观察，除非能找到明确的城市、路线或自驾角度。可尝试：${examples}。`;
};

P._hotspotShortFitReason = (h) => {
  const reason = String(h?.fitReason || P._hotspotFitReason(h) || '').trim();
  if(!reason) return '';
  return reason
    .replace(/^适配理由[：:]\s*/, '')
    .replace(/。比如[：:]?.*$/,'。')
    .replace(/比如[：:]?.*$/,'')
    .replace(/。可尝试[：:]?.*$/,'。')
    .trim();
};


P._syncStatus = () => {
  let lastCloud = '', lastHot = '', hotStatus = '', hotErr = '';
  try {
    lastCloud = localStorage.getItem('content_os_last_cloud_write') || '';
    lastHot = localStorage.getItem('content_os_last_hotspot_sync') || '';
    hotStatus = localStorage.getItem('content_os_last_hotspot_sync_status') || '';
    hotErr = localStorage.getItem('content_os_last_hotspot_sync_error') || '';
  } catch(_) {}
  const cloudOK = !!S?.db && !!S.db.contents;
  const hotCloudItems = S?.db?.config?.hotspots;
  const hotLocal = P._hotspotReadLocal ? P._hotspotReadLocal() : [];
  const hotSynced = Array.isArray(hotCloudItems) && hotCloudItems.length === hotLocal.length;
  const level = !cloudOK || hotStatus === 'error' ? 'bad' : (!hotSynced && hotLocal.length ? 'warn' : 'ok');
  const label = level === 'bad' ? '同步异常' : level === 'warn' ? '部分本地' : '云端正常';
  const detail = hotStatus === 'error' ? ('热点同步失败：' + (hotErr || '未知原因')) : (hotSynced ? '热点中心已同步到云端' : (hotLocal.length ? '热点中心存在本地数据，正在/等待同步' : '内容数据使用 Supabase'));
  return { level, label, detail, lastCloud, lastHot, hotLocalCount: hotLocal.length, hotCloudCount: Array.isArray(hotCloudItems)?hotCloudItems.length:0 };
};

// ==================== 热点中心 ====================

P._HOTSPOT_STORAGE_KEY = 'content_os_hotspots_v1';
P._HOTSPOT_CONFIG_KEY = 'content_os_hotspot_api_config';
P._hotspotFilter = 'all';
P._hotspotPlatform = 'all';
P._hotspotSearch = '';
P._hotspotPage = 1;
P._hotspotPageSize = 20;

P._hotspotReadLocal = () => {
  try {
    const raw = localStorage.getItem(P._HOTSPOT_STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch(e) {
    console.warn('热点本地数据读取失败', e);
    return [];
  }
};

P._hotspotSyncToCloud = async (items) => {
  const safeItems = Array.isArray(items) ? items : [];
  try {
    if(S?.db?.config) S.db.config.hotspots = safeItems;
    // 注意：SUPABASE 是全局 const，不一定挂在 window 上，所以不能用 window.SUPABASE 判断。
    if(typeof SUPABASE !== 'undefined' && SUPABASE?.from) {
      const { error } = await SUPABASE
        .from('config')
        .upsert({ key:'hotspots', value:safeItems }, { onConflict:'key' });
      if(error) {
        console.warn('热点云端保存失败：', error.message);
        // 本地已保存成功：云端失败只记录状态，不弹红色错误，避免误以为保存失败。
        try { localStorage.setItem('content_os_last_hotspot_sync_status', 'error'); localStorage.setItem('content_os_last_hotspot_sync_error', error.message); } catch(_) {}
        return false;
      }
      window.CONTENT_OS_DEBUG && console.log('✅ 热点云端已保存：', safeItems.length, '条');
      try { localStorage.setItem('content_os_last_hotspot_sync', H.nowISO()); localStorage.setItem('content_os_last_hotspot_sync_status', 'ok'); } catch(_) {}
      return true;
    }
    console.warn('热点云端保存跳过：SUPABASE 未初始化');
    return false;
  } catch(e) {
    console.warn('热点云端保存异常', e);
    // 本地已保存成功：云端异常只记录状态，不弹红色错误，避免误以为保存失败。
    try { localStorage.setItem('content_os_last_hotspot_sync_status', 'error'); localStorage.setItem('content_os_last_hotspot_sync_error', e.message); } catch(_) {}
    return false;
  }
};

P._hotspotLoad = () => {
  const localItems = P._hotspotReadLocal();
  const cloudItems = S?.db?.config?.hotspots;
  if(Array.isArray(cloudItems) && cloudItems.length) {
    // 云端有数据时优先用 Supabase 配置中的热点，避免换文件/换浏览器后丢失。
    try { localStorage.setItem(P._HOTSPOT_STORAGE_KEY, JSON.stringify(cloudItems)); } catch(_) {}
    return cloudItems;
  }
  // 如果当前浏览器有旧版 localStorage 热点，但云端还没有，自动迁移到 Supabase config。
  if(localItems.length && S?.db?.config && (!Array.isArray(cloudItems) || cloudItems.length === 0)) {
    P._hotspotSyncToCloud(localItems);
  }
  return Array.isArray(cloudItems) ? cloudItems : localItems;
};

P._hotspotSave = async (items) => {
  const safeItems = Array.isArray(items) ? items : [];
  let localOK = true;
  if(S?.db?.config) S.db.config.hotspots = safeItems;
  try {
    localStorage.setItem(P._HOTSPOT_STORAGE_KEY, JSON.stringify(safeItems));
    try { localStorage.setItem('content_os_last_hotspot_local_cache_status', 'ok'); } catch(_) {}
  } catch(e) {
    localOK = false;
    // 热点以当前内存/云端 config 为主；本地缓存失败只记录，不再弹“保存失败”，避免每次保存都干扰操作。
    console.warn('热点本地缓存失败，已跳过用户提示：', e.message);
    try {
      localStorage.setItem('content_os_last_hotspot_local_cache_status', 'error');
      localStorage.setItem('content_os_last_hotspot_local_cache_error', e.message || '');
    } catch(_) {}
  }
  const cloudOK = await P._hotspotSyncToCloud(safeItems);
  return { localOK, cloudOK, total:safeItems.length };
};

P._hotspotGetConfig = () => {
  try { return JSON.parse(localStorage.getItem(P._HOTSPOT_CONFIG_KEY) || '{}'); }
  catch(e) { return {}; }
};

P._hotspotSaveConfig = (cfg) => {
  localStorage.setItem(P._HOTSPOT_CONFIG_KEY, JSON.stringify(cfg || {}));
};

P._hotspotNormText = (v) => String(v || '').trim().replace(/\s+/g, ' ');
P._hotspotNormKey = (v) => String(v || '').trim().toLowerCase().replace(/[\s#＃，。！？、:：；;《》“”"'‘’（）()【】\[\]\-_/\\]/g, '');


P._hotspotSearchText = (h) => {
  return [
    h.keyword, h.title, h.category, h.angle, h.fitReason, h.heatText,
    h.platform, h.status, h.sourceUrl, h.rank, h.participants, h.views, h.heat
  ].map(v => String(v || '')).join(' ').toLowerCase();
};

P._hotspotMatchSearch = (h, query) => {
  const q = String(query || '').trim().toLowerCase();
  if(!q) return true;
  const words = q.split(/\s+/).filter(Boolean);
  const text = P._hotspotSearchText(h);
  return words.every(w => text.includes(w));
};

P._hotspotFindDuplicate = (keyword, platform='') => {
  const key = P._hotspotNormKey(keyword);
  if(!key) return null;
  const items = P._hotspotLoad();
  return items.find(h => {
    const hk = P._hotspotNormKey(h.keyword || h.title);
    if(!hk || hk !== key) return false;
    // 同平台优先视为重复；平台为空时全局判断
    if(!platform || !h.platform) return true;
    return h.platform === platform;
  }) || items.find(h => P._hotspotNormKey(h.keyword || h.title) === key) || null;
};



P._hotspotExtractNumber = (v) => {
  if(v == null || v === '') return '';
  if(typeof v === 'number' && !isNaN(v)) return v;
  const s = String(v).replace(/,/g, '').trim();
  const m = s.match(/([0-9]+(?:\.[0-9]+)?)/);
  if(!m) return s;
  let n = parseFloat(m[1]);
  if(/[万wW]/.test(s)) n *= 10000;
  if(/[亿]/.test(s)) n *= 100000000;
  return Math.round(n);
};

P._hotspotFit = (keyword, title, category) => {
  const text = `${keyword || ''} ${title || ''} ${category || ''}`;
  const strong = ['旅行','旅游','自驾','出行','城市','路线','攻略','避暑','暑期','周末','县城','小城','海边','草原','露营','民宿','酒店','亲子','情侣','毕业旅行','打卡','景点','山海','公路'];
  const medium = ['电影','电视剧','综艺','音乐','演唱会','假期','情绪','松弛感','生活方式','美食','咖啡','夜市','拍照','夏天','秋天','春节','国庆','五一'];
  let score = 35;
  strong.forEach(k => { if(text.includes(k)) score += 9; });
  medium.forEach(k => { if(text.includes(k)) score += 4; });
  score = Math.max(20, Math.min(98, score));
  const level = score >= 75 ? '高' : score >= 55 ? '中' : '低';
  let angle = `把「${keyword || title || '这个热点'}」转成自驾游内容：用城市路线、旅行情绪、出行痛点或目的地清单切入。`;
  if(/[旅自驾出行城市路线攻略]/.test(text)) angle = `适合直接做「${keyword || title} + 自驾路线/城市打卡/旅行攻略」内容。`;
  else if(/[影视剧综音乐演唱会]/.test(text)) angle = `适合做「跟着热点去旅行」：关联取景地、城市打卡、同款路线。`;
  else if(/[情绪松弛生活方式]/.test(text)) angle = `适合做情绪型旅行内容：把热点情绪转成“周末逃离城市/慢旅行/自驾治愈路线”。`;
  else if(/[美食咖啡夜市]/.test(text)) angle = `适合做城市漫游内容：小吃街、夜市、咖啡店、城市一日自驾路线。`;
  return { score, level, angle };
};

P._normalizeHotspotItem = (raw, platform, idx=0) => {
  raw = raw || {};
  const keyword = P._hotspotNormText(
    raw.keyword || raw.word || raw.hotword || raw.hot_word || raw.name || raw.title || raw.sentence || raw.query || raw.topic || raw.desc || raw.label
  );
  const title = P._hotspotNormText(raw.title || raw.name || raw.word || raw.keyword || raw.sentence || keyword);
  if(!keyword && !title) return null;
  const category = P._hotspotNormText(raw.category || raw.type || raw.tag || raw.group || raw.classify || '');
  const fit = P._hotspotFit(keyword || title, title, category);
  const participants = P._hotspotExtractNumber(raw.participants || raw.participant || raw.joinCount || raw.join_count || raw.people || raw.users || '');
  const views = P._hotspotExtractNumber(raw.views || raw.viewCount || raw.view_count || raw.browse || raw.browser || raw.read || raw.readCount || raw.read_count || '');
  const heat = P._hotspotExtractNumber(raw.heat || raw.hot || raw.hotValue || raw.hot_value || raw.score || raw.value || raw.num || raw.count || views || participants);
  return {
    id: H.uid('hot_'),
    platform: platform || P._hotspotNormText(raw.platform || raw.source || '未知'),
    keyword: keyword || title,
    title: title || keyword,
    rank: raw.rank || raw.index || raw.order || raw.position || raw.no || (idx + 1),
    participants,
    views,
    heat,
    heatText: P._hotspotNormText(raw.heatText || raw.heat_text || raw.desc || raw.description || ''),
    category,
    sourceUrl: P._hotspotNormText(raw.url || raw.link || raw.shareUrl || raw.share_url || raw.href || raw.uri || ''),
    fitScore: fit.score,
    fitLevel: fit.level,
    fitReason: P._hotspotNormText(raw.fitReason || raw.fit_reason || ''),
    angle: P._hotspotNormText(raw.angle || raw.reason || raw.note || fit.angle),
    status: 'candidate',
    source: raw._source || 'api',
    raw,
    fetchedAt: H.nowISO(),
    createdAt: H.nowISO(),
    updatedAt: H.nowISO()
  };
};

P._extractHotspotList = (json) => {
  if(Array.isArray(json)) return json;
  if(!json || typeof json !== 'object') return [];
  const keys = ['data','list','items','result','results','hot_list','hotList','trending','words','rankings','rankList'];
  for(const k of keys) {
    const v = json[k];
    if(Array.isArray(v)) return v;
    if(v && typeof v === 'object') {
      const nested = P._extractHotspotList(v);
      if(nested.length) return nested;
    }
  }
  return [];
};

P._mergeHotspots = async (newItems) => {
  const oldItems = P._hotspotLoad();
  const byKey = new Map();
  oldItems.forEach(item => byKey.set(`${item.platform}|${P._hotspotNormKey(item.keyword || item.title)}`, item));
  let added = 0, updated = 0;
  newItems.forEach(item => {
    const key = `${item.platform}|${P._hotspotNormKey(item.keyword || item.title)}`;
    const old = byKey.get(key);
    if(old) {
      byKey.set(key, { ...old, ...item, id: old.id, status: old.status || item.status, createdAt: old.createdAt || item.createdAt, updatedAt: H.nowISO() });
      updated++;
    } else {
      byKey.set(key, item);
      added++;
    }
  });
  const merged = Array.from(byKey.values()).sort((a,b)=>(b.fetchedAt||b.createdAt||'').localeCompare(a.fetchedAt||a.createdAt||''));
  const saveResult = await P._hotspotSave(merged);
  return { added, updated, total: merged.length, cloudOK: !!saveResult.cloudOK };
};


P._hotspotAgeDays = (h) => {
  const raw = h?.updatedAt || h?.fetchedAt || h?.createdAt;
  const d = raw ? new Date(raw) : null;
  if(!d || isNaN(d.getTime())) return 0;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
};
P._hotspotIsExpired = (h) => {
  // 已关闭自动过期/自动降权：热点分数保持原样，由人工判断是否忽略或转化。
  return false;
};
P._hotspotEffective = (h) => {
  const item = { ...(h || {}) };
  item._expired = false;
  return item;
};

P._hotspotStatusLabel = (s) => ({candidate:'待判断', expired:'已过期', saved_inspiration:'已存灵感', saved_topic:'已生成选题', ignored:'已忽略'}[s] || s || '待判断');
P._hotspotFitClass = (level) => level === '高' ? 'bg-red-50 text-red-600 border-red-100' : level === '中' ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-gray-50 text-gray-500 border-gray-100';
P._hotspotFitBadgeClass = (score, level) => {
  score = Number(score) || 0;
  if(score >= 75) return 'bg-red-50 text-red-600 border-red-200 ring-1 ring-red-100 font-semibold';
  if(score >= 60) return 'bg-emerald-50 text-emerald-700 border-emerald-200 ring-1 ring-emerald-100 font-semibold';
  if(score >= 55 || level === '中') return 'bg-amber-50 text-amber-700 border-amber-100';
  return 'bg-gray-50 text-gray-500 border-gray-100';
};
P._hotspotFitLabel = (score, level) => {
  score = Number(score) || 0;
  if(score >= 75) return '🔥 高适配 · ' + score;
  if(score >= 60) return '⭐ 值得跟进 · ' + score;
  return '适配' + (level || '低') + ' · ' + score;
};
P._hotspotCardClass = (score) => {
  score = Number(score) || 0;
  if(score >= 75) return 'hotspot-fit-strong';
  if(score >= 60) return 'hotspot-fit-good';
  return '';
};

P.renderHotspots = () => {
  const rawAll = P._hotspotLoad();
  const all = rawAll.map(P._hotspotEffective);
  const cfg = P._hotspotGetConfig();

P._hotspotFormatNumberText = (n) => {
  if(n === '' || n == null) return '';
  const num = Number(n);
  if(isNaN(num)) return String(n || '');
  if(num >= 100000000) return (num / 100000000).toFixed(num % 100000000 === 0 ? 0 : 1).replace(/\.0$/, '') + '亿';
  if(num >= 10000) return (num / 10000).toFixed(num % 10000 === 0 ? 0 : 1).replace(/\.0$/, '') + '万';
  return String(num);
};

P._parseHotspotMetricLine = (line) => {
  const text = String(line || '').replace(/,/g,'').replace(/\s+/g,' ').trim();
  const num = '([0-9]+(?:\\.[0-9]+)?\\s*[万亿wW]?)';
  const joinMatch = text.match(new RegExp(num + '\\s*(?:人)?\\s*参与')) || text.match(new RegExp('参与(?:人数|量)?[：:]?\\s*' + num));
  const viewMatch = text.match(new RegExp(num + '\\s*(?:次)?\\s*浏览')) || text.match(new RegExp('浏览(?:量|次数)?[：:]?\\s*' + num));
  return {
    participants: joinMatch ? P._hotspotExtractNumber(joinMatch[1]) : '',
    views: viewMatch ? P._hotspotExtractNumber(viewMatch[1]) : '',
    heatText: (joinMatch || viewMatch) ? text : ''
  };
};

P._stripHotspotMetrics = (line) => {
  let text = String(line || '').replace(/,/g, '').trim();
  // OCR 识别后经常把“分类 #话题名 热度”放在一行，这里只保留 # 后面的主题部分。
  if(/[＃#]/.test(text)) text = text.replace(/^.*?[#＃]/, '#');
  return text
    .replace(/([0-9]+(?:\.[0-9]+)?\s*[万亿wW]?)\s*(?:人)?\s*参与/g, '')
    .replace(/参与(?:人数|量)?[：:]?\s*([0-9]+(?:\.[0-9]+)?\s*[万亿wW]?)/g, '')
    .replace(/([0-9]+(?:\.[0-9]+)?\s*[万亿wW]?)\s*(?:次)?\s*浏览/g, '')
    .replace(/浏览(?:量|次数)?[：:]?\s*([0-9]+(?:\.[0-9]+)?\s*[万亿wW]?)/g, '')
    .replace(/[·•|｜]+/g, ' ')
    .replace(/^\s*[#＃]\s*/, '')
    .replace(/^(出行|美食|时尚|娱乐|教育|职场|家居|母婴|摄影|旅行|旅游)\s+/, '')
    .trim();
};

P._hotspotIgnoreLine = (line) => {
  const t = String(line || '').trim();
  if(!t) return true;
  if(/^(出行|美食|时尚|娱乐|教育|职场|家居|母婴|摄影|旅行|旅游)$/.test(t)) return true;
  if(/^(笔记灵感|小红书|创作服务平台|推荐|热门|搜索|全部|换一换|查看更多|截图|上传)$/.test(t)) return true;
  if(/^\d+$/.test(t)) return true;
  return false;
};

P._parseHotspotPasteText = (text, defaults={}) => {
  const normalizedText = String(text || '')
    .replace(/\r/g, '\n')
    .replace(/[ \t]*(#|＃)/g, '\n#')
    .replace(/(人参与)\s+([0-9]+(?:\.[0-9]+)?\s*[万亿wW]?\s*(?:次)?浏览)/g, '$1 · $2');
  const lines = normalizedText
    .split('\n')
    .map(x => x.trim())
    .filter(Boolean);
  const items = [];
  const used = new Set();
  const isMetric = (line) => /人参与|次浏览|浏览量|参与/.test(line) && /[0-9]/.test(line);
  const mergeMetric = (a, b) => ({
    participants: a.participants || b.participants || '',
    views: a.views || b.views || '',
    heatText: [a.heatText, b.heatText].filter(Boolean).join(' · ')
  });

  for(let i=0; i<lines.length; i++) {
    if(used.has(i)) continue;
    const line = lines[i];
    if(P._hotspotIgnoreLine(line)) continue;

    let keyword = '';
    let metric = P._parseHotspotMetricLine(line);

    if(/^#|^＃/.test(line) || /[#＃]/.test(line)) {
      keyword = P._stripHotspotMetrics(line);
    } else if(!isMetric(line)) {
      keyword = P._stripHotspotMetrics(line);
    }

    if(!keyword || keyword.length > 60 || P._hotspotIgnoreLine(keyword)) continue;

    // 支持 OCR 把“参与人数”和“浏览量”拆成多行：话题名 / 23.5万人参与 / 3.7亿次浏览。
    for(let j=i+1; j<Math.min(lines.length, i+4); j++) {
      if(used.has(j)) continue;
      if(!isMetric(lines[j])) break;
      metric = mergeMetric(metric, P._parseHotspotMetricLine(lines[j]));
      used.add(j);
    }

    used.add(i);
    const heatText = metric.heatText || [
      metric.participants ? P._hotspotFormatNumberText(metric.participants) + '人参与' : '',
      metric.views ? P._hotspotFormatNumberText(metric.views) + '次浏览' : ''
    ].filter(Boolean).join(' · ');
    const raw = {
      platform: defaults.platform || '小红书',
      keyword,
      title: keyword,
      rank: items.length + 1,
      participants: metric.participants,
      views: metric.views,
      heatText,
      category: defaults.category || '出行',
      _source: defaults.source || '小红书笔记灵感'
    };
    const item = P._normalizeHotspotItem(raw, raw.platform, items.length);
    if(item) items.push(item);
  }
  const seen = new Set();
  return items.filter(item => {
    const key = `${item.platform}|${P._hotspotNormKey(item.keyword)}`;
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
};

P._hotspotLoadOCR = () => {
  if(window.Tesseract?.recognize) return Promise.resolve(window.Tesseract);
  if(P._hotspotOCRPromise) return P._hotspotOCRPromise;
  P._hotspotOCRPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.async = true;
    s.onload = () => window.Tesseract?.recognize ? resolve(window.Tesseract) : reject(new Error('截图识别组件加载失败'));
    s.onerror = () => reject(new Error('截图识别组件加载失败，请检查网络'));
    document.head.appendChild(s);
  });
  return P._hotspotOCRPromise;
};

P._hotspotRecognizeImage = async (file, onProgress) => {
  if(!file || !file.type?.startsWith('image/')) throw new Error('请选择截图图片');
  const Tesseract = await P._hotspotLoadOCR();
  onProgress?.('正在识别截图文字，首次使用会加载语言包，请稍等...');
  const result = await Tesseract.recognize(file, 'chi_sim+eng', {
    logger: (m) => {
      if(!m) return;
      const pct = m.progress ? Math.round(m.progress * 100) : '';
      if(m.status) onProgress?.(`截图识别中：${m.status}${pct ? ' ' + pct + '%' : ''}`);
    }
  });
  return result?.data?.text || '';
};

  const rows = items.slice(0, 60).map((h,i)=>`<tr>

    <td class="px-3 py-2 font-medium text-gray-900">${H.esc(h.keyword || '')}</td>

      </div>

  </div>`;
  const p = UI.openModal(html, {width:'max-w-3xl'});
  setTimeout(()=>{
    const btn = document.getElementById('hotspot-paste-preview');
    const pickBtn = document.getElementById('hotspot-ocr-pick');
    const fileInput = document.getElementById('hotspot-ocr-file');
    const textArea = document.getElementById('hotspot-paste-textarea');
    const statusEl = document.getElementById('hotspot-ocr-status');
    const modalBox = document.getElementById('modal-box');
    const setStatus = (msg, type='info') => {
      if(!statusEl) return;
      statusEl.classList.remove('hidden');
      statusEl.className = 'text-xs mt-2 ' + (type === 'error' ? 'text-red-500' : type === 'ok' ? 'text-emerald-600' : 'text-gray-500');
      statusEl.textContent = msg || '';
    };
    const appendText = (txt) => {
      if(!textArea || !txt) return;
      const old = textArea.value.trim();
      textArea.value = old ? old + '\n\n' + txt.trim() : txt.trim();
      textArea.focus();
    };
    const handleFile = async (file) => {
      if(!file) return;
      try {
        if(pickBtn) { pickBtn.disabled = true; pickBtn.textContent = '识别中...'; }
        if(btn) btn.disabled = true;
        setStatus('正在加载截图识别组件...');
        const txt = await P._hotspotRecognizeImage(file, setStatus);
        if(!txt.trim()) {
          setStatus('没有识别到文字，请换一张更清晰的截图。', 'error');
          return;
        }
        appendText(txt);
        const previewCount = P._parseHotspotPasteText(txt, {
          platform: document.querySelector('#hotspot-paste-form [name="platform"]')?.value || '小红书',
          category: document.querySelector('#hotspot-paste-form [name="category"]')?.value || '出行',
          source: document.querySelector('#hotspot-paste-form [name="source"]')?.value || '小红书笔记灵感'
        }).length;
        setStatus(`截图识别完成，初步识别到 ${previewCount} 条热点。请检查文本后点击“识别并预览”。`, 'ok');

        console.error('热点截图识别失败', e);
        setStatus('截图识别失败：' + (e.message || e), 'error');
      } finally {
        if(pickBtn) { pickBtn.disabled = false; pickBtn.textContent = '📷 上传截图识别'; }
        if(btn) btn.disabled = false;
      }
    };
    if(btn) btn.onclick = () => {
      const form = document.getElementById('hotspot-paste-form');
      UI.closeModal(UI.readForm(form));
    };
    if(pickBtn && fileInput) pickBtn.onclick = () => fileInput.click();
    if(fileInput) fileInput.onchange = () => handleFile(fileInput.files?.[0]);
    if(modalBox) modalBox.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items || [];
      for(const item of items) {
        if(item.type && item.type.startsWith('image/')) {
          e.preventDefault();
          handleFile(item.getAsFile());
          break;
        }
      }
    });
  }, 50);
  const data = await p;
  if(!data || data === 'cancel') return;
  const items = P._parseHotspotPasteText(data.text || '', { platform:data.platform || '小红书', category:data.category || '出行', source:data.source || '小红书笔记灵感' });
  const ok = await P._openHotspotImportPreview(items, '确认导入热点');
  if(!ok) return;
  const result = await P._mergeHotspots(items);
  UI.toast(`热点导入完成：新增 ${result.added} 条，更新 ${result.updated} 条`, 'success');
  P.renderHotspots();
};
