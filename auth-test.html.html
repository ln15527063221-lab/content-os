      </div>
    </div>
    ${s.best ? `<div class="text-xs text-gray-400 mt-3 line-clamp-1">代表：<span class="hover:text-blue-600 cursor-pointer" data-content-trend="${H.esc(s.best.id)}">${H.esc(H.truncate(s.best.title,22))}</span></div>` : ''}
  </div>`).join('');

  return `<div class="cos-card p-5 mb-6">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h3 class="text-sm font-semibold text-gray-700">👥 发布账号分析</h3>
        <div class="text-xs text-gray-400 mt-1">区分主体账号和小号，避免数据混在一起误判。</div>
      </div>
      <span class="text-xs text-gray-400">${stats.length} 个账号</span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">${top}</div>
    <details class="mt-3 rounded-2xl border border-gray-100 bg-white">
      <summary class="cursor-pointer select-none px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900">
        查看全部账号表现
        <span class="text-xs text-gray-400 ml-2">发布数 / 均观看 / 均曝光 / 均点赞</span>
      </summary>
      <div class="border-t border-gray-100 overflow-x-auto">
        <table class="cos-table">
          <thead><tr><th>账号</th><th>类型</th><th>发布数</th><th>均观看</th><th>均曝光</th><th>均点赞</th></tr></thead>
          <tbody>
            ${stats.map((s,i)=>`<tr>
              <td class="text-xs text-gray-800">${i===0?'🔥 ':''}${H.esc(s.label)}</td>
              <td class="text-xs text-gray-500">${H.esc(s.type)}</td>
              <td class="text-xs text-gray-500">${s.count}篇</td>
              <td class="text-xs text-gray-700 font-mono">${H.fmtNum(s.avgViews)}</td>
              <td class="text-xs text-gray-700 font-mono">${H.fmtNum(s.avgExposure)}</td>
              <td class="text-xs text-gray-700 font-mono">${H.fmtNum(s.avgLikes)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </details>
  </div>`;
};


P.renderAnalytics = () => {
  const all = S.contents.all();
  const today = H.today();
  const now = new Date();

  // 时间窗口过滤
  const since = () => {
    if(P._analyticsRange==='7d') return H.fmtDate(new Date(now.getTime()-7*86400000));
    if(P._analyticsRange==='30d') return H.fmtDate(new Date(now.getTime()-30*86400000));
    if(P._analyticsRange==='month') { now.setDate(1); return H.fmtDate(now); }
    return null;
  };
  const s = since();
  const filtered = s ? all.filter(c=>c.publishDate>=s) : [...all];

  const m = (c) => c.metrics || {};

  // ============ Section 1: 数据总览 ============
  const totalExposure = filtered.reduce((sum,c)=>sum+(m(c).exposure||0),0);
  const totalLikes = filtered.reduce((sum,c)=>sum+(m(c).likes||0),0);
  const totalComments = filtered.reduce((sum,c)=>sum+(m(c).comments||0),0);
  const totalAdCost = filtered.reduce((sum,c)=>sum+(m(c).adCost||0),0);

  const rangeLabels = { all:'全部', '7d':'近7天', '30d':'近30天', month:'本月' };

  let html = '';

  // 时间范围切换
  html += '<div class="flex items-center gap-1 mb-5">';
  Object.entries(rangeLabels).forEach(([k,v])=>{
    html += `<button class="cos-btn cos-btn-xs ${P._analyticsRange===k?'cos-btn-primary':'cos-btn-ghost'}" data-analytics-range="${k}">${v}</button>`;
  });
  html += '<span class="text-xs text-gray-400 ml-3">共 '+filtered.length+' 条内容</span></div>';

  // 统计卡片
  html += '<div class="grid grid-cols-5 gap-3 mb-6">';
  const stats = [
    { label:'总发布', value:filtered.length, color:'text-gray-900' },
    { label:'总曝光', value:H.fmtNum(totalExposure), color:'text-blue-600' },
    { label:'总点赞', value:H.fmtNum(totalLikes), color:'text-pink-600' },
    { label:'总评论', value:H.fmtNum(totalComments), color:'text-green-600' },
    { label:'投流金额', value:'¥'+H.fmtNum(totalAdCost), color:'text-amber-600' },
  ];
  stats.forEach(s=>{
    html += `<div class="cos-card p-4 text-center"><div class="text-xs text-gray-400 mb-1">${s.label}</div><div class="text-xl font-bold ${s.color}">${s.value}</div></div>`;
  });
  html += '</div>';

  if(filtered.length===0) {
    html += UI.emptyState('该时间范围内没有发布内容');
    document.getElementById('page-body').innerHTML = html;
    return;
  }

  // ============ Section 2: 数据波动趋势 ============
  // 跟随顶部筛选范围变化：近7天显示7天，本月显示本月，全量默认展示最近30天。
  const trendMeta = (() => {
    if(P._analyticsRange === '7d') return { days:7, title:'近7天数据波动', hint:'跟随顶部“近7天”筛选' };
    if(P._analyticsRange === '30d') return { days:30, title:'近30天数据波动', hint:'跟随顶部“近30天”筛选' };
    if(P._analyticsRange === 'month') {
      const first = new Date(now.getFullYear(), now.getMonth(), 1);
      const days = Math.max(1, Math.round((new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime() - first.getTime()) / 86400000) + 1);
      return { days, title:'本月数据波动', hint:'跟随顶部“本月”筛选' };
    }
    return { days:30, title:'近30天数据波动', hint:'当前为全部数据，趋势图默认看最近30天' };
  })();

  const trendDays = [];
  for(let i=trendMeta.days-1; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    d.setDate(d.getDate() - i);
    trendDays.push(H.fmtDate(d));
  }
  const trendByDay = {};
  const contentsByDay = {};
  trendDays.forEach(d=>{ trendByDay[d] = { exposure:0, likes:0, comments:0 }; contentsByDay[d] = []; });
  filtered.forEach(c=>{
    const day = H.parseDate(c.publishDate) || c.publishDate;
    if(contentsByDay[day]) contentsByDay[day].push(c);
    if(trendByDay[day] && m(c)) {
      trendByDay[day].exposure += m(c).exposure||0;
      trendByDay[day].likes += m(c).likes||0;
      trendByDay[day].comments += m(c).comments||0;
    }
  });

  const trendPeak = (metricKey) => {
    const bestDay = trendDays.slice().sort((a,b)=>(trendByDay[b][metricKey]||0)-(trendByDay[a][metricKey]||0))[0];
    return { day: bestDay, value: bestDay ? (trendByDay[bestDay][metricKey]||0) : 0, count: bestDay ? (contentsByDay[bestDay]||[]).length : 0 };
  };
  const peakExposure = trendPeak('exposure');
  const peakLikes = trendPeak('likes');

  const drawLineChart = (data, metricKey, color, metricLabel) => {
    const values = data.map(d=>d.value||0);
    const maxV = Math.max(1, ...values);
    const W=600, Hh=138, pad=24, w=W-pad*2, h=Hh-pad*2;
    const points = values.map((v,i)=>{
      const x = pad + (i/(values.length-1))*w;
      const y = pad + h - (v/maxV)*h;
      return { x, y, v, day:data[i].label };
    });
    const pts = points.map((p,i)=>(i===0?'M':'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join('');
    const area = pts + ' L' + (pad + w).toFixed(1) + ',' + (pad+h) + ' L' + pad + ',' + (pad+h) + ' Z';
    const dots = points.map(p=>`<g class="analytics-trend-point analytics-trend-hit" data-analytics-day="${H.esc(p.day)}" data-analytics-metric="${H.esc(metricKey)}" data-analytics-metric-label="${H.esc(metricLabel)}">
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="#fff" stroke="${color}" stroke-width="2"/>
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="12" fill="transparent" stroke="transparent"/>
    </g>`).join('');
    return `<svg width="100%" viewBox="0 0 ${W} ${Hh}" class="overflow-visible" style="max-height:138px">
      <defs><linearGradient id="grad_${metricKey}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0.02"/></linearGradient></defs>
      <path d="${area}" fill="url(#grad_${metricKey})" stroke="none"/>
      <path d="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
    </svg>`;
  };

  html += `<div class="cos-card p-4 mb-5">
    <div class="flex items-start justify-between gap-4 mb-3">
      <div>
        <h3 class="text-sm font-semibold text-gray-700">📈 ${H.esc(trendMeta.title)}</h3>
        <div class="text-xs text-gray-400 mt-1">${H.esc(trendMeta.hint)} · 点击折线点查看当天内容</div>
      </div>
      <div class="hidden md:flex items-center gap-2 text-xs">
        <span class="rounded-lg bg-blue-50 text-blue-600 px-2.5 py-1">曝光峰值 ${H.showDate(peakExposure.day)} · ${H.fmtNum(peakExposure.value)}</span>
        <span class="rounded-lg bg-pink-50 text-pink-600 px-2.5 py-1">点赞峰值 ${H.showDate(peakLikes.day)} · ${H.fmtNum(peakLikes.value)}</span>
      </div>
    </div>`;
  html += '<div class="grid grid-cols-1 md:grid-cols-3 gap-3">';
  html += `<div><div class="text-xs text-gray-400 mb-0.5">曝光</div>${drawLineChart(trendDays.map(d=>({value:trendByDay[d].exposure,label:d})),'exposure','#3b82f6','曝光')}</div>`;
  html += `<div><div class="text-xs text-gray-400 mb-0.5">点赞</div>${drawLineChart(trendDays.map(d=>({value:trendByDay[d].likes,label:d})),'likes','#ec4899','点赞')}</div>`;
  html += `<div><div class="text-xs text-gray-400 mb-0.5">评论</div>${drawLineChart(trendDays.map(d=>({value:trendByDay[d].comments,label:d})),'comments','#10b981','评论')}</div>`;
  html += '</div><div id="analytics-trend-detail" class="hidden mt-3 rounded-xl border border-dashed border-gray-200 bg-gray-50/60 p-4 text-sm text-gray-400 text-center"></div></div>';

  // ============ Section 3: 发帖时间分析 ============
  html += P._renderAnalyticsPublishTime(filtered);

  // ============ Section 4: 发布账号分析 ============
  html += P._renderAnalyticsAccount(filtered);

  // ============ Section 5: 爆款 TOP10 ============
  const sortLabels = { exposure:'曝光排行', likes:'点赞排行', comments:'评论排行' };
  html += '<div class="cos-card p-5 mb-6"><div class="flex items-center justify-between mb-4"><h3 class="text-sm font-semibold text-gray-700">🏆 爆款 TOP10</h3><div class="flex gap-1">';
  Object.entries(sortLabels).forEach(([k,v])=>{
    html += `<button class="cos-btn cos-btn-xs ${P._analyticsSort===k?'cos-btn-primary':'cos-btn-ghost'}" data-analytics-sort="${k}">${v}</button>`;
  });
  html += '</div></div>';
  const _sv = (c) => parseInt(m(c)[P._analyticsSort]) || 0;
  const sorted = [...filtered].sort((a,b)=>_sv(b)-_sv(a)).filter(c=>_sv(c)>0).slice(0,10);
  if(sorted.length===0) {
    html += UI.emptyState('暂无数据');
  } else {
    html += '<div class="overflow-x-auto"><table class="cos-table"><thead><tr><th>#</th><th>标题</th><th>平台</th><th>发布时间</th><th>曝光</th><th>点赞</th><th>评论</th></tr></thead><tbody>';
    sorted.forEach((c,i)=>{
      html += `<tr>
        <td class="text-xs font-bold ${i<3?'text-amber-500':'text-gray-400'}">${i+1}</td>
        <td class="cos-td-title"><div class="title-tooltip"><span class="title-text text-sm font-medium text-gray-900 hover:text-blue-600 cursor-pointer" data-content-trend="${H.esc(c.id)}" title="查看增长趋势">${H.esc(H.truncate(c.title,20))}</span></div></td>
        <td><span class="cos-tag">${H.esc(c.platform)}</span></td>
        <td class="text-xs text-gray-400 whitespace-nowrap">${c.publishDate||'-'}</td>
        <td class="text-xs text-gray-600 font-mono">${H.fmtNum(m(c).exposure)}</td>
        <td class="text-xs text-gray-600 font-mono">${H.fmtNum(m(c).likes)}</td>
        <td class="text-xs text-gray-600 font-mono">${H.fmtNum(m(c).comments)}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';

  // ============ Section 4: 主题分析 ============
  const themes = [...new Set(filtered.map(c=>c.theme).filter(Boolean))];
  const themeStats = themes.map(t=>{
    const items = filtered.filter(c=>c.theme===t);
    return {
      name: t,
      count: items.length,
      avgExp: items.length?Math.round(items.reduce((s,c)=>s+(m(c).exposure||0),0)/items.length):0,
      avgLikes: items.length?Math.round(items.reduce((s,c)=>s+(m(c).likes||0),0)/items.length):0,
      avgComments: items.length?Math.round(items.reduce((s,c)=>s+(m(c).comments||0),0)/items.length):0
    };
  }).sort((a,b)=>b.count-a.count);

  html += '<div class="cos-card p-5 mb-6"><h3 class="text-sm font-semibold text-gray-700 mb-4">📊 主题分析</h3>';
  if(themeStats.length===0) {
    html += UI.emptyState('暂无主题数据');
  } else {
    const maxCount = Math.max(1, ...themeStats.map(t=>t.count));
    html += '<div class="space-y-3">';
    themeStats.forEach(t=>{
      const pct = (t.count/maxCount*100).toFixed(0);
      html += `<div class="flex items-center gap-3">
        <span class="text-xs text-gray-600 w-20 text-right">${H.esc(t.name)}</span>
        <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
          <div class="h-full bg-blue-500 rounded-full flex items-center justify-end pr-2" style="width:${pct}%">
            <span class="text-xs text-white font-medium">${t.count}篇</span>
          </div>
        </div>
        <span class="text-xs text-gray-400 w-32 text-right">均曝光 ${H.fmtNum(t.avgExp)} · 均赞 ${H.fmtNum(t.avgLikes)}</span>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // ============ Section 5: 钩子分析 ============
  const hooks = [...new Set(filtered.map(c=>c.hook).filter(Boolean))];
  const hookStats = hooks.map(h=>{
    const items = filtered.filter(c=>c.hook===h);
    return {
      name: h,
      count: items.length,
      avgExp: items.length?Math.round(items.reduce((s,c)=>s+(m(c).exposure||0),0)/items.length):0,
      avgLikes: items.length?Math.round(items.reduce((s,c)=>s+(m(c).likes||0),0)/items.length):0,
      avgComments: items.length?Math.round(items.reduce((s,c)=>s+(m(c).comments||0),0)/items.length):0
    };
  }).sort((a,b)=>b.avgExp-a.avgExp);

  html += '<div class="cos-card p-5 mb-6"><h3 class="text-sm font-semibold text-gray-700 mb-4">🪝 钩子分析</h3>';
  if(hookStats.length===0) {
    html += UI.emptyState('暂无钩子数据');
  } else {
    html += '<div class="overflow-x-auto"><table class="cos-table"><thead><tr><th>排行</th><th>钩子</th><th>发布数</th><th>平均曝光</th><th>平均点赞</th><th>平均评论</th></tr></thead><tbody>';
    hookStats.forEach((h,i)=>{
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      html += `<tr>
        <td class="text-sm">${medal} ${i+1}</td>
        <td><span class="cos-tag">${H.esc(h.name)}</span></td>
        <td class="text-xs text-gray-600">${h.count}</td>
        <td class="text-xs text-gray-600 font-mono">${H.fmtNum(h.avgExp)}</td>
        <td class="text-xs text-gray-600 font-mono">${H.fmtNum(h.avgLikes)}</td>
        <td class="text-xs text-gray-600 font-mono">${H.fmtNum(h.avgComments)}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';

  // ============ Section 6: 平台分析 ============
  const platforms = [...new Set(filtered.map(c=>c.platform).filter(Boolean))];
  const platformStats = platforms.map(p=>{
    const items = filtered.filter(c=>c.platform===p);
    return {
      name: p,
      count: items.length,
      avgExp: items.length?Math.round(items.reduce((s,c)=>s+(m(c).exposure||0),0)/items.length):0,
      avgLikes: items.length?Math.round(items.reduce((s,c)=>s+(m(c).likes||0),0)/items.length):0,
      avgComments: items.length?Math.round(items.reduce((s,c)=>s+(m(c).comments||0),0)/items.length):0
    };
  }).sort((a,b)=>b.count-a.count);

  html += '<div class="cos-card p-5 mb-6"><h3 class="text-sm font-semibold text-gray-700 mb-4">📱 平台分析</h3>';
  if(platformStats.length===0) {
    html += UI.emptyState('暂无平台数据');
  } else {
    html += '<div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3">';
    platformStats.forEach(p=>{
      html += `<div class="cos-card p-4 text-center">
        <div class="text-sm font-semibold text-gray-800 mb-2">${H.esc(p.name)}</div>
        <div class="text-2xl font-bold text-blue-600">${p.count}</div>
        <div class="text-xs text-gray-400 mt-1">篇</div>
        <div class="mt-2 space-y-0.5 text-xs text-gray-500">
          <div>均曝光 ${H.fmtNum(p.avgExp)}</div>
          <div>均点赞 ${H.fmtNum(p.avgLikes)}</div>
          <div>均评论 ${H.fmtNum(p.avgComments)}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // ============ Section 7+8: 本月最佳 / 待优化 ============
  const mStart = H.fmtDate(new Date(now.getFullYear(), now.getMonth(), 1));
  const thisMonth = all.filter(c=>c.publishDate>=mStart);
  const best = thisMonth.length>0 ? thisMonth.reduce((a,b)=>(m(a).exposure||0)>(m(b).exposure||0)?a:b, thisMonth[0]) : null;
  const worst = thisMonth.length>0 ? thisMonth.reduce((a,b)=>(m(a).exposure||0)<(m(b).exposure||0)?a:b, thisMonth[0]) : null;

  html += '<div class="grid grid-cols-2 gap-4 mb-6">';
  html += '<div class="cos-card p-5 border-l-4 border-green-400"><h3 class="text-sm font-semibold text-gray-700 mb-3">🌟 本月最佳内容</h3>';
  if(best) {
    html += `<div class="text-sm font-medium text-gray-800 hover:text-blue-600 cursor-pointer" data-content-trend="${H.esc(best.id)}" title="查看增长趋势">${H.esc(best.title)}</div>
      <div class="flex items-center gap-2 mt-1 text-xs text-gray-400"><span class="cos-tag">${H.esc(best.platform)}</span><span>${best.publishDate}</span></div>
      <div class="grid grid-cols-3 gap-2 mt-3 text-center">
        <div><div class="text-lg font-bold text-blue-600">${H.fmtNum(m(best).exposure)}</div><div class="text-xs text-gray-400">曝光</div></div>
        <div><div class="text-lg font-bold text-pink-600">${H.fmtNum(m(best).likes)}</div><div class="text-xs text-gray-400">点赞</div></div>
        <div><div class="text-lg font-bold text-green-600">${H.fmtNum(m(best).comments)}</div><div class="text-xs text-gray-400">评论</div></div>
      </div>`;
  } else { html += '<div class="text-xs text-gray-400">本月暂无发布</div>'; }
  html += '</div>';

  html += '<div class="cos-card p-5 border-l-4 border-red-300"><h3 class="text-sm font-semibold text-gray-700 mb-3">🔧 本月待优化内容</h3>';
  if(worst) {
    html += `<div class="text-sm font-medium text-gray-800 hover:text-blue-600 cursor-pointer" data-content-trend="${H.esc(worst.id)}" title="查看增长趋势">${H.esc(worst.title)}</div>
      <div class="flex items-center gap-2 mt-1 text-xs text-gray-400"><span class="cos-tag">${H.esc(worst.platform)}</span><span>${worst.publishDate}</span></div>
      <div class="grid grid-cols-3 gap-2 mt-3 text-center">
        <div><div class="text-lg font-bold text-gray-600">${H.fmtNum(m(worst).exposure)}</div><div class="text-xs text-gray-400">曝光</div></div>
        <div><div class="text-lg font-bold text-gray-600">${H.fmtNum(m(worst).likes)}</div><div class="text-xs text-gray-400">点赞</div></div>
        <div><div class="text-lg font-bold text-gray-600">${H.fmtNum(m(worst).comments)}</div><div class="text-xs text-gray-400">评论</div></div>
      </div>`;
  } else { html += '<div class="text-xs text-gray-400">本月暂无发布</div>'; }
  html += '</div>';
  html += '</div>';

  document.getElementById('page-body').innerHTML = html;

  const renderAnalyticsDayDetail = (day, metricKey='exposure', metricLabel='曝光') => {
    const box = document.getElementById('analytics-trend-detail');
    if(!box) return;
    box.classList.remove('hidden');
    const items = (contentsByDay[day] || []).slice().sort((a,b)=>(parseInt(m(b)[metricKey])||0)-(parseInt(m(a)[metricKey])||0));
    const total = items.reduce((sum,c)=>sum+(parseInt(m(c)[metricKey])||0),0);
    if(!items.length) {
      box.innerHTML = `<div class="text-sm text-gray-500">${H.showDate(day)} 暂无发布内容</div><div class="text-xs text-gray-400 mt-1">这一天没有内容带动${H.esc(metricLabel)}。</div>`;
      return;
    }
    box.innerHTML = `<div class="text-left">
      <div class="flex items-center justify-between mb-3">
        <div><div class="text-sm font-semibold text-gray-800">${H.showDate(day)} 发布内容</div><div class="text-xs text-gray-400 mt-0.5">${items.length} 篇内容 · ${H.esc(metricLabel)}合计 ${H.fmtNum(total)}</div></div>
        <span class="cos-tag">${H.esc(metricLabel)}明细</span>
      </div>
      <div class="divide-y divide-gray-100 rounded-xl overflow-hidden bg-white border border-gray-100">
        ${items.map(c=>`<div class="analytics-day-detail-row px-3 py-2 flex items-center gap-3 cursor-pointer" data-content-trend="${H.esc(c.id)}">
          <div class="min-w-0 flex-1">
            <div class="text-sm font-medium text-gray-900 truncate">${H.esc(c.title)}</div>

            <div><div class="font-semibold text-blue-600">${H.fmtNum(m(c).exposure||0)}</div><div class="text-gray-400">曝光</div></div>
            <div><div class="font-semibold text-pink-600">${H.fmtNum(m(c).likes||0)}</div><div class="text-gray-400">赞</div></div>
            <div><div class="font-semibold text-green-600">${H.fmtNum(m(c).comments||0)}</div><div class="text-gray-400">评</div></div>

    b.onclick=()=>{ P._analyticsSort=b.dataset.analyticsSort; P.renderAnalytics(); };

// ==================== 渠道分发记录 ====================

P._CHANNEL_STORAGE_KEY = 'content_os_channel_records_v1';
P._channelFilter = P._channelFilter || 'all';
P._channelSearch = P._channelSearch || '';

P._channelOptions = () => {
  const arr = S?.config?.getChannels ? S.config.getChannels() : [];
  return Array.isArray(arr) && arr.length ? arr : [...C.DEFAULT_CHANNELS];
};
P._channelStatusOptions = ['正常','已删帖','被屏蔽','待观察'];
P._channelRatingOptions = ['好','一般','差','待观察'];

P._channelReadLocal = () => {
  try {
    const raw = localStorage.getItem(P._CHANNEL_STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch(e) {
    console.warn('渠道分发记录读取失败', e);
    return [];
  }
};

P._channelSyncToCloud = async (items) => {
  const safeItems = Array.isArray(items) ? items : [];
  try {
    if(S?.db?.config) S.db.config.channelRecords = safeItems;
    if(typeof SUPABASE !== 'undefined' && SUPABASE?.from) {
      const { error } = await SUPABASE
        .from('config')
        .upsert({ key:'channelRecords', value:safeItems }, { onConflict:'key' });
      if(error) {
        console.warn('渠道分发记录云端保存失败：', error.message);
        try {
          localStorage.setItem('content_os_last_channel_sync_status', 'error');
          localStorage.setItem('content_os_last_channel_sync_error', error.message || '');
        } catch(_) {}
        return false;
      }
      try {
        localStorage.setItem('content_os_last_channel_sync_status', 'ok');
        localStorage.setItem('content_os_last_channel_sync', H.nowISO());
      } catch(_) {}
      return true;
    }
    return false;
  } catch(e) {
    console.warn('渠道分发记录云端保存异常', e);
    try {
      localStorage.setItem('content_os_last_channel_sync_status', 'error');
      localStorage.setItem('content_os_last_channel_sync_error', e.message || '');
    } catch(_) {}
    return false;
  }
};

P._channelLoad = () => {
  const localItems = P._channelReadLocal();
  const cloudItems = S?.db?.config?.channelRecords;
  const cloudArr = Array.isArray(cloudItems) ? cloudItems : [];

  // 正常优先云端；但如果本地有新增记录而云端/内存尚未同步，按 id 合并，避免“保存了但列表看不到”。
  if(cloudArr.length || localItems.length) {
    const map = new Map();
    const put = (r) => {
      if(!r) return;
      const id = r.id || (String(r.channel||'') + '_' + String(r.title||'') + '_' + String(r.publishDate||'') + '_' + String(r.publishTime||''));
      if(!id) return;
      const old = map.get(id);
      if(!old) { map.set(id, r); return; }
      const ot = String(old.updatedAt || old.createdAt || '');
      const nt = String(r.updatedAt || r.createdAt || '');
      if(nt >= ot) map.set(id, {...old, ...r});
    };
    cloudArr.forEach(put);
    localItems.forEach(put);
    const merged = Array.from(map.values());
    try { localStorage.setItem(P._CHANNEL_STORAGE_KEY, JSON.stringify(merged)); } catch(_) {}
    if(S?.db?.config) S.db.config.channelRecords = merged;
    if(merged.length !== cloudArr.length) P._channelSyncToCloud(merged);
    return merged;
  }
  return [];
};

P._channelSave = async (items) => {
  const safeItems = Array.isArray(items) ? items : [];
  let localOK = true;
  if(S?.db?.config) S.db.config.channelRecords = safeItems;
  try {
    localStorage.setItem(P._CHANNEL_STORAGE_KEY, JSON.stringify(safeItems));
  } catch(e) {
    localOK = false;
    // 分发记录以云端 config 为主；本地缓存失败不再弹红色提示，避免每次保存都干扰操作。
    console.warn('分发记录本地缓存失败，已跳过用户提示：', e.message);
    try {
      localStorage.setItem('content_os_last_channel_local_cache_status', 'error');
      localStorage.setItem('content_os_last_channel_local_cache_error', e.message || '');
    } catch(_) {}
  }
  const cloudOK = await P._channelSyncToCloud(safeItems);
  return { localOK, cloudOK, total:safeItems.length };
};

P._channelNum = (v) => {
  const n = parseInt(String(v || '').replace(/[^\d]/g,''), 10);
  return Number.isFinite(n) ? n : 0;
};

P._channelRatingBadge = (rating) => {
  const r = rating || '待观察';
  if(r === '好') return '<span class="diag-badge diag-ok">效果好</span>';
  if(r === '差') return '<span class="diag-badge diag-danger">效果差</span>';
  if(r === '一般') return '<span class="diag-badge diag-warn">一般</span>';
  return '<span class="diag-badge diag-info">待观察</span>';
};

P._channelStatusBadge = (status) => {
  const s = status || '正常';
  if(s === '已删帖' || s === '被屏蔽') return `<span class="diag-badge diag-danger">${H.esc(s)}</span>`;
  if(s === '待观察') return '<span class="diag-badge diag-warn">待观察</span>';
  return '<span class="diag-badge diag-ok">正常</span>';
};

P._channelLinkedContentTitle = (record) => {
  if(!record?.contentId) return '';
  const c = S.contents.get(record.contentId);
  return c?.title || '';
};

P._channelEffectiveTitle = (record) => record.title || P._channelLinkedContentTitle(record) || '未命名发布记录';

P._channelRecordScore = (r) => {
  return P._channelNum(r.leads) * 5 + P._channelNum(r.groupAdds) * 8 + P._channelNum(r.downloads) * 10 + P._channelNum(r.comments) * 2 + P._channelNum(r.views) * 0.01;
};


P._channelRecordsForContent = (contentId) => {
  if(!contentId) return [];
  return P._channelLoad().filter(r => r.contentId === contentId);
};

P._channelRatePct = (num, den) => {
  num = P._channelNum(num);
  den = P._channelNum(den);
  if(!den || den <= 0) return '-';
  return Math.round(num / den * 100) + '%';
};

P._channelDistributionSummary = (contentId) => {
  const records = P._channelRecordsForContent(contentId);
  const views = records.reduce((s,r)=>s+P._channelNum(r.views),0);
  const leads = records.reduce((s,r)=>s+P._channelNum(r.leads),0);
  const groupAdds = records.reduce((s,r)=>s+P._channelNum(r.groupAdds),0);
  const downloads = records.reduce((s,r)=>s+P._channelNum(r.downloads),0);
  const blocked = records.filter(r=>['已删帖','被屏蔽'].includes(r.status)).length;
  return { count:records.length, views, leads, groupAdds, downloads, blocked, records };
};

P._contentDistributionBadge = (contentId) => {
  const s = P._channelDistributionSummary(contentId);
  if(!s.count) return '<span class="inline-flex items-center px-2 py-0.5 whitespace-nowrap rounded-md text-[11px] bg-gray-50 text-gray-400 border border-gray-100">未分发</span>';
  const cls = s.leads > 0 || s.groupAdds > 0 || s.downloads > 0
    ? 'bg-emerald-50 text-emerald-600 border-emerald-100'
    : 'bg-blue-50 text-blue-600 border-blue-100';
  return `<span class="inline-flex items-center px-2 py-0.5 whitespace-nowrap rounded-md text-[11px] ${cls}">已分发 ${s.count} 个渠道</span>`;
};

P._renderContentChannelSummary = (contentId) => {
  const s = P._channelDistributionSummary(contentId);
  if(!s.count) {
    return `<div class="border-t pt-4 mt-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-gray-700">📣 渠道分发情况</h3>
        <button class="cos-btn cos-btn-secondary cos-btn-xs" data-jump-channels>去记录分发</button>
      </div>
      <div class="rounded-xl border border-dashed border-gray-200 bg-gray-50/60 p-4 text-sm text-gray-400 text-center">
        这篇内容还没有关联分发记录，可以去「渠道分发」记录发到 QQ频道/社群后的效果。
      </div>
    </div>`;
  }

  const top = s.records.slice().sort((a,b)=>P._channelRecordScore(b)-P._channelRecordScore(a))[0];
  const list = s.records.slice().sort((a,b)=>P._channelRecordScore(b)-P._channelRecordScore(a)).slice(0,4).map(r => `<div class="rounded-xl border border-gray-100 bg-white p-3">
      <div class="flex items-center justify-between gap-2 mb-2">
        <div class="min-w-0">
          <div class="text-sm font-semibold text-gray-800 truncate">${H.esc(r.channel || '其他')}</div>
          <div class="text-xs text-gray-400 mt-0.5">${H.showDate(r.publishDate)} ${H.esc(r.publishTime || '')}</div>
        </div>
        <div class="flex items-center gap-1">${P._channelStatusBadge(r.status)}${P._channelRatingBadge(r.rating)}</div>
      </div>
      <div class="grid grid-cols-4 gap-2 text-center text-xs">
        <div><div class="font-semibold text-gray-800">${H.fmtNum(P._channelNum(r.views))}</div><div class="text-gray-400">浏览</div></div>
        <div><div class="font-semibold text-brand-600">${H.fmtNum(P._channelNum(r.leads))}</div><div class="text-gray-400">引流</div></div>
        <div><div class="font-semibold text-emerald-600">${H.fmtNum(P._channelNum(r.groupAdds))}</div><div class="text-gray-400">进群</div></div>
        <div><div class="font-semibold text-blue-600">${H.fmtNum(P._channelNum(r.downloads))}</div><div class="text-gray-400">下载</div></div>
      </div>
      <div class="mt-2 text-[11px] text-gray-400">引流率 ${P._channelRatePct(r.leads, r.views)} · 进群率 ${P._channelRatePct(r.groupAdds, r.leads)} · 下载率 ${P._channelRatePct(r.downloads, r.leads)}</div>
    </div>`).join('');

  return `<div class="border-t pt-4 mt-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-sm font-semibold text-gray-700">📣 渠道分发情况</h3>
      <button class="cos-btn cos-btn-secondary cos-btn-xs" data-jump-channels>查看全部分发</button>
    </div>
    <div class="grid grid-cols-5 gap-2 mb-3">
      <div class="cos-card p-3 text-center"><div class="text-xs text-gray-400">分发渠道</div><div class="text-sm font-semibold mt-1">${s.count}</div></div>
      <div class="cos-card p-3 text-center"><div class="text-xs text-gray-400">总浏览</div><div class="text-sm font-semibold mt-1">${H.fmtNum(s.views)}</div></div>
      <div class="cos-card p-3 text-center"><div class="text-xs text-gray-400">引流</div><div class="text-sm font-semibold text-brand-600 mt-1">${H.fmtNum(s.leads)}</div></div>
      <div class="cos-card p-3 text-center"><div class="text-xs text-gray-400">进群</div><div class="text-sm font-semibold text-emerald-600 mt-1">${H.fmtNum(s.groupAdds)}</div></div>
      <div class="cos-card p-3 text-center"><div class="text-xs text-gray-400">下载</div><div class="text-sm font-semibold text-blue-600 mt-1">${H.fmtNum(s.downloads)}</div></div>
    </div>
    ${top ? `<div class="rounded-xl border border-emerald-100 bg-emerald-50/60 px-3 py-2 text-xs text-emerald-700 mb-3">表现较好的分发：<b>${H.esc(top.channel || '其他')}</b> · 引流 ${H.fmtNum(P._channelNum(top.leads))} · 进群 ${H.fmtNum(P._channelNum(top.groupAdds))} · 下载 ${H.fmtNum(P._channelNum(top.downloads))}</div>` : ''}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${list}</div>
  </div>`;
};


P._channelSpecificName = (r) => {
  if(!r) return '其他';
  const explicit = String(r.subChannel || r.specificChannel || r.targetChannel || '').trim();
  if(explicit) return explicit;

  const note = String(r.notes || '');
  let m = note.match(/频道\s*[【\[]\s*([^】\]\n]+?)\s*[】\]]/);
  if(m && m[1]) return m[1].trim();
  m = note.match(/(?:频道|社群|群名|来源)\s*[:：]\s*([^，,；;\n]+)/);
  if(m && m[1]) return m[1].trim();

  return r.channel || '其他';
};

P._channelTimeSlot = (time) => {
  const m = String(time || '').match(/(\d{1,2})[:：]?(\d{2})?/);
  if(!m) return '未记录时间';
  const h = Math.max(0, Math.min(23, parseInt(m[1],10)));
  if(h >= 6 && h <= 10) return '早上 06-10';
  if(h >= 11 && h <= 13) return '中午 11-13';
  if(h >= 14 && h <= 17) return '下午 14-17';
  if(h >= 18 && h <= 22) return '晚上 18-22';
  return '深夜 23-05';
};

P._channelWeekday = (date) => {
  const d = H.parseDate(date);
  if(!d) return '未记录星期';
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return '未记录星期';
  const dt = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  const labels = ['周日','周一','周二','周三','周四','周五','周六'];
  return labels[dt.getDay()] || '未记录星期';
};

P._channelAggRows = (items, mode='specific') => {
  const map = {};
  const getKey = (r) => {
    if(mode === 'time') return P._channelTimeSlot(r.publishTime);
    if(mode === 'weekday') return P._channelWeekday(r.publishDate);
    if(mode === 'channel') return r.channel || '其他';
    return P._channelSpecificName(r);
  };
  (items || []).forEach(r => {
    const key = getKey(r) || '其他';
    if(!map[key]) {
      map[key] = { key, count:0, views:0, likes:0, comments:0, leads:0, groupAdds:0, downloads:0, blocked:0 };
    }
    const row = map[key];
    row.count += 1;
    row.views += P._channelNum(r.views);
    row.likes += P._channelNum(r.likes);
    row.comments += P._channelNum(r.comments);
    row.leads += P._channelNum(r.leads);
    row.groupAdds += P._channelNum(r.groupAdds);
    row.downloads += P._channelNum(r.downloads);
    if(['已删帖','被屏蔽'].includes(r.status)) row.blocked += 1;
  });
  return Object.values(map).map(row => ({
    ...row,
    leadRate: row.views ? row.leads / row.views : 0,
    groupRate: row.leads ? row.groupAdds / row.leads : 0,
    downloadRate: row.leads ? row.downloads / row.leads : 0,
    score: row.leads * 5 + row.groupAdds * 8 + row.downloads * 10 + row.comments * 2 + row.views * 0.01
  }));
};

P._channelBest = (rows, key) => {
  return [...(rows||[])].sort((a,b)=>(b[key]||0)-(a[key]||0))[0] || null;
};

P._channelBestRate = (rows, rateKey, minBaseKey='views', minBase=20) => {
  const valid = (rows||[]).filter(r => (r[minBaseKey] || 0) >= minBase && (r[rateKey] || 0) > 0);
  return valid.sort((a,b)=>(b[rateKey]||0)-(a[rateKey]||0))[0] || null;
};

P._channelAdvice = (r) => {
  if(!r) return '继续观察';
  if(r.blocked > 0) return '注意删帖/屏蔽风险';
  if(r.groupAdds > 0 && r.leads > 0) return '优先继续发';
  if(r.leads > 0 && r.views > 0 && r.leadRate >= 0.03) return '引流效率不错';
  if(r.comments > 0 && r.leads === 0) return '互动强，补引流话术';
  if(r.views >= 300 && r.leads === 0) return '浏览高，引流钩子弱';
  if(r.count >= 3 && r.leads === 0) return '多次无转化，降频测试';
  return '样本较少，继续观察';
};

P._metricMiniCard = (label, row, metricLabel, value) => {
  if(!row) return `<div class="rounded-xl bg-gray-50 p-3"><div class="text-xs text-gray-400">${label}</div><div class="text-sm font-semibold text-gray-400 mt-1">暂无数据</div></div>`;
  return `<div class="rounded-xl bg-gray-50 p-3">
    <div class="text-xs text-gray-400">${label}</div>
    <div class="text-sm font-semibold text-gray-900 mt-1 truncate">${H.esc(row.key)}</div>
    <div class="text-xs text-gray-500 mt-1">${metricLabel} <b>${H.fmtNum(value)}</b> · 发布 ${row.count} 次</div>
  </div>`;
};

P._isCommunityDistributionChannel = (channel) => {
  const s = String(channel || '').trim();
  if(!s) return false;

  // 小红书 / 抖音 / 视频号 / B站 / 公众号这类是单一发布平台，不做“频道/社群”排行。
  if(/小红书|抖音|视频号|B站|公众号/i.test(s)) return false;

  // QQ频道、QQ群、微信群、社群类才适合继续拆到具体频道/社群。
  return /QQ|微信群|QQ群|微信|社群|群|频道|俱乐部|交流/i.test(s);
};

P._hasSpecificChannelData = (items) => {
  return P._channelSpecificAnalysisItems(items).length > 0;
};

P._channelSpecificAnalysisItems = (items) => {
  return (items || []).filter(r => {
    const base = r.channel || '其他';
    if(!P._isCommunityDistributionChannel(base)) return false;
    const explicit = String(r.subChannel || '').trim();
    const specific = P._channelSpecificName(r);
    return !!explicit || (specific && specific !== base);
  });
};

P._channelUseSpecificAnalysis = (items) => {
  const specificItems = P._channelSpecificAnalysisItems(items);
  if(!specificItems.length) return false;

  // 单独筛选小红书/抖音/视频号/其他时，即使误填了“其他”，也不展示频道排行。
  if(P._channelFilter && P._channelFilter !== 'all') {
    return P._isCommunityDistributionChannel(P._channelFilter);
  }
  return true;
};

P._channelProblem = (items) => {
  const total = P._channelStats(items || []);
  const leadRate = total.views ? total.leads / total.views : 0;

  if(total.blocked > 0) return { title:'注意屏蔽风险', desc:`有 ${total.blocked} 条被删/屏蔽，话术要更自然。`, cls:'text-red-600' };
  if(total.views >= 300 && total.leads === 0) return { title:'浏览高，引流弱', desc:'建议加强评论区/私信/进群钩子。', cls:'text-amber-600' };
  if(total.leads > 0 && total.groupAdds === 0) return { title:'有引流，进群弱', desc:'可以优化私信承接或进群入口。', cls:'text-amber-600' };
  if(leadRate > 0 && leadRate < 0.01 && total.views >= 300) return { title:'引流率偏低', desc:'内容能吸引浏览，但转化还不够。', cls:'text-amber-600' };
  if(total.groupAdds > 0 || leadRate >= 0.03) return { title:'表现不错', desc:'可以继续复用这个发布时间/话术。', cls:'text-emerald-600' };
  return { title:'继续观察', desc:'样本还不多，先继续记录。', cls:'text-gray-700' };
};

P._renderChannelAnalytics = (items) => {
  items = items || [];
  if(items.length === 0) return '';

  const useSpecific = P._channelUseSpecificAnalysis(items);
  const specificItems = P._channelSpecificAnalysisItems(items);
  const analysisItems = useSpecific ? specificItems : items;

  const rows = P._channelAggRows(analysisItems, useSpecific ? 'specific' : 'time');
  const timeRows = P._channelAggRows(items, 'time');
  const weekdayRows = P._channelAggRows(items, 'weekday');

  const bestTime = [...timeRows].sort((a,b)=>b.score-a.score)[0] || null;
  const bestWeekday = [...weekdayRows].sort((a,b)=>b.score-a.score)[0] || null;

  const compactCard = (label, row, valueLabel, value, cls='text-gray-900') => {
    if(!row) return `<div class="rounded-xl bg-gray-50 p-3"><div class="text-xs text-gray-400">${label}</div><div class="text-sm font-semibold text-gray-400 mt-1">暂无数据</div></div>`;
    return `<div class="rounded-xl bg-gray-50 p-3">
      <div class="text-xs text-gray-400">${label}</div>
      <div class="text-sm font-semibold text-gray-900 mt-1 truncate">${H.esc(row.key)}</div>
      <div class="text-xs text-gray-500 mt-1">${valueLabel} <b class="${cls}">${H.esc(String(value))}</b> · ${row.count} 次</div>
    </div>`;
  };

  if(!useSpecific) {
    const timeByViews = P._channelBest(timeRows, 'views');
    const timeByComments = P._channelBest(timeRows, 'comments');
    const timeByLeads = P._channelBest(timeRows, 'leads');

P._channelStats = (items) => {
  const total = items.length;
  const leads = items.reduce((s,r)=>s+P._channelNum(r.leads),0);
  const groupAdds = items.reduce((s,r)=>s+P._channelNum(r.groupAdds),0);
  const downloads = items.reduce((s,r)=>s+P._channelNum(r.downloads),0);
  const views = items.reduce((s,r)=>s+P._channelNum(r.views),0);
  const likes = items.reduce((s,r)=>s+P._channelNum(r.likes),0);
  const comments = items.reduce((s,r)=>s+P._channelNum(r.comments),0);
  const blocked = items.filter(r=>['已删帖','被屏蔽'].includes(r.status)).length;
  const byChannel = {};
  items.forEach(r=>{
    const k = r.channel || '其他';
    if(!byChannel[k]) byChannel[k] = { channel:k, count:0, leads:0, groupAdds:0, downloads:0, views:0, likes:0, comments:0 };
    byChannel[k].count += 1;
    byChannel[k].leads += P._channelNum(r.leads);
    byChannel[k].groupAdds += P._channelNum(r.groupAdds);
    byChannel[k].downloads += P._channelNum(r.downloads);
    byChannel[k].views += P._channelNum(r.views);
    byChannel[k].likes += P._channelNum(r.likes);
    byChannel[k].comments += P._channelNum(r.comments);
  });
  const topChannel = Object.values(byChannel).sort((a,b)=>
    (b.leads+b.groupAdds*2+b.downloads*3+b.comments*2+b.views*0.01) - (a.leads+a.groupAdds*2+a.downloads*3+a.comments*2+a.views*0.01)
  )[0] || null;
  return { total, views, likes, comments, leads, groupAdds, downloads, blocked, topChannel, byChannel:Object.values(byChannel) };
};

P.renderChannels = () => {
  const all = P._channelLoad();
  const contents = S.contents.all();
  let items = [...all];

  if(P._channelFilter !== 'all') items = items.filter(r => (r.channel || '其他') === P._channelFilter);
  if(P._channelSearch) {
    const q = P._channelSearch.toLowerCase();
    items = items.filter(r => [
      r.channel, r.subChannel, P._channelSpecificName(r), r.publishAccount, r.accountType, r.title, r.bodyText, r.postLink,
      r.notes, r.status, r.rating, P._channelLinkedContentTitle(r)

    const target = before.find(x => x.id === btn.dataset.channelDelete);
    const items = before.filter(x => x.id !== btn.dataset.channelDelete);
    await P._channelSave(items);
    if(window.Auth && Auth.log) Auth.log('渠道分发', '删除分发记录', target?.title || '', '删除渠道：' + (target?.channel || ''));
    UI.toast('分发记录已删除');
    P.renderChannels();
  });
};

P._openChannelModal = async (recordId=null) => {
  const isEdit = !!recordId;
  const items = P._channelLoad();
  const r = isEdit ? items.find(x => x.id === recordId) : {};
  if(isEdit && !r) return;

  const filterChannel = (!isEdit && P._channelFilter && P._channelFilter !== 'all') ? P._channelFilter : '';
  const channelOptions = [...new Set([...P._channelOptions(), r?.channel, filterChannel].filter(Boolean))];
  const defaultChannel = isEdit ? (r.channel || channelOptions[0] || '其他') : (filterChannel || channelOptions[0] || '其他');
  const defaultSubChannel = isEdit
    ? (P._isCommunityDistributionChannel(defaultChannel) ? (r.subChannel || (P._channelSpecificName(r)!==defaultChannel ? P._channelSpecificName(r) : '') || '') : '')
    : '';
  const contents = S.contents.all().slice().sort((a,b)=>String(b.publishDate||'').localeCompare(String(a.publishDate||'')));
  const contentOpts = ['<option value="">不关联内容库</option>'].concat(contents.slice(0,80).map(c =>
    `<option value="${H.esc(c.id)}" ${(r.contentId||'')===c.id?'selected':''}>${H.esc(H.truncate(c.title, 40))}</option>`
  )).join('');

  const html = `<div class="p-6">
    <h2 class="text-base font-semibold text-gray-900 mb-5">${isEdit?'编辑分发记录':'新增分发记录'}</h2>
    <form id="channel-form" class="space-y-4">
      <div class="grid grid-cols-3 gap-4">
        <div>${UI.renderField('分发渠道','channel','select',defaultChannel,channelOptions,'选择渠道')}</div>
        <div>${UI.renderField('具体频道/社群名称','subChannel','text',defaultSubChannel,null,'仅 QQ频道/群/社群需要填')}</div>
        <div>${UI.renderField('发布账号','publishAccount','text',r.publishAccount||'',null,'个人号 / 主体号 / 小号A')}</div>
      </div>
      <div>
        <label class="cos-label">关联内容库</label>
        <select class="cos-select" name="contentId">${contentOpts}</select>
      </div>
      <div>${UI.renderField('帖子标题','title','text',r.title||'',null,'这次在渠道里发的标题')}</div>
      <div>${UI.renderField('发布内容 / 话术','bodyText','textarea',r.bodyText||'',null,'粘贴你发在 QQ 频道/群里的内容')}</div>
      <div class="grid grid-cols-3 gap-4">
        <div>${UI.renderField('发布日期','publishDate','date',r.publishDate||H.today())}</div>
        <div>${UI.renderField('发布时间','publishTime','time',r.publishTime||'')}</div>
        <div>${UI.renderField('帖子链接','postLink','url',r.postLink||'',null,'https://...')}</div>
      </div>
      <div class="border-t pt-3"><h3 class="text-sm font-semibold text-gray-700 mb-3">渠道数据</h3></div>
      <div class="grid grid-cols-3 gap-4">
        <div>${UI.renderField('浏览量','views','number',String(r.views||0))}</div>
        <div>${UI.renderField('点赞','likes','number',String(r.likes||0))}</div>
        <div>${UI.renderField('评论/回复','comments','number',String(r.comments||0))}</div>
        <div>${UI.renderField('引流用户','leads','number',String(r.leads||0))}</div>
        <div>${UI.renderField('进群人数','groupAdds','number',String(r.groupAdds||0))}</div>
        <div>${UI.renderField('下载人数','downloads','number',String(r.downloads||0))}</div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>${UI.renderField('状态','status','select',r.status||'正常',P._channelStatusOptions)}</div>
        <div>${UI.renderField('效果评级','rating','select',r.rating||'待观察',P._channelRatingOptions)}</div>
      </div>
      <div>${UI.renderField('备注','notes','textarea',r.notes||'',null,'例如：这条话术容易被删 / 频道【自驾交友俱乐部】/ 有人私信咨询')}</div>

        <button type="button" class="cos-btn cos-btn-primary" id="channel-save-btn">保存</button>
      </div>
    </form>
  </div>`;

  const modalPromise = UI.openModal(html, {width:'max-w-4xl'});
  setTimeout(() => {
    const saveBtn = document.getElementById('channel-save-btn');
    if(saveBtn) saveBtn.onclick = () => {
      const form = document.getElementById('channel-form');
      if(!form) return;
      const data = UI.readForm(form);
      if(!String(data.title || '').trim() && !data.contentId) {
        UI.toast('请填写帖子标题，或关联一篇内容库内容', 'error');
        return;
      }
      UI.closeModal(data);
    };
  }, 50);

  const result = await modalPromise;
  if(!result || result === 'cancel') return;
  const data = result;

  const now = H.nowISO();
  const savedChannel = data.channel || defaultChannel || '其他';
  const savedSubChannel = P._isCommunityDistributionChannel(savedChannel) ? String(data.subChannel || '').trim() : '';
  const record = {
    ...(r || {}),

    subChannel: savedSubChannel,

    title: String(data.title || '').trim(),

    rating: data.rating || '待观察',
    notes: data.notes || '',

  const next = items.filter(x => x.id !== record.id);

     ====================================================================== -->
<script>
;(function() {
const Auth = window.Auth = {};
const H = window.H, UI = window.UI;

Auth._MEMBER_TABLE = 'content_os_members';
Auth._ADMIN_FUNCTION = 'content-os-admin-users';
Auth._LOG_CONFIG_KEY = 'operationLogs';
Auth._SESSION_CHECK_INTERVAL = 5 * 60 * 1000;
Auth.accounts = [];
Auth.logs = [];
Auth.currentUser = null;
Auth._sessionGuardTimer = null;
Auth._visibilityGuardBound = false;
Auth._authSubscription = null;

Auth._mapMember = (row) => row ? ({
  id: row.id,
  email: row.email || '',
  username: row.username || row.email || '',
  name: row.display_name || row.name || row.username || row.email || '',
  role: row.role === 'admin' ? 'admin' : 'operator',
  status: row.status === 'disabled' ? 'disabled' : 'active',
  remark: row.remark || '',
  sessionVersion: Math.max(1, Number(row.session_version) || 1),
  createdAt: row.created_at || '',
  updatedAt: row.updated_at || '',
  loginAt: H.nowISO()
}) : null;

Auth._getSession = async () => {
  const { data, error } = await SUPABASE.auth.getSession();
  if(error) throw error;
  return data?.session || null;
};

Auth._loadCurrentProfile = async (user) => {
  if(!user?.id) return null;
  const { data, error } = await SUPABASE
    .from(Auth._MEMBER_TABLE)
    .select('id,email,username,display_name,role,status,remark,session_version,created_at,updated_at')
    .eq('id', user.id)
    .maybeSingle();
  if(error) throw error;
  if(!data) throw new Error('账号未配置、已停用或当前登录已失效');
  const profile = Auth._mapMember(data);
  if(profile.status !== 'active') throw new Error('账号已停用，请联系管理员');
  return profile;
};

Auth._applySession = async (session) => {
  if(!session?.user) {
    Auth.currentUser = null;
    return null;
  }
  const profile = await Auth._loadCurrentProfile(session.user);
  Auth.currentUser = {
    ...profile,
    email: session.user.email || profile.email,
    loginAt: H.nowISO()
  };
  Auth.updateIndicator();
  return Auth.currentUser;
};

Auth.loadLogs = async () => {
  if(!Auth.currentUser) { Auth.logs = []; return Auth.logs; }
  try {
    const { data, error } = await SUPABASE.from('config').select('value').eq('key', Auth._LOG_CONFIG_KEY).maybeSingle();
    if(error) throw error;
    Auth.logs = Array.isArray(data?.value) ? data.value : [];
  } catch(e) {
    console.warn('操作日志加载失败：', e.message || e);
    Auth.logs = [];
  }
  return Auth.logs;
};

Auth.saveLogs = async (logs) => {
  if(!Auth.currentUser) return false;
  Auth.logs = Array.isArray(logs) ? logs.slice(0, 500) : [];
  try {
    if(window.S?.db?.config) S.db.config[Auth._LOG_CONFIG_KEY] = Auth.logs;
    const { error } = await SUPABASE.from('config').upsert({ key:Auth._LOG_CONFIG_KEY, value:Auth.logs });
    if(error) throw error;
    return true;
  } catch(e) {
    console.warn('操作日志保存失败：', e.message || e);
    return false;
  }
};

Auth.log = async (module, action, target='', detail='') => {
  if(!Auth.currentUser) return null;
  try {
    const user = Auth.currentUser;
    const item = {
      id: H.uid('log_'),
      createdAt: H.nowISO(),
      username: user.username || user.email || 'unknown',
      name: user.name || user.username || user.email || '未知账号',
      role: user.role || 'operator',
      module: module || '系统',
      action: action || '操作',
      target: String(target || ''),
      detail: String(detail || ''),
      route: window.R?.currentRoute || (window.location.hash || '').replace('#','')
    };
    Auth.logs = [item, ...(Auth.logs || [])].slice(0, 500);
    await Auth.saveLogs(Auth.logs);
    return item;
  } catch(e) {
    console.warn('操作日志记录失败：', e.message || e);
    return null;
  }
};

Auth.init = async () => {
  try {
    const session = await Auth._getSession();
    if(session) {
      await Auth._applySession(session);
      await Auth.loadLogs();
      Auth.startSessionGuard();
    }
  } catch(e) {
    console.warn('现有登录状态无效：', e.message || e);
    try { await SUPABASE.auth.signOut({ scope:'local' }); } catch(_) {}
    Auth.currentUser = null;
  }

  if(!Auth._authSubscription) {
    const { data } = SUPABASE.auth.onAuthStateChange((_event, session) => {
      setTimeout(async () => {
        if(!session?.user) {
          Auth.currentUser = null;
          Auth.updateIndicator();
          return;
        }
        try {
          await Auth._applySession(session);
          Auth.startSessionGuard();
        } catch(e) {
          console.warn('身份状态变更后校验失败：', e.message || e);
        }
      }, 0);
    });
    Auth._authSubscription = data?.subscription || null;
  }
};

Auth.isLoggedIn = () => !!Auth.currentUser;
Auth.isAdmin = () => Auth.currentUser?.role === 'admin' && Auth.currentUser?.status === 'active';

Auth.refreshCurrentSession = async () => {
  if(!Auth.currentUser) return false;
  try {
    const session = await Auth._getSession();
    if(!session) throw new Error('登录已过期');
    const previousRole = Auth.currentUser.role;
    await Auth._applySession(session);
    if(previousRole !== Auth.currentUser.role && window.R?.initSidebar) R.initSidebar();
    return true;
  } catch(e) {
    console.warn('登录状态已失效：', e.message || e);
    try { await SUPABASE.auth.signOut({ scope:'local' }); } catch(_) {}
    Auth.currentUser = null;
    try { UI.toast('账号状态或权限已更新，请重新登录', 'warn'); } catch(_) {}
    setTimeout(() => location.reload(), 120);
    return false;
  }
};

Auth.startSessionGuard = () => {
  if(Auth._sessionGuardTimer) clearInterval(Auth._sessionGuardTimer);
  if(!Auth.currentUser) return;
  Auth._sessionGuardTimer = setInterval(() => Auth.refreshCurrentSession(), Auth._SESSION_CHECK_INTERVAL);
  if(!Auth._visibilityGuardBound) {
    document.addEventListener('visibilitychange', () => {
      if(document.visibilityState === 'visible' && Auth.currentUser) Auth.refreshCurrentSession();
    });
    Auth._visibilityGuardBound = true;
  }
};

Auth.updateIndicator = () => {
  const el = document.getElementById('auth-indicator');
  if(!el) return;
  if(!Auth.currentUser) { el.innerHTML = ''; return; }
  const roleLabel = Auth.isAdmin() ? '管理员' : '运营';
  el.innerHTML = `<div class="rounded-lg bg-slate-800/70 px-3 py-2">
    <div class="text-gray-300 truncate">${H.esc(Auth.currentUser.name || Auth.currentUser.username || Auth.currentUser.email)}</div>
    <div class="text-[10px] text-gray-500 truncate mt-0.5">${H.esc(Auth.currentUser.email || '')}</div>
    <div class="flex items-center justify-between gap-2 mt-1">
      <span class="text-[10px] text-gray-500">${roleLabel}</span>
      <button class="text-[10px] text-gray-400 hover:text-white" id="auth-logout-btn">退出</button>
    </div>
  </div>`;
  document.getElementById('auth-logout-btn')?.addEventListener('click', () => Auth.logout());
};

  document.body.appendChild(box);

  const form = document.getElementById('auth-login-form');
  const err = document.getElementById('auth-login-error');
  const submitBtn = document.getElementById('auth-login-submit');
  const showError = (msg) => {
    err.textContent = msg || '登录失败，请重试';
    err.classList.remove('hidden');
  };

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.textContent = '登录中...';
    try {
      const email = String(form.querySelector('[name="email"]')?.value || '').trim().toLowerCase();
      const password = String(form.querySelector('[name="password"]')?.value || '');
      if(!email || !password) throw new Error('请填写邮箱和密码');
      const { data, error } = await SUPABASE.auth.signInWithPassword({ email, password });
      if(error) throw new Error('邮箱或密码不正确');
      await Auth._applySession(data?.session);
      await Auth.loadLogs();
      Auth.startSessionGuard();
      await Auth.log('登录', '登录成功', Auth.currentUser.email, '通过 Supabase Auth 登录运营后台');
      box.remove();
      if(app) app.classList.remove('hidden');
      Auth.updateIndicator();
      resolve(true);
    } catch(ex) {
      try { await SUPABASE.auth.signOut({ scope:'local' }); } catch(_) {}
      Auth.currentUser = null;
      showError(ex?.message || '登录失败，请重试');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '登录';
    }
  });
  setTimeout(() => form.querySelector('[name="email"]')?.focus(), 0);
});

Auth.requireLogin = async () => {
  if(Auth.currentUser) { Auth.startSessionGuard(); return true; }
  return await Auth.showLogin();
};

Auth.logout = async () => {
  try { await Auth.log('登录', '退出登录', Auth.currentUser?.email || '', '退出运营后台'); } catch(_) {}
  try { await SUPABASE.auth.signOut({ scope:'local' }); } catch(e) { console.warn('退出失败：', e.message || e); }
  Auth.currentUser = null;
  setTimeout(() => location.reload(), 80);
};

Auth._invokeAdmin = async (body) => {
  if(!Auth.isAdmin()) throw new Error('只有管理员可以管理账号');
  const { data, error } = await SUPABASE.functions.invoke(Auth._ADMIN_FUNCTION, { body });
  if(error) throw new Error(data?.error || error.message || '账号管理服务调用失败');
  if(data?.error) throw new Error(data.error);
  return data || {};
};

Auth.loadAccounts = async () => {
  if(!Auth.isAdmin()) { Auth.accounts = []; return Auth.accounts; }
  const data = await Auth._invokeAdmin({ action:'list' });
  Auth.accounts = (Array.isArray(data.users) ? data.users : []).map(Auth._mapMember);
  return Auth.accounts;
};

Auth.addAccount = async ({ email, username, name, role, password, remark }) => {
  email = String(email || '').trim().toLowerCase();
  username = String(username || '').trim();
  password = String(password || '');
  if(!email || !email.includes('@')) throw new Error('请填写有效邮箱');
  if(!username) throw new Error('请填写账号名称');
  if(password.length < 8) throw new Error('密码至少需要 8 位');
  await Auth._invokeAdmin({
    action:'create', email, username,
    displayName:String(name || username).trim(),
    role:role === 'admin' ? 'admin' : 'operator',
    status:'active', password,
    remark:String(remark || '').trim()
  });
  await Auth.loadAccounts();
  await Auth.log('登录管理', '新增账号', email, '新增 Supabase Auth 登录账号：' + email);
};

Auth.updateAccount = async (id, patch) => {
  const acc = Auth.accounts.find(a => a.id === id);
  if(!acc) throw new Error('账号不存在');
  await Auth._invokeAdmin({
    action:'update', id,
    displayName:String(patch.name ?? acc.name ?? '').trim(),
    role:patch.role === 'admin' ? 'admin' : 'operator',
    status:patch.status === 'disabled' ? 'disabled' : 'active',
    remark:String(patch.remark ?? acc.remark ?? '').trim()
  });
  await Auth.loadAccounts();
  await Auth.log('登录管理', '编辑账号', acc.email, '编辑 Supabase Auth 登录账号：' + acc.email);
  if(Auth.currentUser?.id === id) await Auth.refreshCurrentSession();
};

Auth.resetPassword = async (id, password) => {
  const acc = Auth.accounts.find(a => a.id === id);
  if(!acc) throw new Error('账号不存在');
  password = String(password || '');
  if(password.length < 8) throw new Error('密码至少需要 8 位');
  await Auth._invokeAdmin({ action:'reset_password', id, password });
  if(Auth.currentUser?.id === id) {
    try { await SUPABASE.auth.signOut({ scope:'local' }); } catch(_) {}
    Auth.currentUser = null;
    setTimeout(() => location.reload(), 120);
    return;
  }
  await Auth.loadAccounts();
  await Auth.log('登录管理', '修改密码', acc.email, '修改 Supabase Auth 账号密码：' + acc.email);
};

Auth.deleteAccount = async (id) => {
  const acc = Auth.accounts.find(a => a.id === id);
  if(!acc) throw new Error('账号不存在');
  await Auth._invokeAdmin({ action:'delete', id });
  await Auth.loadAccounts();
  await Auth.log('登录管理', '删除账号', acc.email, '删除 Supabase Auth 登录账号：' + acc.email);
};

})();
</script>


<!-- ======================================================================
     Script 6: router.js — Hash路由、侧边栏导航
     ====================================================================== -->
<script>
;(function() {
const R = window.R = {};
const S = window.S, C = window.C, H = window.H, UI = window.UI;

// --- 当前路由 ---
R.currentRoute = 'workbench';

// --- 初始化侧边栏（分组渲染） ---
R.initSidebar = () => {
  const nav = document.getElementById('sidebar-nav');
  let html = '';
  const lastIndex = C.NAV_GROUPS.length - 1;
  C.NAV_GROUPS.forEach((group, gi) => {
    if(gi > 0) html += '<div class="mt-3 mb-1"></div>';
    html += '<div class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-3 pb-1">'+group.label+'</div>';
    group.items.forEach(item => {
      if(item.adminOnly && !(window.Auth && Auth.isAdmin && Auth.isAdmin())) return;
      html += `<div class="sidebar-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-sm text-sidebar-text"
        data-route="${item.route}" id="nav-${item.id}">
        <span class="text-base w-5 text-center">${item.icon}</span>
        <span>${item.label}</span>
      </div>`;
    });
    if(gi < lastIndex) html += '<div class="mx-3 my-1 border-t border-gray-800/40"></div>';
  });
  nav.innerHTML = html;

  // 绑定点击
  nav.querySelectorAll('[data-route]').forEach(el => {
    el.addEventListener('click', () => R.navigate(el.dataset.route));
  });
  if(window.Auth && Auth.updateIndicator) Auth.updateIndicator();
};

// --- 导航 ---
// 旧路由 → 侧边栏高亮映射
R._routeToNav = {
  inspirations:'inspirations',
  topics:'topics', contents:'contents', calendar:'calendar', channels:'channels',
  'content-center':'topics',
  analytics:'analytics', users:'users', knowledge:'knowledge', loginManage:'loginManage',
  backups:'settings', settings:'settings', data:'settings',
};
R.navigate = (route) => {
  const P = window.P;

  if(!P || !P.routes) {
    console.error('❌ [ROUTER] window.P 或 P.routes 未初始化，可能 pages.js 加载失败', {
      hasP: !!window.P,
      hasRoutes: !!(window.P && window.P.routes)
    });
    return;
  }

  if(!P.routes[route]) route = 'workbench';
  R.currentRoute = route;
  window.location.hash = route;

  // 更新侧边栏 active
  document.querySelectorAll('.sidebar-nav-item').forEach(el => el.classList.remove('active'));
  const navKey = R._routeToNav[route] || route;
  const active = document.getElementById('nav-' + navKey);
  if(active) active.classList.add('active');

  // 渲染页面
  if(P.routes[route]) {
    try {
      P.routes[route]();
    } catch(err) {
      console.error('页面渲染失败：', route, err);
      const titleEl = document.getElementById('page-title');
      const subEl = document.getElementById('page-subtitle');
      const bodyEl = document.getElementById('page-body');
      if(titleEl) titleEl.textContent = '页面加载失败';
      if(subEl) subEl.textContent = '请把 Console 报错截图发给开发排查';
      if(bodyEl) bodyEl.innerHTML = '<div class="cos-card p-6 text-sm text-red-600">页面渲染失败：' + H.esc(err && err.message ? err.message : String(err)) + '</div>';
    }
  }
};

// --- 监听 hash 变化 ---
R.init = () => {
  const hash = window.location.hash.replace('#','') || 'workbench';
  R.navigate(hash);
  window.addEventListener('hashchange', () => {
    const newHash = window.location.hash.replace('#','') || 'workbench';
    if(newHash !== R.currentRoute) R.navigate(newHash);
  });
};

})();
</script>

  });
